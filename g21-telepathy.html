<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>G21 心電感應</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B1030">
<style>
:root{
  --ink:#1B1030;        /* 底色：深紫 */
  --ink-2:#2A1B45;      /* 卡片 */
  --line:#3E2A5F;       /* 邊線 */
  --paper:#F5EEFF;      /* 主文字 */
  --dim:#A48CC7;        /* 次文字 */
  --wire:#FF8FD0;       /* 主題粉 */
  --spark:#FFD84D;      /* 亮黃 */
  --good:#6BE8A8;       /* 綠 */
  --bad:#FF7B7B;        /* 紅 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;font-weight:inherit;border:none;cursor:pointer;color:inherit}
body{
  min-height:100vh;background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
}

/* 頂部離開鈕（所有遊戲統一：頂部正中央小膠囊） */
#exitGame{position:fixed;top:calc(6px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:60;height:28px;padding:0 12px;border-radius:99px;background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
  text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.25)}

.screen{display:none;flex-direction:column;align-items:center;gap:14px;
        max-width:440px;margin:0 auto;padding-top:26px}
.screen.on{display:flex}

h1{font-size:27px;text-align:center;line-height:1.3}
h1 b{color:var(--wire)}
.hero{font-size:46px;text-align:center;line-height:1}
.sub{font-size:14px;color:var(--dim);font-weight:500;text-align:center;line-height:1.75}
.sub b{color:var(--paper)}

.who{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.who span{background:var(--ink-2);border-radius:99px;padding:7px 13px;font-size:13px}

.card{width:100%;background:var(--ink-2);border:2px solid var(--line);border-radius:18px;padding:15px}

/* 局數選擇 */
.lenRow{display:flex;gap:9px;width:100%}
.lenRow button{flex:1;background:var(--ink-2);border:2px solid var(--line);border-radius:15px;
               padding:14px 0;font-size:15px;color:var(--dim);transition:.12s}
.lenRow button.on{border-color:var(--wire);color:var(--wire);background:#3A2050}
.lenRow button:active{transform:scale(.96)}

.go{width:100%;background:var(--wire);color:#2A0E1F;border-radius:18px;padding:17px 0;font-size:18px}
.go:active{transform:scale(.97)}
.go.ghost{background:var(--ink-2);border:2px solid var(--line);color:var(--wire)}

.back{color:var(--dim);font-size:13px;font-weight:500;text-decoration:underline;text-align:center}

/* 題型徽章 */
.badge{border-radius:99px;padding:8px 17px;font-size:14px;display:inline-flex;align-items:center;gap:6px}
.badge.same{background:#1C4A38;color:var(--good);border:2px solid var(--good)}
.badge.diff{background:#4A1C2E;color:var(--bad);border:2px solid var(--bad)}

/* 換人畫面 */
.passName{font-size:32px;text-align:center;line-height:1.3}
.passHint{font-size:14px;color:var(--dim);font-weight:500;text-align:center;line-height:1.7}
.dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--line);font-style:normal}
.dots i.done{background:var(--wire)}
.dots i.now{background:var(--spark);transform:scale(1.35)}

/* 題目 */
.qBox{width:100%;background:linear-gradient(135deg,#3A2050,#2A1B45);
      border:2px solid var(--line);border-radius:18px;padding:18px 15px;text-align:center}
.qBox .qTxt{font-size:20px;line-height:1.5}

/* 倒數條 */
.timeWrap{width:100%;height:12px;background:var(--ink-2);border-radius:99px;overflow:hidden}
.timeWrap i{display:block;height:100%;background:var(--wire);width:100%;transition:width .1s linear}
.timeWrap i.hot{background:var(--bad)}
.timeNum{font-size:34px;color:var(--wire);text-align:center;line-height:1}
.timeNum.hot{color:var(--bad);animation:tnPulse .4s infinite alternate}
@keyframes tnPulse{to{transform:scale(1.12)}}

/* 選項 */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt{background:var(--ink-2);border:2px solid var(--line);border-radius:16px;
     padding:16px 8px;font-size:16px;display:flex;flex-direction:column;align-items:center;gap:5px;
     transition:.12s;line-height:1.3}
.opt .em{font-size:26px}
.opt:active{transform:scale(.95);border-color:var(--wire)}

/* 揭曉 */
.revRow{width:100%;background:var(--ink-2);border:2px solid var(--line);
        border-radius:15px;padding:12px 14px;display:flex;align-items:center;gap:11px}
.revRow.hit{border-color:var(--good);background:#1C3A2E}
.revRow.solo{border-color:var(--spark);background:#3E3416}
.revRow .em{font-size:24px;flex:none}
.revRow .nm{flex:1;font-size:15px;line-height:1.4}
.revRow .nm i{font-style:normal;display:block;font-size:12px;color:var(--dim);font-weight:500;margin-top:2px}
.revRow .pt{font-size:17px;color:var(--spark);flex:none}

/* 排行 */
.board{width:100%;display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:11px;background:var(--ink-2);
     border-radius:15px;padding:13px 15px}
.row.top{background:var(--spark);color:#2A1400}
.row .rk{font-size:19px;width:30px;text-align:center;flex:none}
.row .nm{flex:1;font-size:16px}
.row .sc{font-size:16px}

.tip{font-size:12px;color:var(--dim);font-weight:500;text-align:center;line-height:1.7}
</style>
</head>
<body>

<a href="index.html#lobby" id="exitGame" aria-label="返回遊戲間">← 離開</a>

<!-- ========== 開場 ========== -->
<section id="intro" class="screen on">
  <div class="hero">🧠✨🧠</div>
  <h1>G21 <b>心電感應</b></h1>
  <p class="sub">
    大家看同一題、<b>偷偷選一個</b>答案——<br>
    🤝 <b>同心題</b>：跟越多人選一樣，分越高！<br>
    😈 <b>反骨題</b>：要選<b>沒人會選</b>的才得分！<br>
    <span style="color:var(--wire)">重點不是答案對不對，是「猜別人怎麼想」。</span><br>
    <span style="color:var(--bad)">⏰ 只有 7 秒！想太久系統會幫你亂選 😱</span>
  </p>

  <div class="who" id="whoRow"></div>

  <div class="card">
    <p class="sub" style="margin-bottom:10px">要玩幾題？</p>
    <div class="lenRow">
      <button data-len="5">5 題<br><span style="font-size:11px;color:var(--dim)">快速</span></button>
      <button data-len="8" class="on">8 題<br><span style="font-size:11px;color:var(--dim)">標準</span></button>
      <button data-len="12">12 題<br><span style="font-size:11px;color:var(--dim)">大戰</span></button>
    </div>
  </div>

  <button class="go" id="startBtn">🧠 開始心電感應</button>
  <p class="tip">📱 一台裝置輪流傳著玩<br>選的時候別讓別人看到喔！</p>
  <a class="back" href="index.html#lobby">← 回遊戲間（改玩家設定）</a>
</section>

<!-- ========== 換人 ========== -->
<section id="pass" class="screen">
  <div class="hero" id="passEm">🤝</div>
  <div class="badge same" id="passBadge">🤝 同心題</div>
  <div class="passName" id="passName">換 🧒 George</div>
  <p class="passHint">把裝置交給他，<b>其他人先別看</b> 🙈</p>
  <div class="dots" id="passDots"></div>
  <button class="go" id="passBtn">好，我拿到了</button>
</section>

<!-- ========== 選答案 ========== -->
<section id="pick" class="screen">
  <div class="badge same" id="pickBadge">🤝 同心題</div>
  <div class="qBox"><div class="qTxt" id="qTxt">說到冰的東西？</div></div>
  <div class="timeNum" id="pickTime">7</div>
  <div class="timeWrap"><i id="pickBar"></i></div>
  <p class="tip" id="pickHint">選一個你覺得<b>大家也會選</b>的 👇</p>
  <div class="opts" id="optsBox"></div>
</section>

<!-- ========== 揭曉 ========== -->
<section id="reveal" class="screen">
  <div class="badge same" id="revBadge">🤝 同心題</div>
  <div class="qBox"><div class="qTxt" id="revQ"></div></div>
  <div class="board" id="revBoard"></div>
  <button class="go" id="nextBtn">下一題 →</button>
</section>

<!-- ========== 結算 ========== -->
<section id="over" class="screen">
  <div class="hero">🏆</div>
  <h1 id="overTitle">心電感應排行</h1>
  <div class="board" id="board"></div>
  <button class="go" id="again">🔁 再玩一次</button>
  <a class="back" href="index.html#lobby" id="gohome">🏠 回遊戲間（換一款玩）</a>
</section>

<script src="family-players.js?v=5"></script>

  ['遇到蟑螂會怎樣？', [['😱','尖叫'],['🏃','逃跑'],['🩴','打它'],['📢','叫大人'],['🧊','僵住'],['😐','沒事啊']]],
  ['說到「會叫的」？', [['🐕','狗'],['📱','手機'],['🐓','公雞'],['🚨','警報器'],['👶','嬰兒'],['⏰','鬧鐘']]],
  ['最想擁有的交通工具？', [['🏎️','跑車'],['🚁','直升機'],['🛥️','遊艇'],['🚲','腳踏車'],['🛹','滑板'],['🐎','馬']]],
  ['說到「熱熱的」？', [['🔥','火'],['☕','熱茶'],['☀️','太陽'],['🍲','火鍋'],['🛁','熱水澡'],['🌋','火山']]],
  ['被稱讚最開心的是？', [['🧠','很聰明'],['😄','很好笑'],['💪','很厲害'],['❤️','很善良'],['🎨','很有創意'],['⚡','動作很快']]],
  ['說到「長長的」？', [['🐍','蛇'],['🦒','長頸鹿'],['🍜','麵'],['🛤️','鐵軌'],['💇','頭髮'],['🌈','彩虹']]],
  ['露營最重要帶什麼？', [['⛺','帳篷'],['🔦','手電筒'],['🍖','食物'],['💧','水'],['🧴','防蚊液'],['🎸','吉他']]],
  ['說到「會黏的」？', [['🍯','蜂蜜'],['🕸️','蜘蛛網'],['🍬','太妃糖'],['📎','膠帶'],['🐌','蝸牛'],['🧴','膠水']]],
  ['最想砍掉哪一件事？', [['📚','寫作業'],['🧹','做家事'],['😴','早起'],['🥦','吃青菜'],['🚿','洗澡'],['🦷','刷牙']]],
  ['說到「白色的」？', [['☁️','雲'],['🥛','牛奶'],['❄️','雪'],['🦢','天鵝'],['📄','紙'],['🦷','牙齒']]],
  ['最喜歡的音樂？', [['🎸','搖滾'],['🎹','鋼琴'],['🥁','節奏強的'],['🎤','流行歌'],['🎻','古典'],['🔇','安靜就好']]],
  ['說到「會爆的」？', [['🎈','氣球'],['🍿','爆米花'],['🎆','煙火'],['💣','炸彈'],['🌋','火山'],['🥤','汽水']]],
  ['最想收集什麼？', [['🃏','卡片'],['🪙','錢幣'],['🧸','公仔'],['📚','漫畫'],['🐚','貝殼'],['⭐','貼紙']]],
];

/* ---------- 音效：Web Audio 合成，零音檔 ---------- */
let AC = null;
function beep(freqs, dur, type, vol) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    freqs.forEach((f, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || 'sine'; o.frequency.value = f;
      const t0 = AC.currentTime + i * 0.06;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + (dur || 0.14));
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + (dur || 0.14) + 0.02);
    });
  } catch (e) {}
}
const SFX = {
  tap:   () => beep([620], 0.07, 'triangle', 0.1),
  pass:  () => beep([440, 660], 0.1, 'sine', 0.11),
  hit:   () => beep([784, 988, 1319], 0.13, 'triangle', 0.14),
  solo:  () => beep([1047, 1319, 1568], 0.12, 'sine', 0.14),
  miss:  () => beep([220, 165], 0.16, 'sawtooth', 0.09),
  done:  () => beep([523, 659, 784, 1047], 0.16, 'triangle', 0.15),
};

/* ---------- 小工具 ---------- */
const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
  window.scrollTo(0, 0);
};
const shuffle = (a) => { for (let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

/* ---------- 遊戲狀態 ---------- */
const S = {
  players: [],     // 玩家名單
  scores: [],      // 各自累積分數
  total: 8,        // 總題數
  round: 0,        // 目前第幾題（0 起算）
  pool: [],        // 這局用的題目（已洗牌）
  q: null,         // 這題的題目
  mode: 'same',    // 'same' 同心題 / 'diff' 反骨題
  picks: [],       // 每個玩家選的選項 index
  late: [],        // 是否因逾時被隨機指定
  turn: 0,         // 換人輪到誰
};

/* ---------- 開場 ---------- */
function boot() {
  S.players = FP.get();
  $('whoRow').innerHTML = S.players
    .map(p => `<span>${p.emoji} ${p.name}</span>`).join('');
  if (S.players.length < 2) {
    $('startBtn').textContent = '⚠️ 至少要 2 個人才好玩';
    $('startBtn').disabled = true;
    $('startBtn').style.opacity = .5;
  }
}

document.querySelectorAll('[data-len]').forEach(b =>
  b.addEventListener('click', () => {
    SFX.tap();
    document.querySelectorAll('[data-len]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    S.total = +b.dataset.len;
  }));

$('startBtn').addEventListener('click', () => {
  if (S.players.length < 2) return;
  SFX.pass();
  S.scores = S.players.map(() => 0);
  S.round = 0;
  /* 題目洗牌，題數不夠就循環補 */
  S.pool = shuffle(QUESTIONS.slice());
  while (S.pool.length < S.total) S.pool = S.pool.concat(shuffle(QUESTIONS.slice()));
  newRound();
});

/* ---------- 每一題 ---------- */
function newRound() {
  S.q = S.pool[S.round];
  S.mode = Math.random() < CONFIG.DIFF_RATE ? 'diff' : 'same';
  S.picks = S.players.map(() => -1);
  S.late = S.players.map(() => false);
  S.turn = 0;
  showPass();
}

function modeInfo() {
  return S.mode === 'diff'
    ? { cls:'diff', em:'😈', label:'😈 反骨題', hint:'選一個你覺得<b>沒人會選</b>的 👇', pass:'😈' }
    : { cls:'same', em:'🤝', label:'🤝 同心題', hint:'選一個你覺得<b>大家也會選</b>的 👇', pass:'🤝' };
}

function showPass() {
  const m = modeInfo();
  const p = S.players[S.turn];
  $('passEm').textContent = m.pass;
  $('passBadge').className = 'badge ' + m.cls;
  $('passBadge').textContent = m.label;
  $('passName').innerHTML = `換 ${p.emoji} <b style="color:var(--wire)">${p.name}</b>`;
  $('passDots').innerHTML = S.players.map((_, i) =>
    `<i class="${i < S.turn ? 'done' : (i === S.turn ? 'now' : '')}"></i>`).join('');
  show('pass');
}

$('passBtn').addEventListener('click', () => { SFX.tap(); showPick(); });

let pickRaf = null;
function stopPickTimer() { cancelAnimationFrame(pickRaf); pickRaf = null; }

function runPickTimer() {
  stopPickTimer();
  const total = CONFIG.PICK_SECONDS * 1000;
  const endAt = performance.now() + total;
  let lastTick = -1;
  const step = () => {
    const left = endAt - performance.now();
    const sec = Math.max(0, left / 1000);
    $('pickBar').style.width = Math.max(0, left / total * 100) + '%';
    $('pickTime').textContent = sec.toFixed(1);
    const hot = sec <= 2.5;
    $('pickBar').classList.toggle('hot', hot);
    $('pickTime').classList.toggle('hot', hot);
    const s = Math.ceil(sec);
    if (hot && s !== lastTick && s > 0) { beep([1200], 0.04, 'square', 0.07); lastTick = s; }
    if (left <= 0) {
      /* 時間到＝來不及選，隨機幫他選一個（不會卡住流程） */
      stopPickTimer();
      const rnd = Math.floor(Math.random() * S.q[1].length);
      beep([220, 165], 0.18, 'sawtooth', 0.1);
      commitPick(rnd, true);
      return;
    }
    pickRaf = requestAnimationFrame(step);
  };
  pickRaf = requestAnimationFrame(step);
}

function commitPick(idx, timeout) {
  stopPickTimer();
  S.picks[S.turn] = idx;
  S.late[S.turn] = !!timeout;
  S.turn++;
  if (S.turn < S.players.length) showPass();
  else doReveal();
}

function showPick() {
  const m = modeInfo();
  $('pickBadge').className = 'badge ' + m.cls;
  $('pickBadge').textContent = m.label;
  $('qTxt').textContent = S.q[0];
  $('pickHint').innerHTML = m.hint;
  $('optsBox').innerHTML = S.q[1].map(([em, txt], i) =>
    `<button class="opt" data-opt="${i}"><span class="em">${em}</span>${txt}</button>`).join('');
  document.querySelectorAll('[data-opt]').forEach(b =>
    b.addEventListener('click', () => { SFX.tap(); commitPick(+b.dataset.opt, false); }));
  show('pick');
  runPickTimer();
}

/* ---------- 揭曉＋計分 ---------- */
function doReveal() {
  const m = modeInfo();
  $('revBadge').className = 'badge ' + m.cls;
  $('revBadge').textContent = m.label;
  $('revQ').textContent = S.q[0];

  /* 統計每個選項被幾個人選 */
  const count = {};
  S.picks.forEach(v => { count[v] = (count[v] || 0) + 1; });
  const allSame = Object.keys(count).length === 1;

  /* 算分 */
  const gained = S.players.map((_, i) => {
    const same = count[S.picks[i]] - 1;   // 跟我一樣的人數（扣掉自己）
    if (S.mode === 'diff') return same === 0 ? CONFIG.SOLO_PT : 0;
    let g = same * CONFIG.SAME_PT;
    if (allSame && S.players.length > 1) g += CONFIG.ALL_BONUS;
    return g;
  });
  gained.forEach((g, i) => { S.scores[i] += g; });

  /* 畫出每個人選了什麼、得幾分 */
  $('revBoard').innerHTML = S.players.map((p, i) => {
    const [em, txt] = S.q[1][S.picks[i]];
    const same = count[S.picks[i]] - 1;
    const g = gained[i];
    let cls = '', note = '';
    if (S.mode === 'diff') {
      cls = g > 0 ? 'solo' : '';
      note = g > 0 ? '只有你選這個！獨行俠 🎯' : `跟 ${same} 個人撞到了 😅`;
    } else {
      cls = g > 0 ? 'hit' : '';
      note = same > 0 ? `跟 ${same} 個人心有靈犀 ✨` : '只有你這樣想 🤔';
    }
    const lateTag = S.late[i] ? ' ⏰<span style="color:var(--bad)">來不及！亂選的</span>' : '';
    return `
      <div class="revRow ${cls}">
        <div class="em">${em}</div>
        <div class="nm">${p.emoji} ${p.name} 選了「${txt}」${lateTag}<i>${note}</i></div>
        <div class="pt">${g > 0 ? '+' + g : '0'}</div>
      </div>`;
  }).join('');

  if (allSame && S.mode === 'same') SFX.hit();
  else if (gained.some(g => g > 0)) SFX.solo();
  else SFX.miss();

  $('nextBtn').textContent = (S.round + 1 >= S.total) ? '看最後成績 🏆' : `下一題 →（${S.round + 2} / ${S.total}）`;
  show('reveal');
}

$('nextBtn').addEventListener('click', () => {
  SFX.tap();
  S.round++;
  if (S.round >= S.total) finish();
  else newRound();
});

/* ---------- 結算 ---------- */
function finish() {
  SFX.done();
  const sorted = S.players
    .map((p, i) => ({ p, sc: S.scores[i] }))
    .sort((a, b) => b.sc - a.sc);
  const best = sorted[0].sc;
  $('overTitle').textContent = '心電感應排行';
  $('board').innerHTML = sorted.map((r, i) => `
    <div class="row ${r.sc === best && best > 0 ? 'top' : ''}">
      <div class="rk">${['🥇','🥈','🥉'][i] || (i + 1)}</div>
      <div class="nm">${r.p.emoji} ${r.p.name}</div>
      <div class="sc">${r.sc} 分</div>
    </div>`).join('');
  show('over');
}

$('again').addEventListener('click', () => {
  SFX.tap();
  S.scores = S.players.map(() => 0);
  S.round = 0;
  S.pool = shuffle(QUESTIONS.slice());
  while (S.pool.length < S.total) S.pool = S.pool.concat(shuffle(QUESTIONS.slice()));
  newRound();
});

boot();
</script>
