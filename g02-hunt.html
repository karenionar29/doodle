<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>G02 家裡尋寶</title>
<style>
:root{
  --ink:#0B1B2B; --ink-2:#132A42; --line:#24435E; --paper:#FDFCF7;
  --wire:#3EE6D0; --spark:#FFD23F; --hot:#FF5C6C; --dim:#7E9BB5; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

#start{justify-content:center;align-items:center;text-align:center;gap:16px;padding:22px}
.hero{font-size:52px}
h1{font-size:26px;line-height:1.35}
h1 em{font-style:normal;color:var(--spark)}
.sub{color:var(--dim);font-size:13px;font-weight:500;line-height:1.75;max-width:21em}
.pick{display:flex;flex-direction:column;gap:9px;width:min(310px,88vw)}
.pick button{background:var(--ink-2);border:2px solid var(--line);border-radius:16px;
             padding:14px;text-align:left;transition:.15s}
.pick button:active{transform:scale(.96)}
.pick b{font-size:17px}
.pick span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px}
.tiny{font-size:11px;color:var(--dim);font-weight:500;max-width:22em;line-height:1.7}

#loading{justify-content:center;align-items:center;text-align:center;gap:16px;padding:30px}
.bar{width:min(280px,80vw);height:10px;background:var(--ink-2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0%;background:var(--wire);transition:width .3s}
#loadNote{color:var(--dim);font-size:13px;font-weight:500;line-height:1.7;max-width:22em}
.err{color:var(--hot);font-size:13px;font-weight:500;max-width:24em;line-height:1.7;text-align:left;
     background:var(--ink-2);padding:14px;border-radius:12px;border-left:3px solid var(--hot)}

/* 遊戲 */
#play{padding:8px 10px 10px;gap:7px}
.topbar{display:flex;align-items:center;gap:8px}
.pill{background:var(--ink-2);border-radius:99px;padding:6px 12px;font-size:14px;white-space:nowrap}
.pill.spark{color:var(--spark)}
#timer{margin-left:auto;font-variant-numeric:tabular-nums;font-size:19px;min-width:52px;text-align:center;
       background:var(--ink-2);border-radius:99px;padding:6px 10px}
#timer.hot{color:var(--hot);animation:pulse .5s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.14)}}

/* 任務卡 */
.quest{background:var(--spark);color:var(--ink);border-radius:16px;padding:12px;text-align:center}
.quest .lead{font-size:11px;font-weight:500;letter-spacing:.16em;opacity:.75}
.quest .what{font-size:30px;line-height:1.15;margin-top:1px}
.quest .en{font-size:12px;font-weight:500;opacity:.65}

/* 鏡頭 */
.lens{position:relative;flex:1;min-height:0;border-radius:16px;overflow:hidden;background:#000;
      box-shadow:0 10px 30px rgba(0,0,0,.45)}
#cam{width:100%;height:100%;object-fit:cover;display:block}
.frame{position:absolute;inset:14px;border:3px solid rgba(255,255,255,.35);border-radius:12px;
       pointer-events:none;transition:.15s}
.lens.hot .frame{border-color:var(--hit);box-shadow:0 0 0 9999px rgba(74,222,128,.18) inset}
.camNote{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
         color:var(--dim);font-size:14px;font-weight:600;text-align:center;padding:24px;background:#000}
.camNote.gone{display:none}

/* 機器人在看什麼 */
.think{display:flex;align-items:center;gap:8px;min-height:42px;
       background:var(--ink-2);border-radius:14px;padding:6px 11px}
.think .face{font-size:22px;flex:none}
.think.busy .face{animation:tilt .9s ease-in-out infinite}
@keyframes tilt{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.guesses{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-width:0}
.g{background:#1E3A55;border-radius:99px;padding:4px 10px;font-size:12px;white-space:nowrap}
.g.near{background:#2E5C3E;color:var(--hit)}
.idle{color:var(--dim);font-size:13px;font-weight:500}

.tools{display:flex;gap:8px}
.tools button{flex:1;background:var(--ink-2);border:2px solid var(--line);
              border-radius:14px;padding:12px 0;font-size:15px;color:var(--dim)}
.tools button:active{transform:scale(.96)}

/* 找到了！ */
#found{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
       gap:10px;z-index:9;background:rgba(11,27,43,.92);pointer-events:none}
#found.on{display:flex}
#foundIcon{font-size:64px;animation:boom .5s cubic-bezier(.2,1.6,.4,1)}
#foundWord{font-size:40px;color:var(--hit);text-align:center;padding:0 20px}
@keyframes boom{from{transform:scale(.3) rotate(-12deg);opacity:0}to{transform:scale(1);opacity:1}}

/* 結算 */
#over{justify-content:center;align-items:center;text-align:center;gap:14px;padding:26px}
#over h2{font-size:24px}
.board{display:flex;flex-direction:column;gap:8px;width:min(320px,86vw)}
.row{display:flex;align-items:center;gap:12px;background:var(--ink-2);border-radius:14px;padding:12px 16px}
.row.top{background:var(--spark);color:var(--ink)}
.row .rk{font-size:19px;width:28px}
.row .nm{flex:1;text-align:left;font-size:16px}
.row .sc{font-size:19px}
.loot{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:320px}
.loot span{background:var(--ink-2);border-radius:99px;padding:5px 11px;font-size:13px}
#again{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 34px;font-size:17px;margin-top:4px}
</style>
</head>
<body>

<section id="start" class="screen on">
  <div class="hero">📸 <span style="color:var(--dim)">🔍</span> 🤖</div>
  <h1>G02 <em>家裡尋寶</em></h1>
  <p class="sub">機器人喊出一樣東西，<br><b>你跑去家裡把它找出來，鏡頭對準它。</b><br>機器人認出來就得分！</p>
  <div class="pick">
    <button data-p="george"><b>🧒 George</b><span>90 秒 · 機器人比較好說話</span></button>
    <button data-p="win"><b>🧑 Win</b><span>70 秒 · 標準</span></button>
    <button data-p="dad"><b>🧔 爸爸</b><span>50 秒 · 機器人很挑</span></button>
    <button data-p="party"><b>👨‍👦‍👦 三個人比賽</b><span>輪流上場，看誰找最多</span></button>
  </div>
  <p class="tiny">🔒 鏡頭畫面只在這台平板裡處理，<b>不會傳出去任何地方</b>。</p>
</section>

<section id="loading" class="screen">
  <div class="hero">🤖</div>
  <div style="font-size:19px">機器人正在裝眼睛…</div>
  <div class="bar"><i id="barFill"></i></div>
  <p id="loadNote">第一次要下載（約 20MB），之後會記住。<br>等一下會問你「要不要用相機」，<b>請按允許</b>。</p>
</section>

<section id="relay" class="screen" style="justify-content:center;align-items:center;text-align:center;gap:16px;padding:26px">
  <div class="hero">🏃</div>
  <div id="relayWho" style="font-size:34px;color:var(--spark)">換 George！</div>
  <p id="relayNote" class="sub">平板交給他，準備好就開始跑。</p>
  <button id="relayGo" style="background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 38px;font-size:18px">開始！</button>
</section>

<section id="play" class="screen">
  <div class="topbar">
    <div class="pill" id="whoTag">🧒 George</div>
    <div class="pill spark">🏆 <span id="score">0</span></div>
    <div id="timer">90</div>
  </div>

  <div class="quest">
    <div class="lead">去 找 一 個</div>
    <div class="what" id="questWhat">杯子</div>
    <div class="en" id="questEn">coffee mug</div>
  </div>

  <div class="lens" id="lens">
    <video id="cam" playsinline muted autoplay></video>
    <div class="frame"></div>
    <div class="camNote" id="camNote">正在打開相機…</div>
  </div>

  <div class="think" id="think">
    <div class="face">🤖</div>
    <div class="guesses" id="guesses"><span class="idle">機器人正在看…</span></div>
  </div>

  <div class="tools">
    <button id="skipBtn">找不到，換一個</button>
  </div>
</section>

<div id="found">
  <div id="foundIcon">🎯</div>
  <div id="foundWord">杯子</div>
</div>

<section id="over" class="screen">
  <div class="hero">🏆</div>
  <h2 id="overTitle">尋寶結果</h2>
  <div class="board" id="board"></div>
  <div class="loot" id="loot"></div>
  <button id="again">再玩一次</button>
</section>

<script type="module">
/* ==============================================================
   CONFIG
   ============================================================== */
const CONFIG = {
  LIB:   'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2',
  MODEL: 'Xenova/mobilevit-small',   // 認「真實照片」的模型（ImageNet-1k）

  INFER_MS:  600,    // 每隔多久看一次
  FRAME:     256,    // 送進模型的畫面大小
  SHOW_TOP:  3,
  HOLD:      2,      // 要連續認對幾次才算數（避免一閃而過的誤判）

  PLAYERS: {
    george: { name:'George', emoji:'🧒', seconds:90, topN:5, conf:0.10 },
    win:    { name:'Win',    emoji:'🧑', seconds:70, topN:3, conf:0.15 },
    dad:    { name:'爸爸',   emoji:'🧔', seconds:50, topN:1, conf:0.25 },
  },
  PARTY: ['george','win','dad'],
};

/* 尋寶清單：英文必須是 ImageNet 類別。
   啟動時會跟「模型實際認得的標籤」取交集，認不得的自動剔除。 */
const LOOT = {
  'coffee mug':'杯子','water bottle':'水瓶','pop bottle':'汽水瓶',
  'remote control':'遙控器','cellular telephone':'手機','laptop':'筆電',
  'computer keyboard':'鍵盤','mouse':'滑鼠','television':'電視',
  'teddy':'玩偶熊','pillow':'枕頭','backpack':'背包',
  'banana':'香蕉','orange':'橘子','lemon':'檸檬',
  'broom':'掃把','plate':'盤子','toaster':'烤麵包機','microwave':'微波爐',
  'refrigerator':'冰箱','washer':'洗衣機','frying pan':'平底鍋',
  'wooden spoon':'木湯匙','spatula':'鍋鏟','soap dispenser':'洗手乳',
  'toilet tissue':'衛生紙','paper towel':'紙巾','plastic bag':'塑膠袋',
  'umbrella':'雨傘','vase':'花瓶','candle':'蠟燭','flowerpot':'花盆',
  'analog clock':'時鐘','wall clock':'掛鐘','digital watch':'電子錶',
  'ballpoint':'原子筆','rubber eraser':'橡皮擦','envelope':'信封',
  'sunglasses':'太陽眼鏡','sunglass':'墨鏡','running shoe':'運動鞋',
  'sock':'襪子','sandal':'涼鞋','jean':'牛仔褲','jersey':'球衣','sweatshirt':'運動衫',
  'table lamp':'檯燈','wardrobe':'衣櫃','desk':'書桌','studio couch':'沙發',
  'rocking chair':'搖椅','bath towel':'浴巾','toilet seat':'馬桶',
  'basketball':'籃球','soccer ball':'足球','tennis ball':'網球',
  'ping-pong ball':'乒乓球','golf ball':'高爾夫球','balloon':'氣球',
  'piggy bank':'存錢筒','screwdriver':'螺絲起子','hammer':'鎚子',
  'Band Aid':'OK繃','lotion':'乳液','perfume':'香水','hair spray':'髮膠',
  'shopping basket':'購物籃','crate':'箱子','whistle':'哨子','book jacket':'書',
};

/* ---------- Worker ---------- */
const WORKER_SRC = `
import { pipeline, RawImage, env } from '${CONFIG.LIB}';
env.allowLocalModels = false;
let clf = null;

self.onmessage = async (e) => {
  const m = e.data;
  if (m.type === 'init') {
    try {
      clf = await pipeline('image-classification', m.model, {
        quantized: false,
        progress_callback: (p) => {
          if (p.status === 'progress' && typeof p.progress === 'number')
            self.postMessage({ type:'progress', progress: p.progress });
        }
      });
      self.postMessage({ type:'ready', labels: Object.values(clf.model.config.id2label || {}) });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
    return;
  }
  if (m.type === 'look' && clf) {
    try {
      // 真實照片要 RGB（跟塗鴉那款不一樣，那款是取 alpha）
      const n = m.data.length / 4;
      const rgb = new Uint8ClampedArray(n * 3);
      for (let i = 0; i < n; i++) {
        rgb[i*3]   = m.data[i*4];
        rgb[i*3+1] = m.data[i*4+1];
        rgb[i*3+2] = m.data[i*4+2];
      }
      const img = new RawImage(rgb, m.w, m.h, 3);
      const out = await clf(img, { topk: 6 });
      self.postMessage({ type:'result', out, seq: m.seq });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
  }
};
`;

/* ---------- 音效 ---------- */
let ac = null;
function beep(f, dur=0.1, type='sine', gain=0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    f.forEach((hz,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = hz;
      const t = ac.currentTime + i*dur*0.8;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+dur+0.02);
    });
  } catch(_) {}
}
const SFX = {
  found: () => beep([659,784,1047,1319], 0.1, 'triangle', 0.17),
  near:  () => beep([1200], 0.04, 'sine', 0.05),
  go:    () => beep([392,523], 0.1, 'triangle', 0.12),
  skip:  () => beep([392,294], 0.09, 'sine', 0.09),
  tick:  () => beep([880], 0.05, 'square', 0.05),
  done:  () => beep([523,659,784,1047,1319], 0.13, 'triangle', 0.18),
};

/* ---------- 狀態 ---------- */
const S = {
  queue: [], cur: null, results: [],
  deck: [], target: null,
  score: 0, loot: [], left: 0,
  hold: 0,
  timerId: null, inferId: null,
  busy: false, seq: 0, ready: false, camOn: false,
  solo: true,
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

/* 把模型標籤正規化：'teddy, teddy bear' → 'teddy' */
const norm = (s) => String(s).split(',')[0].trim().toLowerCase();

/* ---------- 相機 ---------- */
const cam = $('cam');
const grab = document.createElement('canvas');
grab.width = grab.height = CONFIG.FRAME;
const gctx = grab.getContext('2d', { willReadFrequently:true });

async function openCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    cam.srcObject = stream;
    await cam.play();
    S.camOn = true;
    $('camNote').classList.add('gone');
    return true;
  } catch (e) {
    $('camNote').textContent = '打不開相機。請在瀏覽器設定裡允許相機權限，然後重新整理。\n(' + e.name + ')';
    return false;
  }
}

/* ---------- Worker ---------- */
let worker = null, LABELS = new Set();

function bootWorker() {
  const url = URL.createObjectURL(new Blob([WORKER_SRC], { type:'text/javascript' }));
  worker = new Worker(url, { type:'module' });
  worker.onmessage = async (e) => {
    const m = e.data;
    if (m.type === 'progress') $('barFill').style.width = Math.min(99,m.progress).toFixed(0)+'%';
    else if (m.type === 'ready') {
      LABELS = new Set(m.labels.map(norm));
      $('barFill').style.width = '100%';
      S.ready = true;
      await openCamera();
      nextPlayer();
    }
    else if (m.type === 'result') {
      S.busy = false;
      $('think').classList.remove('busy');
      if (m.seq === S.seq) judge(m.out);
    }
    else if (m.type === 'error') { S.busy = false; fail(m.message); }
  };
  worker.onerror = (e) => fail(e.message || '載不到機器人的眼睛');
  worker.postMessage({ type:'init', model: CONFIG.MODEL });
}

function fail(msg) {
  show('loading');
  $('loadNote').outerHTML =
    `<div class="err"><b>機器人裝不了眼睛</b><br>${msg}<br><br>
     這個檔案需要能連到 cdn.jsdelivr.net 和 huggingface.co。</div>`;
}

/* ---------- 出題 ---------- */
function buildDeck() {
  const d = Object.entries(LOOT)
    .filter(([en]) => LABELS.has(en.toLowerCase()))   // 只留模型真的認得的
    .map(([en, zh]) => ({ en, zh }));
  for (let i=d.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
  return d;
}

function nextQuest() {
  if (!S.deck.length) S.deck = buildDeck();
  S.target = S.deck.pop();
  S.hold = 0;
  $('questWhat').textContent = S.target.zh;
  $('questEn').textContent = S.target.en;
  $('lens').classList.remove('hot');
  SFX.go();
}

/* ---------- 輪替 ---------- */
function nextPlayer() {
  if (!S.queue.length) return finish();
  S.cur = CONFIG.PLAYERS[S.queue.shift()];
  if (S.solo) startTurn();
  else {
    $('relayWho').textContent = `${S.cur.emoji} 換 ${S.cur.name}！`;
    $('relayNote').textContent = `你有 ${S.cur.seconds} 秒。準備好就開始跑。`;
    show('relay');
  }
}

function startTurn() {
  show('play');
  $('whoTag').textContent = `${S.cur.emoji} ${S.cur.name}`;
  S.score = 0; S.loot = [];
  $('score').textContent = '0';
  S.deck = buildDeck();

  if (!S.deck.length) { fail('模型認得的類別跟尋寶清單對不起來。'); return; }
  if (!S.camOn) openCamera();

  S.left = S.cur.seconds;
  paintTimer();
  nextQuest();

  clearInterval(S.timerId);
  S.timerId = setInterval(() => {
    S.left--;
    paintTimer();
    if (S.left <= 3 && S.left > 0) SFX.tick();
    if (S.left <= 0) endTurn();
  }, 1000);

  clearInterval(S.inferId);
  S.inferId = setInterval(look, CONFIG.INFER_MS);
}

function paintTimer() {
  $('timer').textContent = S.left;
  $('timer').classList.toggle('hot', S.left <= 5);
}

/* ---------- 看鏡頭 ---------- */
function look() {
  if (!S.ready || S.busy || !S.target || !S.camOn) return;
  if (!cam.videoWidth) return;

  // 取中間正方形，避免變形
  const vw = cam.videoWidth, vh = cam.videoHeight;
  const side = Math.min(vw, vh);
  gctx.drawImage(cam, (vw-side)/2, (vh-side)/2, side, side, 0, 0, CONFIG.FRAME, CONFIG.FRAME);
  const img = gctx.getImageData(0, 0, CONFIG.FRAME, CONFIG.FRAME);

  S.busy = true; S.seq++;
  $('think').classList.add('busy');
  worker.postMessage({ type:'look', data:img.data, w:img.width, h:img.height, seq:S.seq },
                     [img.data.buffer]);
}

function judge(out) {
  if (!S.target || !Array.isArray(out)) return;

  const box = $('guesses');
  box.innerHTML = '';
  out.slice(0, CONFIG.SHOW_TOP).forEach(r => {
    const en = norm(r.label);
    const el = document.createElement('span');
    const isTarget = en === S.target.en.toLowerCase();
    el.className = 'g' + (isTarget ? ' near' : '');
    el.textContent = LOOT[en] || en;
    box.appendChild(el);
  });

  const rank = out.findIndex(r => norm(r.label) === S.target.en.toLowerCase());
  const hitNow = rank >= 0 && rank < S.cur.topN && out[rank].score >= S.cur.conf;

  if (hitNow) {
    S.hold++;
    $('lens').classList.add('hot');
    if (S.hold === 1) SFX.near();
    if (S.hold >= CONFIG.HOLD) gotIt();
  } else {
    S.hold = 0;
    $('lens').classList.remove('hot');
  }
}

function gotIt() {
  const word = S.target.zh;
  S.score++;
  S.loot.push(word);
  $('score').textContent = S.score;
  S.target = null;
  SFX.found();

  $('foundWord').textContent = word;
  $('found').classList.add('on');
  setTimeout(() => {
    $('found').classList.remove('on');
    if (S.timerId) nextQuest();
  }, 1100);
}

function endTurn() {
  clearInterval(S.timerId); S.timerId = null;
  clearInterval(S.inferId); S.inferId = null;
  S.target = null;
  S.results.push({ name:S.cur.name, emoji:S.cur.emoji, score:S.score, loot:[...S.loot] });
  SFX.done();
  nextPlayer();
}

function finish() {
  const sorted = [...S.results].sort((a,b) => b.score - a.score);
  const multi = sorted.length > 1;
  $('overTitle').textContent = multi ? '尋寶大賽結果' : '尋寶結果';
  $('board').innerHTML = sorted.map((r,i) => `
    <div class="row ${i===0 && multi ? 'top' : ''}">
      <div class="rk">${multi ? (['🥇','🥈','🥉'][i] || (i+1)) : r.emoji}</div>
      <div class="nm">${r.name}</div>
      <div class="sc">${r.score}</div>
    </div>`).join('');
  const all = sorted.flatMap(r => r.loot);
  $('loot').innerHTML = all.length
    ? all.map(w => `<span>${w}</span>`).join('')
    : '<span>下次一定找得到</span>';
  show('over');
}

/* ---------- 事件 ---------- */
document.querySelectorAll('.pick button').forEach(b => {
  b.onclick = () => {
    const p = b.dataset.p;
    S.solo = (p !== 'party');
    S.queue = S.solo ? [p] : [...CONFIG.PARTY];
    S.results = [];
    beep([440], 0.06);
    if (S.ready) nextPlayer();
    else { show('loading'); bootWorker(); }
  };
});

$('relayGo').onclick = startTurn;
$('skipBtn').onclick = () => { if (S.target) { SFX.skip(); nextQuest(); } };
$('again').onclick = () => show('start');
</script>
</body>
</html>
