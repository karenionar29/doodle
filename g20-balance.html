<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1030">
<title>G20 平衡大師</title>
<style>
:root{
  --ink:#1A1030; --ink-2:#2B1C4E; --line:#443078; --paper:#FDFCF7;
  --wire:#9BB0FF; --spark:#FFD23F; --hot:#FF5C6C; --dim:#9C93C0; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}
.center{justify-content:center;align-items:center;text-align:center;gap:14px;padding:24px}

.hero{font-size:44px}
h1{font-size:24px;line-height:1.35}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:12px;font-weight:500;line-height:1.85;max-width:22em}
.sub b{color:var(--paper)}
.big{background:var(--wire);color:var(--ink);border-radius:18px;padding:16px 42px;font-size:19px}
.big:active{transform:scale(.97)}
.back{color:var(--dim);font-size:12px;text-decoration:underline}
.err{color:var(--hot);font-size:13px;font-weight:500;max-width:24em;line-height:1.7;
     background:var(--ink-2);padding:14px;border-radius:12px;border-left:3px solid var(--hot)}
.pick{display:flex;flex-direction:column;gap:8px;width:min(320px,90vw)}
.pick button{background:var(--ink-2);border:2px solid var(--line);border-radius:16px;
             padding:13px;text-align:left;transition:.15s}
.pick button:active{transform:scale(.96)}
.pick button.hero2{border-color:var(--wire);background:#372563}
.pick b{font-size:16px}
.pick span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px}
.who{font-size:32px;color:var(--spark)}

#play{position:relative;align-items:center;justify-content:center}
#arena{position:absolute;inset:0}
.hud{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;gap:10px;
     padding-top:env(safe-area-inset-top);z-index:2}
.hud .pill{background:var(--ink-2);border-radius:99px;padding:6px 13px;font-size:14px}
.hud .pill b{color:var(--spark);font-variant-numeric:tabular-nums}
#ring{position:absolute;border:4px dashed var(--line);border-radius:50%;transition:border-color .2s}
#ring.danger{border-color:var(--hot)}
#ball{position:absolute;width:44px;height:44px;font-size:38px;line-height:44px;text-align:center;
      will-change:transform;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}

#fall{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;z-index:9;background:rgba(26,16,48,.94);text-align:center;padding:20px}
#fall.on{display:flex}
#fallEm{font-size:80px;animation:drop .5s cubic-bezier(.3,1.5,.5,1)}
#fallTxt{font-size:26px;color:var(--spark)}
@keyframes drop{from{transform:translateY(-80px);opacity:0}to{transform:translateY(0);opacity:1}}

#over{overflow-y:auto}
.board{display:flex;flex-direction:column;gap:8px;width:min(320px,86vw)}
.row{display:flex;align-items:center;gap:12px;background:var(--ink-2);border-radius:14px;padding:12px 16px}
.row.top{background:var(--spark);color:var(--ink)}
.row .rk{font-size:19px;width:28px}
.row .nm{flex:1;text-align:left;font-size:16px}
.row .sc{font-size:16px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<section id="start" class="screen on center">
  <div class="hero">🥚 ⚖️</div>
  <h1>G20 <em>平衡大師</em></h1>
  <p class="sub"><b>平板平拿在手上</b>，用傾斜控制蛋蛋——<br>
  別讓它滾出圈圈！<br>
  圈圈會<b>越縮越小</b>，看誰撐最久。</p>
  <div class="pick" id="pickBox"></div>
  <a class="back" href="index.html">← 回遊戲間（改玩家設定）</a>
  <p class="err" id="senErr" style="display:none">這台裝置沒有傾斜感應器（電腦玩不了這款），請用手機或平板。</p>
</section>

<section id="relay" class="screen center">
  <div class="hero">🥚</div>
  <div class="who" id="relayWho">換 George！</div>
  <p class="sub">平板<b>平平拿好</b>（像端一盤水），<br>按開始，蛋會出現在中間。</p>
  <button class="big" id="relayGo">端好了，開始！</button>
</section>

<section id="play" class="screen">
  <div id="arena">
    <div class="hud">
      <div class="pill" id="pWho">🧒 George</div>
      <div class="pill">⏱ <b id="pTime">0.0</b> 秒</div>
    </div>
    <div id="ring"></div>
    <div id="ball">🥚</div>
  </div>
</section>

<div id="fall">
  <div id="fallEm">🍳</div>
  <div id="fallTxt">蛋滾出去了！</div>
  <div class="sub" id="fallSub">撐了 8.3 秒</div>
</div>

<section id="over" class="screen center">
  <div class="hero">🏆</div>
  <h2 style="font-size:24px" id="overTitle">平衡大師排行</h2>
  <div class="board" id="board"></div>
  <button class="big" id="again">再平衡一次</button>
</section>

<script src="family-players.js?v=5"></script>
<script>
const CONFIG = {
  /* 難度 → 蛋對傾斜多敏感（越大越難控） */
  SENS: { easy: 0.55, normal: 0.85, hard: 1.25 },
  FRICTION: 0.985,
  RING_START: 0.92,          // 圈圈起始（相對短邊）
  RING_MIN: 0.30,
  SHRINK_PER_S: 0.022,       // 每秒縮多少
};

let ac = null;
function beep(f, dur=0.1, type='sine', gain=0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    f.forEach((hz,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = hz;
      const t = ac.currentTime + i*dur*0.8;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+dur+0.02);
    });
  } catch(_) {}
}
const SFX = {
  go:   () => beep([392,523], 0.1, 'triangle', 0.12),
  fall: () => beep([300,200,120], 0.2, 'sawtooth', 0.15),
  warn: () => beep([990], 0.05, 'square', 0.07),
  done: () => beep([523,659,784,1047,1319], 0.13, 'triangle', 0.18),
};

const S = {
  queue: [], cur: null, results: [],
  sensorOn: false, tiltX: 0, tiltY: 0, zeroX: 0, zeroY: 0,
  x: 0, y: 0, vx: 0, vy: 0,
  t0: 0, ringR: 0, playing: false, rafId: null, warned: false,
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

function paintStart() {
  const ps = FP.get();
  const lvDesc = { easy:'蛋比較穩', normal:'標準', hard:'蛋超級滑' };
  $('pickBox').innerHTML =
    (ps.length > 1 ? `
      <button class="hero2" data-p="party">
        <b>👨‍👦‍👦 大家比賽（${ps.length} 人）</b>
        <span>輪流平衡，看誰撐最久</span>
      </button>` : '') +
    ps.map((p, i) => `
      <button data-p="${i}">
        <b>${p.emoji} ${p.name}</b>
        <span>${lvDesc[p.level] || lvDesc.normal}</span>
      </button>`).join('');
  document.querySelectorAll('#pickBox button').forEach(b =>
    b.addEventListener('click', async () => {
      const ok = await askSensor();
      if (!ok) { $('senErr').style.display = ''; return; }
      const ps2 = FP.get();
      if (b.dataset.p === 'party') S.queue = ps2.map((_,i) => i);
      else S.queue = [+b.dataset.p];
      S.results = [];
      beep([440], 0.06);
      nextPlayer();
    }));
}

async function askSensor() {
  if (S.sensorOn) return true;
  try {
    if (typeof DeviceOrientationEvent === 'undefined') return false;
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r !== 'granted') return false;
    }
    window.addEventListener('deviceorientation', (e) => {
      if (e.beta == null || e.gamma == null) return;
      S.tiltY = e.beta;    // 前後
      S.tiltX = e.gamma;   // 左右
      S.sensorOn = true;
    });
    /* 等第一筆資料 */
    await new Promise(res => setTimeout(res, 350));
    return true;
  } catch (_) { return false; }
}

function nextPlayer() {
  if (!S.queue.length) return finish();
  const ps = FP.get();
  S.cur = ps[S.queue.shift()] || ps[0];
  $('relayWho').textContent = `${S.cur.emoji} 換 ${S.cur.name}！`;
  show('relay');
  SFX.go();
}

$('relayGo').onclick = () => {
  show('play');
  /* 以按下瞬間的握持角度當「水平」基準 */
  S.zeroX = S.tiltX; S.zeroY = S.tiltY;
  const ar = $('arena');
  const W = ar.clientWidth, H = ar.clientHeight;
  S.x = W/2; S.y = H/2; S.vx = 0; S.vy = 0;
  S.ringR = Math.min(W,H)/2 * CONFIG.RING_START;
  S.t0 = performance.now();
  S.playing = true;
  S.warned = false;
  $('pWho').textContent = `${S.cur.emoji} ${S.cur.name}`;
  cancelAnimationFrame(S.rafId);
  loop();
};

function loop() {
  if (!S.playing) return;
  const ar = $('arena');
  const W = ar.clientWidth, H = ar.clientHeight;
  const cx = W/2, cy = H/2;
  const sens = CONFIG.SENS[S.cur.level] || CONFIG.SENS.normal;

  /* 傾斜 → 加速度（相對開局基準） */
  const gx = Math.max(-30, Math.min(30, S.tiltX - S.zeroX));
  const gy = Math.max(-30, Math.min(30, S.tiltY - S.zeroY));
  S.vx = (S.vx + gx * 0.011 * sens) * CONFIG.FRICTION;
  S.vy = (S.vy + gy * 0.011 * sens) * CONFIG.FRICTION;
  S.x += S.vx; S.y += S.vy;

  /* 圈圈縮小 */
  const secs = (performance.now() - S.t0) / 1000;
  const minR = Math.min(W,H)/2 * CONFIG.RING_MIN;
  S.ringR = Math.max(minR, Math.min(W,H)/2 * CONFIG.RING_START - secs * CONFIG.SHRINK_PER_S * Math.min(W,H));

  /* 畫 */
  const ring = $('ring');
  ring.style.width = ring.style.height = (S.ringR*2) + 'px';
  ring.style.left = (cx - S.ringR) + 'px';
  ring.style.top  = (cy - S.ringR) + 'px';
  $('ball').style.transform = `translate(${S.x-22}px, ${S.y-22}px)`;
  $('pTime').textContent = secs.toFixed(1);

  /* 判定 */
  const dist = Math.hypot(S.x - cx, S.y - cy);
  const danger = dist > S.ringR * 0.72;
  ring.classList.toggle('danger', danger);
  if (danger && !S.warned) { SFX.warn(); S.warned = true; }
  if (!danger) S.warned = false;

  if (dist > S.ringR) { fell(secs); return; }
  S.rafId = requestAnimationFrame(loop);
}

function fell(secs) {
  S.playing = false;
  cancelAnimationFrame(S.rafId);
  SFX.fall();
  if (navigator.vibrate) { try { navigator.vibrate(200); } catch(_){} }
  $('fallSub').textContent = `${S.cur.emoji} ${S.cur.name} 撐了 ${secs.toFixed(1)} 秒`;
  $('fall').classList.add('on');
  S.results.push({ name:S.cur.name, emoji:S.cur.emoji, secs });
  setTimeout(() => {
    $('fall').classList.remove('on');
    nextPlayer();
  }, 1800);
}

function finish() {
  SFX.done();
  const sorted = [...S.results].sort((a,b) => b.secs - a.secs);
  const multi = sorted.length > 1;
  $('overTitle').textContent = multi ? '平衡大師排行' : '你的成績';
  $('board').innerHTML = sorted.map((r,i) => `
    <div class="row ${i===0 && multi ? 'top' : ''}">
      <div class="rk">${multi ? (['🥇','🥈','🥉'][i] || (i+1)) : r.emoji}</div>
      <div class="nm">${r.name}</div>
      <div class="sc">${r.secs.toFixed(1)} 秒</div>
    </div>`).join('');
  show('over');
}

$('again').onclick = () => { paintStart(); show('start'); };

paintStart();
</script>
</body>
</html>
