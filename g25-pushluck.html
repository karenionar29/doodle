<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>G25 賭徒骰盤</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#20080F">
<style>
:root{
  --ink:#20080F;        /* 深酒紅 */
  --ink-2:#33121D;      /* 卡片 */
  --line:#54203004;
  --line2:#5A2333;      /* 邊線 */
  --paper:#FFF0F4;      /* 主文字 */
  --dim:#C79AA8;        /* 次文字 */
  --wire:#FFC94D;       /* 主題金 */
  --spark:#65E8FF;      /* 亮青 */
  --good:#6BE8A8;
  --bad:#FF5C6E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;font-weight:inherit;border:none;cursor:pointer;color:inherit}
body{
  min-height:100vh;background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
}

#exitGame{position:fixed;top:calc(6px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:60;height:28px;padding:0 12px;border-radius:99px;background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;
  text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.25)}

.screen{display:none;flex-direction:column;align-items:center;gap:14px;
        max-width:440px;margin:0 auto;padding-top:26px}
.screen.on{display:flex}

h1{font-size:27px;text-align:center;line-height:1.3}
h1 b{color:var(--wire)}
.hero{font-size:46px;text-align:center;line-height:1}
.sub{font-size:14px;color:var(--dim);font-weight:500;text-align:center;line-height:1.75}
.sub b{color:var(--paper)}

.who{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.who span{background:var(--ink-2);border-radius:99px;padding:7px 13px;font-size:13px}

.card{width:100%;background:var(--ink-2);border:2px solid var(--line2);border-radius:18px;padding:15px}
.lenRow{display:flex;gap:9px;width:100%}
.lenRow button{flex:1;background:var(--ink-2);border:2px solid var(--line2);border-radius:15px;
               padding:13px 0;font-size:15px;color:var(--dim)}
.lenRow button.on{border-color:var(--wire);color:var(--wire);background:#4A1B29}
.lenRow button:active{transform:scale(.96)}

.go{width:100%;background:var(--wire);color:#2A1500;border-radius:18px;padding:17px 0;font-size:18px}
.go:active{transform:scale(.97)}
.go:disabled{opacity:.4}
.back{color:var(--dim);font-size:13px;font-weight:500;text-decoration:underline;text-align:center}
.tip{font-size:12px;color:var(--dim);font-weight:500;text-align:center;line-height:1.7}

/* 分數榜 */
.scoreBoard{width:100%;display:flex;flex-direction:column;gap:7px}
.sRow{display:flex;align-items:center;gap:10px;background:var(--ink-2);border-radius:13px;padding:10px 13px}
.sRow.now{border:2px solid var(--wire);background:#4A1B29}
.sRow .nm{flex:1;font-size:14px}
.sRow .bar{flex:1.4;height:9px;background:#2A0D16;border-radius:99px;overflow:hidden}
.sRow .bar i{display:block;height:100%;background:var(--wire)}
.sRow .sc{font-size:15px;color:var(--wire);min-width:44px;text-align:right}

/* 骰盤 */
.dial{width:100%;background:radial-gradient(circle at 50% 40%,#4A1B29,#2A0D16);
      border:3px solid var(--wire);border-radius:22px;padding:24px 15px;text-align:center;
      position:relative;overflow:hidden}
.dial.bust{border-color:var(--bad);background:radial-gradient(circle at 50% 40%,#4A1620,#2A0A10)}
.dial .face{font-size:76px;line-height:1;transition:transform .08s}
.dial .face.spin{transform:scale(1.12) rotate(8deg)}
.dial .cap{font-size:14px;color:var(--dim);font-weight:500;margin-top:8px;line-height:1.6}

/* 本輪累積 */
.potBox{width:100%;display:flex;gap:9px}
.potBox .b{flex:1;background:var(--ink-2);border:2px solid var(--line2);border-radius:15px;
           padding:12px 8px;text-align:center}
.potBox .b .k{font-size:11px;color:var(--dim);font-weight:500}
.potBox .b .v{font-size:26px;color:var(--wire);line-height:1.2;margin-top:2px}
.potBox .b.risk .v{color:var(--bad)}

.actRow{display:flex;gap:10px;width:100%}
.actRow button{flex:1;border-radius:18px;padding:20px 8px;font-size:17px;line-height:1.35}
.actRow .roll{background:var(--bad);color:#2A0508}
.actRow .keep{background:var(--good);color:#062616}
.actRow button:active{transform:scale(.95)}
.actRow button:disabled{opacity:.4}

.board{width:100%;display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:11px;background:var(--ink-2);border-radius:15px;padding:13px 15px}
.row.top{background:var(--wire);color:#2A1500}
.row .rk{font-size:19px;width:30px;text-align:center;flex:none}
.row .nm{flex:1;font-size:16px}
.row .sc{font-size:16px}
</style>
</head>
<body>

<a href="index.html#lobby" id="exitGame" aria-label="返回遊戲間">← 離開</a>

<!-- ========== 開場 ========== -->
<section id="intro" class="screen on">
  <div class="hero">🎲💰💀</div>
  <h1>G25 <b>賭徒骰盤</b></h1>
  <p class="sub">
    輪到你 → <b>一直骰</b>，分數一直疊上去。<br>
    但骰到 <b style="color:var(--bad)">💀 骷髏</b> → <b>這輪全部歸零</b>！<br>
    <b style="color:var(--good)">隨時可以收下</b>，落袋為安。<br>
    <span style="color:var(--bad)">越骰越危險——骷髏機率一次比一次高。</span><br>
    <span style="color:var(--wire)">先到目標分數的人贏！</span>
  </p>

  <div class="who" id="whoRow"></div>

  <div class="card">
    <p class="sub" style="margin-bottom:10px">目標幾分？</p>
    <div class="lenRow">
      <button data-goal="30">30 分<br><span style="font-size:11px;color:var(--dim)">快速</span></button>
      <button data-goal="50" class="on">50 分<br><span style="font-size:11px;color:var(--dim)">標準</span></button>
      <button data-goal="80">80 分<br><span style="font-size:11px;color:var(--dim)">長期戰</span></button>
    </div>
  </div>

  <button class="go" id="startBtn">🎲 開始賭一把</button>
  <p class="tip">📱 裝置放中間輪流按就好<br>看別人爆炸最好笑 😆</p>
  <a class="back" href="index.html#lobby">← 回遊戲間（改玩家設定）</a>
</section>

<!-- ========== 換人 ========== -->
<section id="pass" class="screen">
  <div class="hero">🎲</div>
  <div style="font-size:30px;text-align:center;line-height:1.3" id="passName">換 🧒 George</div>
  <div class="scoreBoard" id="passBoard"></div>
  <button class="go" id="passBtn">我來骰！</button>
</section>

<!-- ========== 骰盤 ========== -->
<section id="play" class="screen">
  <div class="scoreBoard" id="playBoard"></div>
  <div class="dial" id="dial">
    <div class="face" id="face">🎲</div>
    <div class="cap" id="cap">按「再骰一次」開始</div>
  </div>
  <div class="potBox">
    <div class="b"><div class="k">這輪累積</div><div class="v" id="potVal">0</div></div>
    <div class="b"><div class="k">已骰次數</div><div class="v" id="rollCnt">0</div></div>
    <div class="b risk"><div class="k">下次爆炸機率</div><div class="v" id="riskVal">12%</div></div>
  </div>
  <div class="actRow">
    <button class="roll" id="btnRoll">🎲<br>再骰一次</button>
    <button class="keep" id="btnKeep">💰<br>收下</button>
  </div>
  <p class="tip" id="playTip">收下就把分數存起來，換下一位</p>
</section>

<!-- ========== 爆炸 ========== -->
<section id="bust" class="screen">
  <div class="hero">💀💥</div>
  <div style="font-size:30px;text-align:center;line-height:1.35" id="bustName"></div>
  <p class="sub" id="bustWhy"></p>
  <div class="scoreBoard" id="bustBoard"></div>
  <button class="go" id="bustBtn">換下一位 →</button>
</section>

<!-- ========== 結算 ========== -->
<section id="over" class="screen">
  <div class="hero">🏆</div>
  <h1 id="overTitle"></h1>
  <div class="board" id="board"></div>
  <button class="go" id="again">🔁 再賭一場</button>
  <a class="back" href="index.html#lobby" id="gohome">🏠 回遊戲間（換一款玩）</a>
</section>

<script src="family-players.js?v=5"></script>
<script>
/* ============================================================
   G25 賭徒骰盤（push-your-luck）
   核心：見好就收 vs 再賭一把。
   耐玩來源＝落後的人被迫冒險、領先的人保守，
   而「敢不敢」永遠取決於別人現在幾分——內容是人。
   ============================================================ */

const CONFIG = {
  BASE_BUST: 0.12,     // 第一次骰的爆炸機率
  BUST_STEP: 0.07,     // 每多骰一次，爆炸機率增加
  MAX_BUST: 0.62,      // 爆炸機率上限
  GEM_RATE: 0.14,      // 沒爆的情況下，骰到寶石（本輪翻倍）的機率
  FACES: [1, 2, 2, 3, 3, 5],   // 一般分數面
};

/* ---------- 音效 ---------- */
let AC = null;
function beep(fs, dur, type, vol) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    fs.forEach((f, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || 'sine'; o.frequency.value = f;
      const t0 = AC.currentTime + i * 0.055;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + (dur || 0.14));
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + (dur || 0.14) + 0.02);
    });
  } catch (e) {}
}
const SFX = {
  tap:  () => beep([560], 0.06, 'triangle', 0.09),
  spin: () => beep([880], 0.03, 'square', 0.05),
  good: () => beep([784, 1047], 0.1, 'triangle', 0.13),
  gem:  () => beep([1047, 1319, 1568], 0.13, 'sine', 0.15),
  bust: () => beep([196, 147, 110], 0.28, 'sawtooth', 0.16),
  keep: () => beep([523, 659, 784], 0.12, 'sine', 0.13),
  win:  () => beep([659, 880, 1175, 1568], 0.17, 'triangle', 0.16),
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
  window.scrollTo(0, 0);
};
const pick = (a) => a[Math.floor(Math.random() * a.length)];

/* ---------- 狀態 ---------- */
const S = {
  players: [], scores: [], goal: 50,
  turn: 0, pot: 0, rolls: 0, busy: false,
};

function bustChance() {
  return Math.min(CONFIG.MAX_BUST, CONFIG.BASE_BUST + S.rolls * CONFIG.BUST_STEP);
}

/* ---------- 開場 ---------- */
function boot() {
  S.players = FP.get();
  $('whoRow').innerHTML = S.players.map(p => `<span>${p.emoji} ${p.name}</span>`).join('');
  if (S.players.length < 2) {
    $('startBtn').textContent = '⚠️ 至少要 2 個人';
    $('startBtn').disabled = true;
  }
}
document.querySelectorAll('[data-goal]').forEach(b =>
  b.addEventListener('click', () => {
    SFX.tap();
    document.querySelectorAll('[data-goal]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    S.goal = +b.dataset.goal;
  }));

$('startBtn').addEventListener('click', () => {
  if (S.players.length < 2) return;
  SFX.tap();
  S.scores = S.players.map(() => 0);
  S.turn = 0;
  showPass();
});

/* ---------- 分數榜 ---------- */
function paintBoard(id) {
  $(id).innerHTML = S.players.map((p, i) => {
    const pct = Math.min(100, S.scores[i] / S.goal * 100);
    return `<div class="sRow ${i === S.turn ? 'now' : ''}">
      <div class="nm">${p.emoji} ${p.name}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="sc">${S.scores[i]}</div>
    </div>`;
  }).join('');
}

/* ---------- 換人 ---------- */
function showPass() {
  const p = S.players[S.turn];
  S.pot = 0; S.rolls = 0; S.busy = false;
  $('passName').innerHTML = `換 ${p.emoji} <b style="color:var(--wire)">${p.name}</b>`;
  paintBoard('passBoard');
  show('pass');
}
$('passBtn').addEventListener('click', () => {
  SFX.tap();
  paintPlay(true);
  show('play');
});

function paintPlay(reset) {
  paintBoard('playBoard');
  $('potVal').textContent = S.pot;
  $('rollCnt').textContent = S.rolls;
  $('riskVal').textContent = Math.round(bustChance() * 100) + '%';
  $('btnKeep').disabled = S.pot <= 0;
  if (reset) {
    $('face').textContent = '🎲';
    $('cap').textContent = '按「再骰一次」開始';
    $('dial').classList.remove('bust');
  }
  /* 落後的人給一句慫恿，領先的人給一句提醒——強化心理拉扯 */
  const my = S.scores[S.turn], best = Math.max(...S.scores);
  $('playTip').innerHTML = (best - my >= 12)
    ? '你落後不少了…<b style="color:var(--bad)">要不要再賭一把？</b>'
    : (my >= best && my > 0 ? '你領先中，<b style="color:var(--good)">見好就收也是一招</b>' : '收下就把分數存起來，換下一位');
}

/* ---------- 骰 ---------- */
$('btnRoll').addEventListener('click', () => {
  if (S.busy) return;
  S.busy = true;
  const face = $('face'), dial = $('dial');
  /* 先決定結果 */
  const bust = Math.random() < bustChance();
  const gem = !bust && Math.random() < CONFIG.GEM_RATE;
  const val = gem ? 0 : pick(CONFIG.FACES);

  /* 轉動動畫 */
  let t = 0;
  const spinId = setInterval(() => {
    face.textContent = pick(['🎲','💰','💎','⭐','🔔','7️⃣']);
    face.classList.toggle('spin');
    SFX.spin();
    t++;
    if (t > 11) {
      clearInterval(spinId);
      face.classList.remove('spin');
      settle(bust, gem, val);
    }
  }, 70);
});

function settle(bust, gem, val) {
  const face = $('face'), dial = $('dial');
  if (bust) {
    face.textContent = '💀';
    dial.classList.add('bust');
    $('cap').textContent = '這輪全部歸零…';
    SFX.bust();
    setTimeout(() => {
      const p = S.players[S.turn];
      $('bustName').innerHTML = `${p.emoji} <b style="color:var(--bad)">${p.name}</b> 爆掉了！`;
      $('bustWhy').innerHTML = `骰了 ${S.rolls} 次、累積 <b>${S.pot}</b> 分<br>全部飛走 💸`;
      S.pot = 0;
      paintBoard('bustBoard');
      show('bust');
    }, 800);
    return;
  }
  if (gem) {
    face.textContent = '💎';
    $('cap').innerHTML = `<b style="color:var(--spark)">寶石！這輪分數翻倍</b>`;
    S.pot = S.pot * 2 + 2;      // 空手骰到寶石也給一點甜頭
    SFX.gem();
  } else {
    face.textContent = ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣'][val - 1] || '⭐';
    $('cap').textContent = `＋${val} 分`;
    S.pot += val;
    SFX.good();
  }
  S.rolls++;
  paintPlay(false);
  S.busy = false;
}

/* ---------- 收下 ---------- */
$('btnKeep').addEventListener('click', () => {
  if (S.busy || S.pot <= 0) return;
  SFX.keep();
  S.scores[S.turn] += S.pot;
  const reached = S.scores[S.turn] >= S.goal;
  S.pot = 0;
  if (reached) return finish();
  nextTurn();
});

$('bustBtn').addEventListener('click', () => { SFX.tap(); nextTurn(); });

function nextTurn() {
  S.turn = (S.turn + 1) % S.players.length;
  showPass();
}

/* ---------- 結算 ---------- */
function finish() {
  SFX.win();
  const rows = S.players.map((p, i) => ({ p, sc: S.scores[i] }))
    .sort((a, b) => b.sc - a.sc);
  $('overTitle').innerHTML = `${rows[0].p.emoji} <b>${rows[0].p.name}</b> 達陣！`;
  $('board').innerHTML = rows.map((r, i) => `
    <div class="row ${i === 0 ? 'top' : ''}">
      <div class="rk">${['🥇','🥈','🥉'][i] || (i + 1)}</div>
      <div class="nm">${r.p.emoji} ${r.p.name}</div>
      <div class="sc">${r.sc} 分</div>
    </div>`).join('');
  show('over');
}

$('again').addEventListener('click', () => {
  SFX.tap();
  S.scores = S.players.map(() => 0);
  S.turn = 0;
  showPass();
});

boot();
</script>
</body>
</html>
