<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#160D2B">
<title>G18 機器人讀心術</title>
<style>
:root{
  --ink:#160D2B; --ink-2:#261847; --line:#3E296B; --paper:#FDFCF7;
  --wire:#B58CFF; --spark:#FFD23F; --hot:#FF5C6C; --dim:#9C8BC0; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}
.center{justify-content:center;align-items:center;text-align:center;gap:14px;padding:24px}

.hero{font-size:44px}
h1{font-size:24px;line-height:1.35}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:13px;font-weight:500;line-height:1.85;max-width:22em}
.sub b{color:var(--paper)}
.big{background:var(--wire);color:var(--ink);border-radius:18px;padding:16px 42px;font-size:19px}
.big:active{transform:scale(.97)}
.back{color:var(--dim);font-size:12px;text-decoration:underline}
.vsbar{display:flex;gap:10px}
.vsbar span{background:var(--ink-2);border-radius:99px;padding:7px 15px;font-size:14px}
.vsbar b{color:var(--spark)}

.botFace{font-size:64px;animation:think 2s ease-in-out infinite}
@keyframes think{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.qCard{background:var(--ink-2);border-radius:22px;padding:22px 22px;max-width:330px;
       display:flex;flex-direction:column;gap:6px;align-items:center}
.qCard .n{font-size:11px;color:var(--dim);font-weight:500;letter-spacing:.16em}
.qCard .q{font-size:26px;line-height:1.45;text-align:center}
.ansRow{display:flex;gap:9px;width:min(320px,88vw)}
.ansRow button{flex:1;border-radius:16px;padding:16px 0;font-size:17px;border:2px solid var(--line);
               background:var(--ink-2);transition:.12s}
.ansRow button:active{transform:scale(.95)}
.ansRow .yes{color:var(--hit);border-color:#2C5F44}
.ansRow .no{color:var(--hot);border-color:#5F2C38}
.ansRow .dun{color:var(--dim)}

.guessEm{font-size:96px;animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.guessTxt{font-size:28px}
.guessTxt b{color:var(--spark)}
</style>
</head>
<body>

<section id="start" class="screen on center">
  <div class="hero">🔮 🤖</div>
  <h1>G18 <em>機器人讀心術</em></h1>
  <p class="sub"><b>心裡偷偷想一個東西</b>（不要說出來）——<br>
  <b>動物、食物或職業</b>都可以。<br>
  機器人問你幾個問題，就能猜出來 😏<br><br>
  想常見一點的，機器人才認識。</p>
  <div class="vsbar" id="vsbar"></div>
  <button class="big" id="go">我想好了！</button>
  <a class="back" href="index.html">← 回遊戲間</a>
</section>

<section id="catsel" class="screen center">
  <div class="hero">🔮</div>
  <div class="guessTxt">你想的是哪一類？</div>
  <div class="ansRow" style="max-width:280px;flex-direction:column">
    <button class="yes" data-cat="animal">🐾 動物</button>
    <button class="yes" data-cat="food">🍎 食物</button>
    <button class="yes" data-cat="job">👮 職業</button>
  </div>
</section>

<section id="ask" class="screen center">
  <div class="botFace">🤖</div>
  <div class="qCard">
    <div class="n" id="qN">問 題 1</div>
    <div class="q" id="qTxt">牠有毛毛的嗎？</div>
  </div>
  <div class="ansRow">
    <button class="yes" id="ansYes">是 ✅</button>
    <button class="no" id="ansNo">不是 ❌</button>
    <button class="dun" id="ansDun">不知道 🤷</button>
  </div>
</section>

<section id="guess" class="screen center">
  <div class="guessEm" id="gEm">🐘</div>
  <div class="guessTxt">你想的是不是——<b id="gName">大象</b>！</div>
  <div class="ansRow" style="max-width:320px">
    <button class="yes" id="gYes">猜對了 😱</button>
    <button class="no" id="gNo">猜錯了 😝</button>
  </div>
</section>

<section id="result" class="screen center">
  <div class="guessEm" id="rEm">🎉</div>
  <div class="guessTxt" id="rTxt">機器人猜對了！</div>
  <p class="sub" id="rSub"></p>
  <button class="big" id="again">再玩一次（換個人想）</button>
  <a class="back" href="index.html">← 回遊戲間</a>
</section>

<script src="family-players.js?v=5"></script>

let ac = null;
function beep(f, dur=0.1, type='sine', gain=0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    f.forEach((hz,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = hz;
      const t = ac.currentTime + i*dur*0.8;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+dur+0.02);
    });
  } catch(_) {}
}
const SFX = {
  q:    () => beep([600,750], 0.07, 'sine', 0.09),
  win:  () => beep([523,659,784,1047,1319], 0.12, 'triangle', 0.18),
  lose: () => beep([440,349,262], 0.15, 'sawtooth', 0.11),
  drum: () => beep([220,220,220,220], 0.09, 'square', 0.09),
};

const TALLY_KEY = 'g18-tally-v1';
const S = {
  answers: [],        // [attrIdx, val(1/-1)]
  asked: new Set(),
  qCount: 0, guesses: 0,
  candidates: [],
  bot: 0, human: 0,
};
try {
  const t = JSON.parse(localStorage.getItem(TALLY_KEY)) || {};
  S.bot = t.bot || 0; S.human = t.human || 0;
} catch(_){}

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

function paintVs() {
  $('vsbar').innerHTML =
    `<span>🤖 機器人 <b>${S.bot}</b> 勝</span><span>👨‍👦‍👦 人類 <b>${S.human}</b> 勝</span>`;
}
function saveTally() {
  try { localStorage.setItem(TALLY_KEY, JSON.stringify({ bot:S.bot, human:S.human })); } catch(_){}
}

/* 分數：答案符合 +1、不符合 -1 */
function scoreOf(an) {
  let s = 0;
  S.answers.forEach(([ai, val]) => {
    const has = an.v[ai] ? 1 : -1;
    s += (has === val) ? 1 : -1;
  });
  return s;
}
function topCandidates() {
  const scored = S.db.items.filter(a => !a.dead).map(a => ({ a, s: scoreOf(a) }));
  scored.sort((x,y) => y.s - x.s);
  const best = scored.length ? scored[0].s : 0;
  return { list: scored.filter(x => x.s >= best - 1).map(x => x.a), all: scored };
}

/* 挑最能把候選人切成兩半的問題 */
function pickQuestion() {
  const { list } = topCandidates();
  let bestQ = -1, bestGap = 1e9;
  for (let qi = 0; qi < S.db.questions.length; qi++) {
    if (S.asked.has(qi)) continue;
    const yes = list.filter(a => a.v[qi]).length;
    const gap = Math.abs(yes - (list.length - yes));
    if (gap < bestGap) { bestGap = gap; bestQ = qi; }
  }
  return bestQ;
}

function newRound(cat) {
  S.db = DB[cat];
  S.db.items.forEach(a => delete a.dead);
  S.answers = [];
  S.asked = new Set();
  S.qCount = 0;
  S.guesses = 0;
  nextStep();
}

function nextStep() {
  const { list } = topCandidates();
  /* 該猜了嗎？候選只剩 1~2 個，或問滿 9 題 */
  if (!list.length) return surrender();
  if (list.length <= 2 || S.qCount >= 9 || S.asked.size >= S.db.questions.length) return makeGuess();

  const qi = pickQuestion();
  if (qi < 0) return makeGuess();
  S.curQ = qi;
  S.qCount++;
  $('qN').textContent = `問 題 ${S.qCount}`;
  $('qTxt').textContent = S.db.questions[qi];
  show('ask');
  SFX.q();
}

function answer(val) {
  S.asked.add(S.curQ);
  if (val !== 0) S.answers.push([S.curQ, val]);
  nextStep();
}
$('ansYes').onclick = () => answer(1);
$('ansNo').onclick  = () => answer(-1);
$('ansDun').onclick = () => answer(0);

function makeGuess() {
  const { all } = topCandidates();
  const alive = all.filter(x => !x.a.dead);
  if (!alive.length) return surrender();
  S.guessing = alive[0].a;
  S.guesses++;
  $('gEm').textContent = S.guessing.em;
  $('gName').textContent = S.guessing.zh;
  show('guess');
  SFX.drum();
}

$('gYes').onclick = () => {
  S.bot++; saveTally();
  $('rEm').textContent = '🤖✨';
  $('rTxt').innerHTML = `機器人猜對了！是 <b style="color:var(--spark)">${S.guessing.em} ${S.guessing.zh}</b>`;
  $('rSub').textContent = `只問了 ${S.qCount} 個問題就讀到你的心 😏`;
  show('result');
  SFX.win();
};
$('gNo').onclick = () => {
  S.guessing.dead = true;
  if (S.guesses >= 3) return surrender();
  makeGuess();
};

function surrender() {
  S.human++; saveTally();
  $('rEm').textContent = '🏳️';
  $('rTxt').textContent = '機器人投降！你贏了！';
  $('rSub').textContent = '你想的太厲害，機器人猜不到。快告訴大家答案是什麼！';
  show('result');
  SFX.lose();
}

$('go').onclick = () => { beep([440], 0.06); show('catsel'); };
document.querySelectorAll('[data-cat]').forEach(b =>
  b.addEventListener('click', () => { beep([600], 0.05); newRound(b.dataset.cat); }));
$('again').onclick = () => { paintVs(); show('start'); };

paintVs();
</script>
