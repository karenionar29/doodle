<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>畫給機器人猜</title>
<style>
/* ============================================================
   視覺：深夜實驗室 × 白紙。機器人住在深藍裡，紙是唯一的亮面。
   ============================================================ */
:root{
  --ink:#0B1B2B;        /* 深藍：機器人的世界 */
  --ink-2:#132A42;      /* 深藍淺一階：卡片 */
  --paper:#FDFCF7;      /* 紙白：唯一的亮面 */
  --wire:#3EE6D0;       /* 電光青：機器人在想事情 */
  --spark:#FFD23F;      /* 螢光黃：得分、慶祝 */
  --hot:#FF5C6C;        /* 珊瑚紅：倒數告急 */
  --dim:#7E9BB5;        /* 次要文字 */
  --pen:#101820;        /* 筆跡 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  font-weight:700;
  display:flex;flex-direction:column;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ---------- 通用畫面 ---------- */
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

/* ---------- 開場 ---------- */
#start{justify-content:center;align-items:center;text-align:center;gap:22px;padding:24px}
.bot{font-size:64px;line-height:1;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:30px;letter-spacing:.02em;line-height:1.3}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:15px;font-weight:500;line-height:1.7;max-width:20em}
.who{display:flex;gap:12px;margin-top:6px}
.who button{
  background:var(--ink-2);border:2px solid #24435E;border-radius:18px;
  padding:16px 22px;min-width:132px;transition:.15s;
}
.who button:active{transform:scale(.95)}
.who button:hover{border-color:var(--wire)}
.who b{display:block;font-size:20px}
.who span{display:block;font-size:12px;color:var(--dim);font-weight:500;margin-top:4px}

/* ---------- 載入 ---------- */
#loading{justify-content:center;align-items:center;text-align:center;gap:18px;padding:32px}
.bar{width:min(280px,80vw);height:10px;background:var(--ink-2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0%;background:var(--wire);border-radius:99px;transition:width .3s}
#loadNote{color:var(--dim);font-size:13px;font-weight:500;line-height:1.7;max-width:22em}
.err{color:var(--hot);font-size:13px;font-weight:500;max-width:24em;line-height:1.7;text-align:left;
     background:var(--ink-2);padding:14px;border-radius:12px;border-left:3px solid var(--hot)}

/* ---------- 遊戲 ---------- */
#play{padding:10px 12px 12px;gap:8px}
.topbar{display:flex;align-items:center;gap:10px}
.pill{background:var(--ink-2);border-radius:99px;padding:7px 13px;font-size:15px;white-space:nowrap}
.pill.spark{color:var(--spark)}
#timer{margin-left:auto;font-variant-numeric:tabular-nums;font-size:19px;min-width:56px;text-align:center}
#timer.hot{color:var(--hot);animation:pulse .5s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.14)}}

.task{text-align:center;padding:2px 0 4px}
.task .lead{font-size:12px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.task .word{font-size:34px;line-height:1.15;margin-top:2px}
.task .en{font-size:14px;color:var(--wire);font-weight:500;letter-spacing:.05em}

.sheet{
  position:relative;flex:1;min-height:0;
  background:var(--paper);border-radius:16px;overflow:hidden;
  box-shadow:0 10px 34px rgba(0,0,0,.42);
}
#pad{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
.hint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#C9CFD6;font-size:17px;font-weight:600;pointer-events:none;transition:opacity .25s
}
.hint.gone{opacity:0}

/* 機器人的思考氣泡 —— 這是整個遊戲的招牌 */
.think{
  display:flex;align-items:center;gap:9px;min-height:46px;
  background:var(--ink-2);border-radius:14px;padding:8px 12px;
}
.think .face{font-size:24px;flex:none;transition:transform .2s}
.think.busy .face{animation:tilt .9s ease-in-out infinite}
@keyframes tilt{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.guesses{display:flex;gap:6px;flex-wrap:wrap;align-items:center;min-width:0}
.g{
  background:#1E3A55;border-radius:99px;padding:5px 11px;font-size:14px;white-space:nowrap;
  animation:pop .18s ease-out;
}
.g.hit{background:var(--spark);color:var(--ink)}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.idle{color:var(--dim);font-size:14px;font-weight:500}

.tools{display:flex;gap:10px}
.tools button{
  flex:1;background:var(--ink-2);border:2px solid #24435E;border-radius:14px;
  padding:14px 0;font-size:16px;transition:.12s
}
.tools button:active{transform:scale(.96)}
#skipBtn{color:var(--dim)}

/* ---------- 慶祝 ---------- */
#burst{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  pointer-events:none;z-index:9;
}
#burst.on{display:flex}
#burst b{
  font-size:56px;color:var(--spark);text-shadow:0 6px 30px rgba(255,210,63,.55);
  animation:boom .55s cubic-bezier(.2,1.6,.4,1);
}
@keyframes boom{from{transform:scale(.3) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* ---------- 結算 ---------- */
#over{justify-content:center;align-items:center;text-align:center;gap:18px;padding:28px}
#over .score{font-size:74px;color:var(--spark);line-height:1}
#over .lab{color:var(--dim);font-size:14px;font-weight:500}
.gallery{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:340px}
.gallery span{background:var(--ink-2);border-radius:99px;padding:6px 12px;font-size:14px}
#again{
  background:var(--wire);color:var(--ink);border-radius:16px;padding:16px 34px;font-size:18px;margin-top:6px
}
#again:active{transform:scale(.96)}
</style>
</head>
<body>

<!-- ================= 開場 ================= -->
<section id="start" class="screen on">
  <div class="bot">🤖</div>
  <h1>畫給機器人猜<br><em>它住在你的平板裡</em></h1>
  <p class="sub">機器人不會上網、不會偷看，它就住在這台平板裡面。<br>你畫，它猜。</p>
  <div class="who">
    <button data-mode="george"><b>George</b><span>小一 · 慢一點</span></button>
    <button data-mode="win"><b>Win</b><span>小三 · 快一點</span></button>
  </div>
</section>

<!-- ================= 載入 ================= -->
<section id="loading" class="screen">
  <div class="bot">🤖</div>
  <div style="font-size:19px">機器人正在搬進來…</div>
  <div class="bar"><i id="barFill"></i></div>
  <p id="loadNote">第一次要下載大腦（大約 20MB）。<br>下載完會記住，下次一秒就好。</p>
</section>

<!-- ================= 遊戲 ================= -->
<section id="play" class="screen">
  <div class="topbar">
    <div class="pill" id="whoTag">George</div>
    <div class="pill spark">⭐ <span id="score">0</span></div>
    <div class="pill" id="timer">20</div>
  </div>

  <div class="task">
    <div class="lead">請 你 畫</div>
    <div class="word" id="word">貓</div>
    <div class="en" id="wordEn">cat</div>
  </div>

  <div class="sheet">
    <canvas id="pad"></canvas>
    <div class="hint" id="hint">用手指在這裡畫</div>
  </div>

  <div class="think" id="think">
    <div class="face" id="face">🤖</div>
    <div class="guesses" id="guesses"><span class="idle">機器人在等你動筆…</span></div>
  </div>

  <div class="tools">
    <button id="clearBtn">🧽 重畫</button>
    <button id="skipBtn">跳過 →</button>
  </div>
</section>

<!-- ================= 慶祝 ================= -->
<div id="burst"><b id="burstText">猜到了！</b></div>

<!-- ================= 結算 ================= -->
<section id="over" class="screen">
  <div class="bot">🎉</div>
  <div class="lab">機器人猜對了</div>
  <div class="score" id="finalScore">0</div>
  <div class="lab">張圖</div>
  <div class="gallery" id="gallery"></div>
  <button id="again">再玩一次</button>
</section>

<script type="module">
/* ==============================================================
   CONFIG —— 所有可調參數集中在這裡。換皮 / 調難度只改這一塊。
   ============================================================== */
const CONFIG = {
  // --- AI 層（可抽換：換模型只改這兩行）---
  LIB:   'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2',
  MODEL: 'Xenova/quickdraw-mobilevit-small',   // 專門認塗鴉的模型

  // --- 推論 ---
  INFER_MS:    450,   // 每隔幾毫秒猜一次
  INFER_SIZE:  224,   // 送進模型前縮到幾 px
  SHOW_TOP:    3,     // 氣泡裡顯示幾個猜測
  MIN_STROKES: 1,     // 至少畫幾筆才開始猜

  // --- 畫布 ---
  PAD_RES:    512,    // 畫布內部解析度
  PEN_WIDTH:  14,     // 筆粗（相對 PAD_RES）

  // --- 難度（兩個小孩各一組）---
  MODES: {
    george: { name:'George', seconds:25, winTopN:3, minConf:0.05, pool:'easy' },
    win:    { name:'Win',    seconds:15, winTopN:2, minConf:0.10, pool:'all'  },
  },
};

/* ==============================================================
   題庫 —— 英文標籤必須是 QuickDraw 的類別名。
   程式啟動後會跟「模型實際認得的標籤」取交集，
   模型不認得的題目會自動被剔除，所以就算這裡寫錯也不會壞。
   ============================================================== */
const WORDS = {
  // easy：小一也畫得出來
  easy: {
    'sun':'太陽','moon':'月亮','star':'星星','cloud':'雲','tree':'樹','flower':'花',
    'house':'房子','cat':'貓','dog':'狗','fish':'魚','bird':'鳥','snake':'蛇',
    'apple':'蘋果','banana':'香蕉','car':'汽車','key':'鑰匙','cup':'杯子','hat':'帽子',
    'door':'門','ladder':'梯子','umbrella':'雨傘','eye':'眼睛','hand':'手','clock':'時鐘',
    'ice cream':'冰淇淋','pizza':'披薩','t-shirt':'T恤','shoe':'鞋子','book':'書','pants':'褲子',
  },
  // 只有 Win 會遇到的加碼題
  extra: {
    'elephant':'大象','lion':'獅子','tiger':'老虎','octopus':'章魚','crab':'螃蟹',
    'shark':'鯊魚','whale':'鯨魚','penguin':'企鵝','duck':'鴨子','frog':'青蛙',
    'pig':'豬','horse':'馬','rabbit':'兔子','bear':'熊','owl':'貓頭鷹','spider':'蜘蛛',
    'butterfly':'蝴蝶','bee':'蜜蜂','snail':'蝸牛','dolphin':'海豚','dragon':'龍',
    'airplane':'飛機','bicycle':'腳踏車','train':'火車','bus':'公車','truck':'卡車',
    'rocket':'火箭','helicopter':'直升機','sailboat':'帆船',
    'mountain':'山','rainbow':'彩虹','lightning':'閃電','snowflake':'雪花','leaf':'葉子',
    'hamburger':'漢堡','cake':'蛋糕','donut':'甜甜圈','carrot':'紅蘿蔔','strawberry':'草莓',
    'cookie':'餅乾','bread':'麵包','mushroom':'蘑菇',
    'sword':'劍','crown':'皇冠','guitar':'吉他','drums':'鼓','camera':'相機',
    'television':'電視','light bulb':'電燈泡','candle':'蠟燭','hammer':'鎚子','scissors':'剪刀',
    'pencil':'鉛筆','chair':'椅子','skull':'骷髏頭','snowman':'雪人','castle':'城堡',
    'bridge':'橋','windmill':'風車','tent':'帳篷','wheel':'輪子','basketball':'籃球',
  },
};

/* ==============================================================
   Web Worker —— 模型推論跑在背景執行緒，絕不卡住畫布。
   （單檔 HTML 沒有獨立的 worker.js，所以用 Blob 生一個。）
   ============================================================== */
const WORKER_SRC = `
import { pipeline, RawImage, env } from '${CONFIG.LIB}';
env.allowLocalModels = false;

let clf = null;

self.onmessage = async (e) => {
  const m = e.data;

  if (m.type === 'init') {
    try {
      clf = await pipeline('image-classification', m.model, {
        quantized: false,
        progress_callback: (p) => {
          if (p.status === 'progress' && typeof p.progress === 'number') {
            self.postMessage({ type:'progress', progress: p.progress });
          }
        }
      });
      const id2label = clf.model.config.id2label || {};
      self.postMessage({ type:'ready', labels: Object.values(id2label) });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
    return;
  }

  if (m.type === 'classify' && clf) {
    try {
      const img = new RawImage(m.data, m.w, m.h, 4).grayscale();
      const out = await clf(img, { topk: 5 });
      self.postMessage({ type:'result', out, seq: m.seq });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
  }
};
`;

/* ==============================================================
   音效 —— Web Audio 程式合成，零音檔。
   ============================================================== */
let ac = null;
function beep(freqs, dur = 0.1, type = 'sine', gain = 0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    freqs.forEach((f, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type;
      o.frequency.value = f;
      const t0 = ac.currentTime + i * dur * 0.8;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(gain, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    });
  } catch (_) { /* 音效失敗不該影響遊戲 */ }
}
const SFX = {
  win:  () => beep([523, 659, 784, 1047], 0.11, 'triangle', 0.16),
  skip: () => beep([392, 294], 0.09, 'sine', 0.09),
  tick: () => beep([880], 0.05, 'square', 0.05),
  go:   () => beep([392, 523], 0.1, 'triangle', 0.12),
  done: () => beep([523, 659, 784, 1047, 1319], 0.13, 'triangle', 0.18),
};

/* ==============================================================
   遊戲狀態
   ============================================================== */
const S = {
  mode: null,        // CONFIG.MODES 裡的一組
  deck: [],          // 這一局的題目佇列
  target: null,      // { en, zh }
  score: 0,
  won: [],           // 猜對過的題目（結算展示）
  strokes: 0,
  drawing: false,
  left: 0,
  timerId: null,
  inferId: null,
  busy: false,       // worker 正在算
  seq: 0,
  ready: false,
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

/* ---------- 畫布 ---------- */
const pad = $('pad');
const ctx = pad.getContext('2d', { willReadFrequently: true });
pad.width = CONFIG.PAD_RES;
pad.height = CONFIG.PAD_RES;

function clearPad() {
  ctx.fillStyle = '#FFFFFF';           // QuickDraw 是白底黑線
  ctx.fillRect(0, 0, pad.width, pad.height);
  ctx.strokeStyle = '#101820';
  ctx.lineWidth = CONFIG.PEN_WIDTH;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  S.strokes = 0;
  $('hint').classList.remove('gone');
  $('guesses').innerHTML = '<span class="idle">機器人在等你動筆…</span>';
  $('think').classList.remove('busy');
}

function padXY(ev) {
  const r = pad.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) / r.width * pad.width,
    y: (ev.clientY - r.top) / r.height * pad.height,
  };
}

pad.addEventListener('pointerdown', (e) => {
  if (!S.ready || !S.target) return;
  e.preventDefault();
  pad.setPointerCapture(e.pointerId);
  S.drawing = true;
  S.strokes++;
  $('hint').classList.add('gone');
  const p = padXY(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + 0.01, p.y);   // 單點也要留下痕跡
  ctx.stroke();
});
pad.addEventListener('pointermove', (e) => {
  if (!S.drawing) return;
  e.preventDefault();
  const p = padXY(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});
const endStroke = () => { S.drawing = false; };
pad.addEventListener('pointerup', endStroke);
pad.addEventListener('pointercancel', endStroke);
pad.addEventListener('pointerleave', endStroke);

/* ---------- Worker ---------- */
let worker = null;
let LABELS = new Set();

function bootWorker() {
  const url = URL.createObjectURL(new Blob([WORKER_SRC], { type: 'text/javascript' }));
  worker = new Worker(url, { type: 'module' });

  worker.onmessage = (e) => {
    const m = e.data;

    if (m.type === 'progress') {
      $('barFill').style.width = Math.min(99, m.progress).toFixed(0) + '%';
    }

    else if (m.type === 'ready') {
      LABELS = new Set(m.labels.map(s => String(s).toLowerCase().trim()));
      $('barFill').style.width = '100%';
      S.ready = true;
      startRound();
    }

    else if (m.type === 'result') {
      S.busy = false;
      $('think').classList.remove('busy');
      if (m.seq === S.seq) render(m.out);
    }

    else if (m.type === 'error') {
      S.busy = false;
      fail(m.message);
    }
  };

  worker.onerror = (e) => fail(e.message || '載不到機器人的大腦');
  worker.postMessage({ type: 'init', model: CONFIG.MODEL });
}

function fail(msg) {
  show('loading');
  $('loadNote').outerHTML =
    `<div class="err"><b>機器人搬不進來</b><br>
     ${msg}<br><br>
     常見原因：網路擋掉了模型下載，或瀏覽器太舊。<br>
     這個檔案需要能連到 <b>cdn.jsdelivr.net</b> 和 <b>huggingface.co</b>。</div>`;
}

/* ---------- 出題 ---------- */
function buildDeck(pool) {
  const src = pool === 'easy'
    ? { ...WORDS.easy }
    : { ...WORDS.easy, ...WORDS.extra };

  // 關鍵：只留下「模型真的認得」的題目
  const deck = Object.entries(src)
    .filter(([en]) => LABELS.has(en))
    .map(([en, zh]) => ({ en, zh }));

  // 洗牌
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function nextWord() {
  if (!S.deck.length) S.deck = buildDeck(S.mode.pool);
  S.target = S.deck.pop();
  $('word').textContent = S.target.zh;
  $('wordEn').textContent = S.target.en;
  clearPad();
  S.left = S.mode.seconds;
  paintTimer();
  SFX.go();
}

function paintTimer() {
  $('timer').textContent = S.left;
  $('timer').classList.toggle('hot', S.left <= 5);
}

/* ---------- 每回合 ---------- */
function startRound() {
  show('play');
  $('whoTag').textContent = S.mode.name;
  S.score = 0;
  S.won = [];
  S.deck = buildDeck(S.mode.pool);
  $('score').textContent = '0';

  if (!S.deck.length) {
    fail('模型認得的類別跟題庫對不起來（題庫是空的）。');
    return;
  }

  nextWord();

  clearInterval(S.timerId);
  S.timerId = setInterval(() => {
    S.left--;
    paintTimer();
    if (S.left <= 3 && S.left > 0) SFX.tick();
    if (S.left <= 0) gameOver();
  }, 1000);

  clearInterval(S.inferId);
  S.inferId = setInterval(tryInfer, CONFIG.INFER_MS);
}

/* ---------- 推論 ---------- */
const mini = document.createElement('canvas');
mini.width = mini.height = CONFIG.INFER_SIZE;
const mctx = mini.getContext('2d', { willReadFrequently: true });

function tryInfer() {
  if (!S.ready || S.busy || !S.target) return;
  if (S.strokes < CONFIG.MIN_STROKES) return;

  mctx.fillStyle = '#FFFFFF';
  mctx.fillRect(0, 0, mini.width, mini.height);
  mctx.drawImage(pad, 0, 0, mini.width, mini.height);
  const img = mctx.getImageData(0, 0, mini.width, mini.height);

  S.busy = true;
  S.seq++;
  $('think').classList.add('busy');
  worker.postMessage({
    type: 'classify',
    data: img.data,
    w: img.width,
    h: img.height,
    seq: S.seq,
  }, [img.data.buffer]);
}

/* ---------- 顯示機器人的猜測 ---------- */
function render(out) {
  if (!S.target || !Array.isArray(out)) return;

  const top = out.slice(0, CONFIG.SHOW_TOP);
  const box = $('guesses');
  box.innerHTML = '';

  top.forEach(r => {
    const en = String(r.label).toLowerCase().trim();
    const zh = WORDS.easy[en] || WORDS.extra[en] || en;
    const el = document.createElement('span');
    el.className = 'g' + (en === S.target.en ? ' hit' : '');
    el.textContent = zh;
    box.appendChild(el);
  });

  // 命中判定：在前 N 名內 + 超過信心門檻
  const rank = out.findIndex(r =>
    String(r.label).toLowerCase().trim() === S.target.en
  );
  if (rank >= 0 && rank < S.mode.winTopN && out[rank].score >= S.mode.minConf) {
    hit();
  }
}

function hit() {
  S.score++;
  S.won.push(S.target.zh);
  $('score').textContent = S.score;
  SFX.win();

  $('burstText').textContent = `是「${S.target.zh}」！`;
  $('burst').classList.add('on');
  setTimeout(() => $('burst').classList.remove('on'), 750);

  S.target = null;              // 暫停判定，避免連續觸發
  setTimeout(() => { if (S.timerId) nextWord(); }, 800);
}

/* ---------- 結束 ---------- */
function gameOver() {
  clearInterval(S.timerId); S.timerId = null;
  clearInterval(S.inferId); S.inferId = null;
  SFX.done();

  $('finalScore').textContent = S.score;
  $('gallery').innerHTML = S.won.length
    ? S.won.map(w => `<span>${w}</span>`).join('')
    : '<span>下次一定畫得出來</span>';
  show('over');
}

/* ---------- 事件 ---------- */
document.querySelectorAll('.who button').forEach(b => {
  b.addEventListener('click', () => {
    S.mode = CONFIG.MODES[b.dataset.mode];
    beep([440], 0.06);                       // 解鎖 AudioContext
    if (S.ready) { startRound(); }
    else { show('loading'); bootWorker(); }
  });
});

$('clearBtn').addEventListener('click', () => {
  if (!S.target) return;
  clearPad();
});

$('skipBtn').addEventListener('click', () => {
  if (!S.target) return;
  SFX.skip();
  nextWord();
});

$('again').addEventListener('click', () => startRound());

clearPad();
</script>
</body>
