<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>畫給機器人猜</title>
<style>
:root{
  --ink:#0B1B2B; --ink-2:#132A42; --paper:#FDFCF7;
  --wire:#3EE6D0; --spark:#FFD23F; --hot:#FF5C6C; --dim:#7E9BB5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

/* 開場 */
#start{justify-content:center;align-items:center;text-align:center;gap:18px;padding:24px}
.bot{font-size:56px;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:27px;line-height:1.3}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:13px;font-weight:500;line-height:1.7;max-width:20em}
.pick{display:flex;flex-direction:column;gap:9px;width:min(300px,86vw)}
.pick button{
  background:var(--ink-2);border:2px solid #24435E;border-radius:16px;
  padding:14px;text-align:left;transition:.15s
}
.pick button:active{transform:scale(.96)}
.pick b{font-size:17px}
.pick span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px;line-height:1.5}

/* 載入 */
#loading{justify-content:center;align-items:center;text-align:center;gap:16px;padding:32px}
.bar{width:min(280px,80vw);height:10px;background:var(--ink-2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0%;background:var(--wire);transition:width .3s}
#loadNote{color:var(--dim);font-size:13px;font-weight:500;line-height:1.7;max-width:22em}
.err{color:var(--hot);font-size:13px;font-weight:500;max-width:24em;line-height:1.7;text-align:left;
     background:var(--ink-2);padding:14px;border-radius:12px;border-left:3px solid var(--hot)}

/* 換人 */
#relay{justify-content:center;align-items:center;text-align:center;gap:16px;padding:28px}
#relayWho{font-size:36px;color:var(--spark)}
#relayNote{color:var(--dim);font-size:14px;font-weight:500;line-height:1.7;max-width:20em}
#relayGo{background:var(--wire);color:var(--ink);border-radius:16px;padding:16px 40px;font-size:19px}

/* 遊戲 */
#play{padding:8px 10px 10px;gap:6px}
.topbar{display:flex;align-items:center;gap:8px}
.pill{background:var(--ink-2);border-radius:99px;padding:6px 12px;font-size:14px;white-space:nowrap}
.pill.spark{color:var(--spark)}
#timer{margin-left:auto;font-variant-numeric:tabular-nums;font-size:19px;min-width:52px;text-align:center}
#timer.hot{color:var(--hot);animation:pulse .5s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.15)}}

.task{text-align:center;padding:1px 0 3px}
.task .lead{font-size:11px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.task .word{font-size:31px;line-height:1.15}
.task .en{font-size:13px;color:var(--wire);font-weight:500}

.sheet{position:relative;flex:1;min-height:0;background:var(--paper);
       border-radius:16px;overflow:hidden;box-shadow:0 10px 34px rgba(0,0,0,.42)}
#pad{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
.hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:#C9CFD6;font-size:16px;font-weight:600;pointer-events:none;transition:opacity .25s}
.hint.gone{opacity:0}

/* 蠟筆盤 */
.crayons{display:flex;gap:7px;justify-content:center;padding:2px 0}
.crayons button{width:34px;height:34px;border-radius:50%;border:3px solid transparent;transition:.12s}
.crayons button.sel{border-color:var(--paper);transform:scale(1.16)}

/* 機器人思考氣泡 */
.think{display:flex;align-items:center;gap:8px;min-height:44px;
       background:var(--ink-2);border-radius:14px;padding:7px 11px}
.think .face{font-size:23px;flex:none}
.think.busy .face{animation:tilt .9s ease-in-out infinite}
@keyframes tilt{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.guesses{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-width:0}
.g{background:#1E3A55;border-radius:99px;padding:5px 10px;font-size:13px;white-space:nowrap;animation:pop .18s}
.g.hit{background:var(--spark);color:var(--ink)}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.idle{color:var(--dim);font-size:13px;font-weight:500}

.tools{display:flex;gap:8px}
.tools button{flex:1;background:var(--ink-2);border:2px solid #24435E;border-radius:14px;padding:12px 0;font-size:15px}
.tools button:active{transform:scale(.96)}
#timeBtn{color:var(--wire)}
#skipBtn{color:var(--dim)}

/* 慶祝 */
#burst{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:9}
#burst.on{display:flex}
#burst b{font-size:48px;color:var(--spark);text-shadow:0 6px 30px rgba(255,210,63,.55);
         animation:boom .55s cubic-bezier(.2,1.6,.4,1);text-align:center;padding:0 20px}
@keyframes boom{from{transform:scale(.3) rotate(-12deg);opacity:0}to{transform:scale(1);opacity:1}}

/* 結算 */
#over{justify-content:center;align-items:center;text-align:center;gap:14px;padding:26px}
#over h2{font-size:24px}
.board{display:flex;flex-direction:column;gap:8px;width:min(320px,86vw)}
.row{display:flex;align-items:center;gap:12px;background:var(--ink-2);border-radius:14px;padding:13px 16px}
.row.top{background:var(--spark);color:var(--ink)}
.row .rk{font-size:20px;width:30px}
.row .nm{flex:1;text-align:left;font-size:17px}
.row .sc{font-size:20px}
#again{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 34px;font-size:17px;margin-top:6px}
</style>
</head>
<body>

<section id="start" class="screen on">
  <div class="bot">🤖</div>
  <h1>畫給機器人猜<br><em>它住在你的平板裡</em></h1>
  <p class="sub">機器人不會上網、不會偷看，它就住在這台平板裡面。</p>
  <div class="pick">
    <button data-mode="party"><b>👨‍👦‍👦 三個人比賽</b><span>George → Win → 爸爸 輪流畫，看誰讓機器人猜對最多</span></button>
    <button data-mode="george"><b>🧒 George 一個人玩</b><span>45 秒 · 題目簡單</span></button>
    <button data-mode="win"><b>🧑 Win 一個人玩</b><span>35 秒 · 題目全開</span></button>
    <button data-mode="dad"><b>🧔 爸爸一個人玩</b><span>25 秒 · 題目全開 · 判定最嚴</span></button>
  </div>
</section>

<section id="loading" class="screen">
  <div class="bot">🤖</div>
  <div style="font-size:19px">機器人正在搬進來…</div>
  <div class="bar"><i id="barFill"></i></div>
  <p id="loadNote">第一次要下載大腦（約 20MB）。<br>下載完會記住，下次一秒就好。</p>
</section>

<section id="relay" class="screen">
  <div class="bot">🎨</div>
  <div id="relayWho">換 George！</div>
  <p id="relayNote">把平板交給他。</p>
  <button id="relayGo">我準備好了</button>
</section>

<section id="play" class="screen">
  <div class="topbar">
    <div class="pill" id="whoTag">George</div>
    <div class="pill spark">⭐ <span id="score">0</span></div>
    <div class="pill" id="timer">45</div>
  </div>

  <div class="task">
    <div class="lead">請 你 畫</div>
    <div class="word" id="word">貓</div>
    <div class="en" id="wordEn">cat</div>
  </div>

  <div class="sheet">
    <canvas id="pad"></canvas>
    <div class="hint" id="hint">用手指在這裡畫</div>
  </div>

  <div class="crayons" id="crayons"></div>

  <div class="think" id="think">
    <div class="face" id="face">🤖</div>
    <div class="guesses" id="guesses"><span class="idle">機器人在等你動筆…</span></div>
  </div>

  <div class="tools">
    <button id="clearBtn">🧽 重畫</button>
    <button id="timeBtn">+10 秒</button>
    <button id="skipBtn">跳過 →</button>
  </div>
</section>

<div id="burst"><b id="burstText">猜到了！</b></div>

<section id="over" class="screen">
  <div class="bot">🎉</div>
  <h2 id="overTitle">比賽結果</h2>
  <div class="board" id="board"></div>
  <button id="again">再玩一次</button>
</section>

<script type="module">
/* ==============================================================
   CONFIG —— 所有可調參數集中在這裡
   ============================================================== */
const CONFIG = {
  LIB:   'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2',
  MODEL: 'Xenova/quickdraw-mobilevit-small',

  INFER_MS:  350,   // 每隔幾毫秒猜一次
  SHOW_TOP:  3,     // 氣泡顯示幾個猜測
  PAD_RES:   600,   // 畫布內部解析度
  BRUSH:     18,    // 筆粗
  CROP_PAD:  8,     // 裁切塗鴉時外圍留白
  MIN_BOX:   24,    // 塗鴉小於這尺寸先不猜
  ADD_TIME:  10,    // +10 秒按鈕

  // 讓比賽公平：年紀小的時間長、題目簡單、判定寬鬆
  PLAYERS: {
    george: { name:'George', emoji:'🧒', seconds:45, winTopN:3, minConf:0.05, pool:'easy' },
    win:    { name:'Win',    emoji:'🧑', seconds:35, winTopN:2, minConf:0.08, pool:'all'  },
    dad:    { name:'爸爸',   emoji:'🧔', seconds:25, winTopN:1, minConf:0.10, pool:'all'  },
  },
  PARTY_ORDER: ['george', 'win', 'dad'],

  CRAYONS: ['#E63946','#F77F00','#FCBF49','#43AA8B','#277DA1','#9D4EDD','#101820'],
};

/* 題庫：英文必須是 QuickDraw 類別名。
   啟動後會跟「模型實際認得的標籤」取交集，認不得的自動剔除。 */
const WORDS = {
  easy: {
    'sun':'太陽','moon':'月亮','star':'星星','cloud':'雲','tree':'樹','flower':'花',
    'house':'房子','cat':'貓','dog':'狗','fish':'魚','bird':'鳥','snake':'蛇',
    'apple':'蘋果','banana':'香蕉','car':'汽車','key':'鑰匙','cup':'杯子','hat':'帽子',
    'door':'門','ladder':'梯子','umbrella':'雨傘','eye':'眼睛','hand':'手',
    'ice cream':'冰淇淋','pizza':'披薩','t-shirt':'T恤','shoe':'鞋子','book':'書',
  },
  extra: {
    'elephant':'大象','lion':'獅子','tiger':'老虎','octopus':'章魚','crab':'螃蟹',
    'shark':'鯊魚','whale':'鯨魚','penguin':'企鵝','duck':'鴨子','frog':'青蛙',
    'pig':'豬','horse':'馬','rabbit':'兔子','bear':'熊','owl':'貓頭鷹','spider':'蜘蛛',
    'butterfly':'蝴蝶','bee':'蜜蜂','snail':'蝸牛','dolphin':'海豚','dragon':'龍',
    'airplane':'飛機','bicycle':'腳踏車','train':'火車','bus':'公車','truck':'卡車',
    'rocket':'火箭','helicopter':'直升機','sailboat':'帆船',
    'mountain':'山','rainbow':'彩虹','lightning':'閃電','snowflake':'雪花','leaf':'葉子',
    'hamburger':'漢堡','cake':'蛋糕','donut':'甜甜圈','carrot':'紅蘿蔔','strawberry':'草莓',
    'cookie':'餅乾','bread':'麵包','mushroom':'蘑菇',
    'sword':'劍','crown':'皇冠','guitar':'吉他','drums':'鼓','camera':'相機',
    'television':'電視','light bulb':'電燈泡','candle':'蠟燭','hammer':'鎚子','scissors':'剪刀',
    'pencil':'鉛筆','chair':'椅子','skull':'骷髏頭','snowman':'雪人','castle':'城堡',
    'bridge':'橋','windmill':'風車','tent':'帳篷','wheel':'輪子','basketball':'籃球',
  },
};

/* ==============================================================
   Web Worker
   ★ 關鍵修正 ★
   模型吃的是「黑底白線」的單通道灰階圖。
   官方做法：從 canvas 的 alpha 通道取值。
     有畫到 → alpha 255 → 白
     沒畫到 → alpha 0   → 黑
   所以「機器人專用畫布」必須保持【透明背景】，絕不能填白色。
   ============================================================== */
const WORKER_SRC = `
import { pipeline, RawImage, env } from '${CONFIG.LIB}';
env.allowLocalModels = false;

let clf = null;

self.onmessage = async (e) => {
  const m = e.data;

  if (m.type === 'init') {
    try {
      clf = await pipeline('image-classification', m.model, {
        quantized: false,
        progress_callback: (p) => {
          if (p.status === 'progress' && typeof p.progress === 'number') {
            self.postMessage({ type:'progress', progress: p.progress });
          }
        }
      });
      const id2label = clf.model.config.id2label || {};
      self.postMessage({ type:'ready', labels: Object.values(id2label) });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
    return;
  }

  if (m.type === 'classify' && clf) {
    try {
      const gray = new Uint8ClampedArray(m.data.length / 4);
      for (let i = 0; i < gray.length; ++i) gray[i] = m.data[i * 4 + 3];
      const img = new RawImage(gray, m.w, m.h, 1);
      const out = await clf(img, { topk: 5 });
      self.postMessage({ type:'result', out, seq: m.seq });
    } catch (err) {
      self.postMessage({ type:'error', message: String(err && err.message || err) });
    }
  }
};
`;

/* ---------- 音效（Web Audio 合成，零音檔） ---------- */
let ac = null;
function beep(freqs, dur = 0.1, type = 'sine', gain = 0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    freqs.forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = f;
      const t0 = ac.currentTime + i * dur * 0.8;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(gain, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    });
  } catch (_) {}
}
const SFX = {
  win:  () => beep([523, 659, 784, 1047], 0.11, 'triangle', 0.16),
  skip: () => beep([392, 294], 0.09, 'sine', 0.09),
  tick: () => beep([880], 0.05, 'square', 0.05),
  go:   () => beep([392, 523], 0.1, 'triangle', 0.12),
  add:  () => beep([659, 880], 0.09, 'triangle', 0.13),
  done: () => beep([523, 659, 784, 1047, 1319], 0.13, 'triangle', 0.18),
};

/* ---------- 狀態 ---------- */
const S = {
  queue: [], cur: null, results: [],
  deck: [], target: null,
  score: 0, left: 0,
  strokes: 0, drawing: false, bbox: null,
  color: CONFIG.CRAYONS[0],
  timerId: null, inferId: null,
  busy: false, seq: 0, ready: false,
  solo: false,
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

/* ==============================================================
   兩張畫布
   pad   = 小孩看的：白紙 + 彩色蠟筆
   aiPad = 機器人看的：透明底 + 黑線（同座標，不顯示）
   ============================================================== */
const pad = $('pad');
const ctx = pad.getContext('2d', { willReadFrequently: true });
pad.width = pad.height = CONFIG.PAD_RES;

const aiPad = document.createElement('canvas');
aiPad.width = aiPad.height = CONFIG.PAD_RES;
const aic = aiPad.getContext('2d', { willReadFrequently: true });

function setupPens() {
  ctx.lineWidth = CONFIG.BRUSH; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = S.color;

  aic.lineWidth = CONFIG.BRUSH; aic.lineCap = 'round'; aic.lineJoin = 'round';
  aic.strokeStyle = '#000';
  aic.shadowColor = 'rgba(0,0,0,0.9)'; aic.shadowBlur = 1;
}

function clearPad() {
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, pad.width, pad.height);
  aic.clearRect(0, 0, aiPad.width, aiPad.height);   // 保持透明，絕不填白
  setupPens();
  S.strokes = 0;
  S.bbox = null;
  $('hint').classList.remove('gone');
  $('guesses').innerHTML = '<span class="idle">機器人在等你動筆…</span>';
  $('think').classList.remove('busy');
}

function xy(ev) {
  const r = pad.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) / r.width * pad.width,
    y: (ev.clientY - r.top) / r.height * pad.height,
  };
}

function grow(x, y) {
  const r = CONFIG.BRUSH / 2;
  if (!S.bbox) S.bbox = [x - r, y - r, x + r, y + r];
  else S.bbox = [
    Math.min(S.bbox[0], x - r), Math.min(S.bbox[1], y - r),
    Math.max(S.bbox[2], x + r), Math.max(S.bbox[3], y + r),
  ];
}

pad.addEventListener('pointerdown', (e) => {
  if (!S.ready || !S.target) return;
  e.preventDefault();
  pad.setPointerCapture(e.pointerId);
  S.drawing = true; S.strokes++;
  $('hint').classList.add('gone');
  const p = xy(e);
  [ctx, aic].forEach(c => {
    c.beginPath(); c.moveTo(p.x, p.y);
    c.arc(p.x, p.y, 0.5, 0, Math.PI * 2);
    c.stroke();
  });
  grow(p.x, p.y);
});
pad.addEventListener('pointermove', (e) => {
  if (!S.drawing) return;
  e.preventDefault();
  const p = xy(e);
  [ctx, aic].forEach(c => { c.lineTo(p.x, p.y); c.stroke(); });
  grow(p.x, p.y);
});
const stop = () => { S.drawing = false; };
pad.addEventListener('pointerup', stop);
pad.addEventListener('pointercancel', stop);
pad.addEventListener('pointerleave', stop);

/* ---------- 蠟筆盤 ---------- */
CONFIG.CRAYONS.forEach((c, i) => {
  const b = document.createElement('button');
  b.style.background = c;
  if (i === 0) b.classList.add('sel');
  b.addEventListener('click', () => {
    S.color = c;
    ctx.strokeStyle = c;
    document.querySelectorAll('#crayons button').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    beep([700], 0.05, 'sine', 0.06);
  });
  $('crayons').appendChild(b);
});

/* ---------- 把塗鴉裁成正方形（官方做法：讓圖填滿畫面） ---------- */
function cropSketch() {
  if (!S.bbox) return null;
  const [x1, y1, x2, y2] = S.bbox;
  let left = x1, top = y1;
  const w = x2 - x1, h = y2 - y1;
  if (Math.max(w, h) < CONFIG.MIN_BOX) return null;

  let size = 2 * CONFIG.CROP_PAD;
  if (w >= h) { size += w; top = Math.max(top - (w - h) / 2, 0); }
  else        { size += h; left = Math.max(left - (h - w) / 2, 0); }

  return aic.getImageData(
    Math.round(left - CONFIG.CROP_PAD),
    Math.round(top - CONFIG.CROP_PAD),
    Math.round(size), Math.round(size)
  );
}

/* ---------- Worker ---------- */
let worker = null;
let LABELS = new Set();

function bootWorker() {
  const url = URL.createObjectURL(new Blob([WORKER_SRC], { type: 'text/javascript' }));
  worker = new Worker(url, { type: 'module' });

  worker.onmessage = (e) => {
    const m = e.data;
    if (m.type === 'progress') {
      $('barFill').style.width = Math.min(99, m.progress).toFixed(0) + '%';
    } else if (m.type === 'ready') {
      LABELS = new Set(m.labels.map(s => String(s).toLowerCase().trim()));
      $('barFill').style.width = '100%';
      S.ready = true;
      nextPlayer();
    } else if (m.type === 'result') {
      S.busy = false;
      $('think').classList.remove('busy');
      if (m.seq === S.seq) render(m.out);
    } else if (m.type === 'error') {
      S.busy = false;
      fail(m.message);
    }
  };
  worker.onerror = (e) => fail(e.message || '載不到機器人的大腦');
  worker.postMessage({ type: 'init', model: CONFIG.MODEL });
}

function fail(msg) {
  show('loading');
  $('loadNote').outerHTML =
    `<div class="err"><b>機器人搬不進來</b><br>${msg}<br><br>
     這個檔案需要能連到 cdn.jsdelivr.net 和 huggingface.co。</div>`;
}

/* ---------- 出題 ---------- */
function buildDeck(pool) {
  const src = pool === 'easy' ? { ...WORDS.easy } : { ...WORDS.easy, ...WORDS.extra };
  const deck = Object.entries(src)
    .filter(([en]) => LABELS.has(en))
    .map(([en, zh]) => ({ en, zh }));
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function nextWord() {
  if (!S.deck.length) S.deck = buildDeck(S.cur.pool);
  S.target = S.deck.pop();
  $('word').textContent = S.target.zh;
  $('wordEn').textContent = S.target.en;
  clearPad();
  SFX.go();
}

function paintTimer() {
  $('timer').textContent = S.left;
  $('timer').classList.toggle('hot', S.left <= 5);
}

/* ---------- 輪替 ---------- */
function nextPlayer() {
  if (!S.queue.length) return finish();
  S.cur = CONFIG.PLAYERS[S.queue.shift()];

  if (S.solo) {
    startTurn();
  } else {
    $('relayWho').textContent = `${S.cur.emoji} 換 ${S.cur.name}！`;
    $('relayNote').textContent = `你有 ${S.cur.seconds} 秒。把平板交給他，其他人別偷看題目喔。`;
    show('relay');
  }
}

function startTurn() {
  show('play');
  $('whoTag').textContent = `${S.cur.emoji} ${S.cur.name}`;
  S.score = 0;
  S.deck = buildDeck(S.cur.pool);
  $('score').textContent = '0';

  if (!S.deck.length) { fail('模型認得的類別跟題庫對不起來。'); return; }

  S.left = S.cur.seconds;
  paintTimer();
  nextWord();

  clearInterval(S.timerId);
  S.timerId = setInterval(() => {
    S.left--;
    paintTimer();
    if (S.left <= 3 && S.left > 0) SFX.tick();
    if (S.left <= 0) endTurn();
  }, 1000);

  clearInterval(S.inferId);
  S.inferId = setInterval(tryInfer, CONFIG.INFER_MS);
}

function endTurn() {
  clearInterval(S.timerId); S.timerId = null;
  clearInterval(S.inferId); S.inferId = null;
  S.target = null;
  S.results.push({ name: S.cur.name, emoji: S.cur.emoji, score: S.score });
  SFX.done();
  nextPlayer();
}

function finish() {
  const sorted = [...S.results].sort((a, b) => b.score - a.score);
  const multi = sorted.length > 1;
  $('overTitle').textContent = multi ? '比賽結果' : '這回合結果';
  $('board').innerHTML = sorted.map((r, i) => `
    <div class="row ${i === 0 && multi ? 'top' : ''}">
      <div class="rk">${multi ? (['🥇','🥈','🥉'][i] || (i + 1)) : r.emoji}</div>
      <div class="nm">${r.name}</div>
      <div class="sc">${r.score}</div>
    </div>`).join('');
  show('over');
}

/* ---------- 推論 ---------- */
function tryInfer() {
  if (!S.ready || S.busy || !S.target || S.strokes < 1) return;
  const img = cropSketch();
  if (!img) return;

  S.busy = true; S.seq++;
  $('think').classList.add('busy');
  worker.postMessage(
    { type: 'classify', data: img.data, w: img.width, h: img.height, seq: S.seq },
    [img.data.buffer]
  );
}

function render(out) {
  if (!S.target || !Array.isArray(out)) return;
  const box = $('guesses');
  box.innerHTML = '';
  out.slice(0, CONFIG.SHOW_TOP).forEach(r => {
    const en = String(r.label).toLowerCase().trim();
    const zh = WORDS.easy[en] || WORDS.extra[en] || en;
    const el = document.createElement('span');
    el.className = 'g' + (en === S.target.en ? ' hit' : '');
    el.textContent = zh;
    box.appendChild(el);
  });

  const rank = out.findIndex(r => String(r.label).toLowerCase().trim() === S.target.en);
  if (rank >= 0 && rank < S.cur.winTopN && out[rank].score >= S.cur.minConf) hit();
}

function hit() {
  S.score++;
  $('score').textContent = S.score;
  SFX.win();
  $('burstText').textContent = `是「${S.target.zh}」！`;
  $('burst').classList.add('on');
  setTimeout(() => $('burst').classList.remove('on'), 700);
  S.target = null;
  setTimeout(() => { if (S.timerId) nextWord(); }, 750);
}

/* ---------- 事件 ---------- */
document.querySelectorAll('.pick button').forEach(b => {
  b.addEventListener('click', () => {
    const m = b.dataset.mode;
    S.solo = (m !== 'party');
    S.queue = S.solo ? [m] : [...CONFIG.PARTY_ORDER];
    S.results = [];
    beep([440], 0.06);
    if (S.ready) nextPlayer();
    else { show('loading'); bootWorker(); }
  });
});

$('relayGo').addEventListener('click', startTurn);
$('clearBtn').addEventListener('click', () => { if (S.target) clearPad(); });
$('skipBtn').addEventListener('click', () => { if (S.target) { SFX.skip(); nextWord(); } });
$('timeBtn').addEventListener('click', () => {
  if (!S.target) return;
  S.left += CONFIG.ADD_TIME;
  paintTimer();
  SFX.add();
});
$('again').addEventListener('click', () => show('start'));

clearPad();
</script>
</body>
</html>
