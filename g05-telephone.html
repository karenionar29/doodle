<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>G05 傳話大亂畫</title>
<style>
:root{
  --ink:#2B1B0E; --ink-2:#41301C; --line:#5E4726; --paper:#FDFCF7;
  --wire:#FFB84C; --spark:#FFD23F; --hot:#FF5C6C; --dim:#B39B7E; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

#start{justify-content:center;align-items:center;text-align:center;gap:14px;padding:22px}
.hero{font-size:40px}
h1{font-size:25px;line-height:1.35}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:13px;font-weight:500;line-height:1.8;max-width:22em}
#go{background:var(--wire);color:var(--ink);border-radius:18px;padding:16px 42px;font-size:19px}
.tiny{font-size:11px;color:var(--dim);font-weight:500;max-width:22em;line-height:1.7}
.back{color:var(--dim);font-size:12px;text-decoration:underline}

#loading{justify-content:center;align-items:center;text-align:center;gap:16px;padding:30px}
.bar{width:min(280px,80vw);height:10px;background:var(--ink-2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0%;background:var(--wire);transition:width .3s}
#loadNote{color:var(--dim);font-size:13px;font-weight:500;line-height:1.7;max-width:22em}
.err{color:var(--hot);font-size:13px;font-weight:500;max-width:24em;line-height:1.7;text-align:left;
     background:var(--ink-2);padding:14px;border-radius:12px;border-left:3px solid var(--hot)}

#relay{justify-content:center;align-items:center;text-align:center;gap:14px;padding:26px}
#relayWho{font-size:34px;color:var(--spark)}
#relayJob{font-size:15px;color:var(--dim);font-weight:500;line-height:1.8;max-width:19em}
#relayGo{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 40px;font-size:18px}
.round{font-size:12px;color:var(--dim);font-weight:500;letter-spacing:.1em}

#draw{padding:6px 10px 8px;gap:5px}
.jobbar{display:flex;align-items:center;gap:8px}
.pill{background:var(--ink-2);border-radius:99px;padding:6px 12px;font-size:13px;white-space:nowrap}
#peek{flex:1;background:#4A3418;border:2px dashed var(--line);border-radius:12px;
      padding:9px;font-size:14px;color:var(--dim);transition:.1s;text-align:center}
#peek.open{background:var(--spark);color:var(--ink);border-style:solid;border-color:var(--spark);font-size:22px}
#brief{flex:1;background:var(--spark);color:var(--ink);border-radius:12px;
       padding:9px;font-size:18px;text-align:center}
.sheet{position:relative;flex:1;min-height:0;background:var(--paper);
       border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.4)}
#pad{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
.hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:#C9CFD6;font-size:14px;font-weight:600;pointer-events:none;transition:opacity .25s;
      padding:20px;text-align:center}
.hint.gone{opacity:0}

.crayons{display:flex;gap:6px;padding:2px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:none}
.crayons::-webkit-scrollbar{display:none}
.crayons button{width:30px;height:30px;border-radius:50%;border:3px solid transparent;transition:.12s;flex:none}
.crayons button.sel{border-color:var(--paper);transform:scale(1.16)}
.penbar{display:flex;gap:6px;flex:none}
.penbar button{background:var(--ink-2);border:2px solid var(--line);border-radius:12px;
               padding:9px 0;font-size:13px;color:var(--dim);flex:1;transition:.1s}
.penbar button.sel{border-color:var(--wire);color:var(--wire);background:#4A3418}
.penbar button:active{transform:scale(.94)}
.penbar .w1::before{content:'●';font-size:8px}
.penbar .w2::before{content:'●';font-size:13px}
.penbar .w3::before{content:'●';font-size:19px}

.drawTools{display:flex;gap:8px;flex:none}
#doneBtn{flex:1;background:var(--wire);color:var(--ink);border-radius:14px;padding:13px 0;font-size:16px}
#doneBtn:active{transform:scale(.97)}

#guess{padding:10px 12px 12px;gap:10px}
#guess .lead{text-align:center;font-size:14px;color:var(--dim);font-weight:500}
.view{flex:1;min-height:0;background:var(--paper);border-radius:16px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.view img{width:100%;height:100%;object-fit:contain}
#gIn{width:100%;background:var(--ink-2);border:2px solid var(--line);border-radius:16px;
     padding:15px;font-size:20px;color:var(--paper);text-align:center;outline:none}
#gIn:focus{border-color:var(--wire)}
#gSend{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 0;font-size:18px;width:100%}

#reveal{padding:14px 14px 20px;gap:10px;overflow-y:auto}
#reveal h2{text-align:center;font-size:22px;flex:none}
.chain{display:flex;flex-direction:column;gap:8px;flex:none}
.step{background:var(--ink-2);border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:7px}
.step .who{font-size:12px;color:var(--dim);font-weight:500;letter-spacing:.06em}
.step .word{font-size:26px}
.step .word.gold{color:var(--spark)}
.step img{width:100%;border-radius:10px;background:var(--paper)}
.arrow{text-align:center;color:var(--dim);font-size:16px;flex:none}
.verdict{border-radius:16px;padding:15px;text-align:center;flex:none}
.verdict.win{background:#1E4230;color:var(--hit)}
.verdict.lose{background:#4A2430;color:var(--hot)}
.verdict .big{font-size:22px}
.verdict .why{font-size:13px;font-weight:500;margin-top:5px;opacity:.85;line-height:1.7}
#nextRound{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 0;font-size:17px;flex:none}

#over{justify-content:center;align-items:center;text-align:center;gap:16px;padding:26px}
#over .n{font-size:60px;color:var(--spark)}
#over .lab{color:var(--dim);font-size:14px;font-weight:500}
#again{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 34px;font-size:17px}
</style>
</head>
<body>

<section id="start" class="screen on">
  <div class="hero">✏️ ➜ 👀 ➜ ✏️ ➜ 🤖</div>
  <h1>G05 <em>傳話大亂畫</em></h1>
  <p class="sub">畫 → 看圖寫字 → 照字再畫 →<br>最後機器人判斷：<b>傳回原題了嗎？</b></p>
  <p class="sub" id="orderInfo"></p>
  <button id="go">開始一局</button>
  <p class="tiny">題庫 240+ 題。畫得爛沒關係——<b>畫得越爛越好笑</b>。</p>
  <a class="back" href="index.html">← 回遊戲間（改玩家設定）</a>
</section>

<section id="loading" class="screen">
  <div class="hero">🤖</div>
  <div style="font-size:19px">裁判機器人正在搬進來…</div>
  <div class="bar"><i id="barFill"></i></div>
  <p id="loadNote">第一次要下載大腦（約 20MB），之後秒開。</p>
</section>

<section id="relay" class="screen">
  <div class="hero" id="relayEm">🎨</div>
  <div class="round" id="relayRound">第 1 回合</div>
  <div id="relayWho">交給 George</div>
  <p id="relayJob">你的任務：偷看題目，把它畫出來。</p>
  <button id="relayGo">我拿到平板了</button>
</section>

<section id="draw" class="screen">
  <div class="jobbar">
    <div class="pill" id="dWho">🧒 George</div>
    <button id="peek">👁 按住偷看題目</button>
    <div id="brief" style="display:none">畫「？」</div>
  </div>
  <div class="sheet">
    <canvas id="pad"></canvas>
    <div class="hint" id="hint">用手指在這裡畫</div>
  </div>
  <div class="crayons" id="crayons"></div>
  <div class="penbar">
    <button class="w1" data-w="10"></button>
    <button class="w2 sel" data-w="18"></button>
    <button class="w3" data-w="30"></button>
    <button id="eraseBtn">🧽 擦子</button>
    <button id="undoBtn">↩️ 上一步</button>
    <button id="wipeBtn">🗑️</button>
  </div>
  <div class="drawTools">
    <button id="doneBtn">✅ 畫好了，換下一個人</button>
  </div>
</section>

<section id="guess" class="screen">
  <div class="lead" id="gWho">你覺得這張圖是什麼？</div>
  <div class="view"><img id="gImg" alt="上一個人畫的圖"></div>
  <input id="gIn" type="text" placeholder="寫下你猜的東西" autocomplete="off">
  <button id="gSend">✅ 寫好了，換下一個人</button>
</section>

<section id="reveal" class="screen">
  <h2>🎉 大揭曉</h2>
  <div class="chain" id="chain"></div>
  <div class="verdict" id="verdict"></div>
  <button id="nextRound">下一回合 →</button>
</section>

<section id="over" class="screen">
  <div class="hero">🏆</div>
  <div class="n" id="finScore">0 / 3</div>
  <div class="lab">傳話成功次數</div>
  <button id="again">再玩一局</button>
</section>

<script src="family-players.js?v=3"></script>
<script type="module">

/* 題庫：跟 G01 同一套 240+ 題（全類別合併），啟動時跟模型取交集 */
const WORDS = {

  'house':'房子','door':'門','window':'窗戶','key':'鑰匙','ladder':'梯子',
  'chair':'椅子','table':'桌子','bed':'床','couch':'沙發','lamp':'檯燈',
  'clock':'時鐘','television':'電視','computer':'電腦','laptop':'筆電','telephone':'電話',

  'toothbrush':'牙刷','toothpaste':'牙膏','soap':'肥皂','toilet':'馬桶','bathtub':'浴缸',

  'fork':'叉子','spoon':'湯匙','knife':'刀子','frying pan':'平底鍋','stove':'爐子',
  'scissors':'剪刀','hammer':'鎚子','screwdriver':'螺絲起子','saw':'鋸子','paint can':'油漆桶',
  'eye':'眼睛','ear':'耳朵','nose':'鼻子','mouth':'嘴巴','hand':'手','foot':'腳',
  'leg':'腿','arm':'手臂','face':'臉','smiley face':'笑臉','moustache':'鬍子',
  't-shirt':'T恤','pants':'褲子','shorts':'短褲','shoe':'鞋子','sock':'襪子',
  'hat':'帽子','crown':'皇冠','sunglasses':'太陽眼鏡','eyeglasses':'眼鏡',
  'jacket':'外套','belt':'皮帶','bowtie':'領結','purse':'皮包','backpack':'背包',
  'basketball':'籃球','soccer ball':'足球','baseball':'棒球','tennis racquet':'網球拍',
  'golf club':'高爾夫球桿','bowling ball':'保齡球','hockey stick':'曲棍球桿',
  'guitar':'吉他','piano':'鋼琴','drums':'鼓','violin':'小提琴','trumpet':'小號',
  'book':'書','pencil':'鉛筆','crayon':'蠟筆','paintbrush':'畫筆','eraser':'橡皮擦',
  'calculator':'計算機','camera':'相機','headphones':'耳機','clarinet':'單簧管',
  'kite':'風箏','balloon':'氣球','teddy-bear':'泰迪熊','yoga':'瑜伽','swing set':'鞦韆',
  'castle':'城堡','bridge':'橋','windmill':'風車','lighthouse':'燈塔','tent':'帳篷',
  'church':'教堂','skyscraper':'摩天大樓','barn':'穀倉','garden':'花園','fence':'籬笆',
  'sword':'劍','shield':'盾牌','skull':'骷髏頭','ghost':'鬼','snowman':'雪人',
  'robot':'機器人','alien':'外星人','angel':'天使','witch':'女巫',
  'diamond':'鑽石','map':'地圖','compass':'指南針','flashlight':'手電筒','stethoscope':'聽診器',
};

const WORKER_SRC = `
import { pipeline, RawImage, env } from '${CONFIG.LIB}';
env.allowLocalModels = false;
let clf = null;
self.onmessage = async (e) => {
  const m = e.data;
  if (m.type === 'init') {
    try {
      clf = await pipeline('image-classification', m.model, {
        quantized: false,
        progress_callback: (p) => {
          if (p.status === 'progress' && typeof p.progress === 'number')
            self.postMessage({ type:'progress', progress: p.progress });
        }
      });
      self.postMessage({ type:'ready', labels: Object.values(clf.model.config.id2label || {}) });
    } catch (err) { self.postMessage({ type:'error', message: String(err && err.message || err) }); }
    return;
  }
  if (m.type === 'classify' && clf) {
    try {
      const gray = new Uint8ClampedArray(m.data.length / 4);
      for (let i = 0; i < gray.length; ++i) gray[i] = m.data[i * 4 + 3];
      const img = new RawImage(gray, m.w, m.h, 1);
      const out = await clf(img, { topk: 5 });
      self.postMessage({ type:'result', out, tag: m.tag });
    } catch (err) { self.postMessage({ type:'error', message: String(err && err.message || err) }); }
  }
};
`;

let ac = null;
function beep(f, dur=0.1, type='sine', gain=0.12) {
  try {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    f.forEach((hz,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = hz;
      const t = ac.currentTime + i*dur*0.8;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+dur+0.02);
    });
  } catch(_) {}
}
const SFX = {
  win:  () => beep([523,659,784,1047,1319], 0.11, 'triangle', 0.17),
  lose: () => beep([440,349,262], 0.14, 'sawtooth', 0.1),
  go:   () => beep([392,523], 0.1, 'triangle', 0.12),
  send: () => beep([700,900], 0.08, 'sine', 0.1),
  undo: () => beep([500,400], 0.06, 'sine', 0.08),
};

const S = {
  players: [], rounds: 3, round: 0, wins: 0,
  order: [], step: 0,
  word: null, guessText: '',
  img1: '', img2: '', ai1: null, ai2: null,
  deck: [], judged: {}, ready: false,
  /* 畫圖工具 */
  color: CONFIG.CRAYONS[0], width: 18, erasing: false,
  strokes: [], cur: null,
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};

/* ---------- 畫圖層（同 G01 v3：筆畫紀錄+重播） ---------- */
const pad = $('pad');
const ctx = pad.getContext('2d', { willReadFrequently:true });
pad.width = pad.height = CONFIG.PAD_RES;
const aiPad = document.createElement('canvas');
aiPad.width = aiPad.height = CONFIG.PAD_RES;
const aic = aiPad.getContext('2d', { willReadFrequently:true });

function setLine(c, st) {
  c.lineCap='round'; c.lineJoin='round';
  c.lineWidth = st.tool === 'erase' ? st.width * CONFIG.ERASE_MUL : st.width;
}
function drawSeg(st, a, b) {
  setLine(ctx, st);
  ctx.strokeStyle = st.tool === 'erase' ? '#FFFFFF' : st.color;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();

  setLine(aic, st);
  if (st.tool === 'erase') {
    aic.globalCompositeOperation = 'destination-out';
    aic.strokeStyle = 'rgba(0,0,0,1)'; aic.shadowBlur = 0;
  } else {
    aic.globalCompositeOperation = 'source-over';
    aic.strokeStyle = '#000';
    aic.shadowColor = 'rgba(0,0,0,0.9)'; aic.shadowBlur = 1;
  }
  aic.beginPath(); aic.moveTo(a.x,a.y); aic.lineTo(b.x,b.y); aic.stroke();
  aic.globalCompositeOperation = 'source-over';
}
const drawDot = (st, p) => drawSeg(st, p, { x:p.x+0.01, y:p.y });

function blank() {
  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,pad.width,pad.height);
  aic.clearRect(0,0,aiPad.width,aiPad.height);
}
function replay() {
  blank();
  S.strokes.forEach(st => {
    if (!st.pts.length) return;
    if (st.pts.length === 1) { drawDot(st, st.pts[0]); return; }
    for (let i=1;i<st.pts.length;i++) drawSeg(st, st.pts[i-1], st.pts[i]);
  });
  $('hint').classList.toggle('gone', S.strokes.length > 0);
}
function clearPad() {
  S.strokes = []; S.cur = null;
  blank();
  $('hint').classList.remove('gone');
}
function calcBBox() {
  let bb = null;
  S.strokes.forEach(st => {
    if (st.tool !== 'pen') return;
    const r = st.width/2;
    st.pts.forEach(p => {
      if (!bb) bb = [p.x-r,p.y-r,p.x+r,p.y+r];
      else bb = [Math.min(bb[0],p.x-r), Math.min(bb[1],p.y-r),
                 Math.max(bb[2],p.x+r), Math.max(bb[3],p.y+r)];
    });
  });
  return bb;
}
function xy(e) {
  const r = pad.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*pad.width, y:(e.clientY-r.top)/r.height*pad.height };
}
pad.addEventListener('pointerdown', (e) => {
  if (!S.word) return;
  e.preventDefault();
  pad.setPointerCapture(e.pointerId);
  S.cur = { tool: S.erasing ? 'erase' : 'pen', color: S.color, width: S.width, pts: [xy(e)] };
  drawDot(S.cur, S.cur.pts[0]);
  $('hint').classList.add('gone');
});
pad.addEventListener('pointermove', (e) => {
  if (!S.cur) return;
  e.preventDefault();
  const p = xy(e);
  drawSeg(S.cur, S.cur.pts[S.cur.pts.length-1], p);
  S.cur.pts.push(p);
});
['pointerup','pointercancel','pointerleave'].forEach(ev =>
  pad.addEventListener(ev, () => { if (S.cur) { S.strokes.push(S.cur); S.cur = null; } }));

CONFIG.CRAYONS.forEach((c,i) => {
  const b = document.createElement('button');
  b.style.background = c;
  if (i===0) b.classList.add('sel');
  b.onclick = () => {
    S.color = c; S.erasing = false;
    $('eraseBtn').classList.remove('sel');
    document.querySelectorAll('#crayons button').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  };
  $('crayons').appendChild(b);
});
document.querySelectorAll('.penbar [data-w]').forEach(b =>
  b.addEventListener('click', () => {
    S.width = +b.dataset.w;
    document.querySelectorAll('.penbar [data-w]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
$('eraseBtn').addEventListener('click', () => {
  S.erasing = !S.erasing;
  $('eraseBtn').classList.toggle('sel', S.erasing);
});
$('undoBtn').addEventListener('click', () => {
  if (!S.strokes.length) return;
  S.strokes.pop(); replay(); SFX.undo();
});
$('wipeBtn').addEventListener('click', () => { if (S.word) clearPad(); });

function cropSketch() {
  const bb = calcBBox();
  if (!bb) return null;
  const [x1,y1,x2,y2] = bb;
  let left=x1, top=y1;
  const w=x2-x1, h=y2-y1;
  if (Math.max(w,h) < CONFIG.MIN_BOX) return null;
  let size = 2*CONFIG.CROP_PAD;
  if (w>=h) { size+=w; top = Math.max(top-(w-h)/2, 0); }
  else      { size+=h; left = Math.max(left-(h-w)/2, 0); }
  return aic.getImageData(Math.round(left-CONFIG.CROP_PAD), Math.round(top-CONFIG.CROP_PAD),
                          Math.round(size), Math.round(size));
}

/* ---------- Worker ---------- */
let worker = null, LABELS = new Set();

function bootWorker() {
  const url = URL.createObjectURL(new Blob([WORKER_SRC], { type:'text/javascript' }));
  worker = new Worker(url, { type:'module' });
  worker.onmessage = (e) => {
    const m = e.data;
    if (m.type === 'progress') $('barFill').style.width = Math.min(99,m.progress).toFixed(0)+'%';
    else if (m.type === 'ready') {
      LABELS = new Set(m.labels.map(s => String(s).toLowerCase().trim()));
      S.ready = true;
      newGame();
    }
    else if (m.type === 'result') {
      S.judged[m.tag] = m.out;
      if (S.judged.d1 && S.judged.d2) paintVerdict();
    }
    else if (m.type === 'error') fail(m.message);
  };
  worker.onerror = (e) => fail(e.message || '載不到裁判的大腦');
  worker.postMessage({ type:'init', model: CONFIG.MODEL });
}
function fail(msg) {
  show('loading');
  $('loadNote').outerHTML =
    `<div class="err"><b>裁判搬不進來</b><br>${msg}<br><br>
     這個檔案需要能連到 cdn.jsdelivr.net 和 huggingface.co。</div>`;
}

function buildDeck() {
  const d = Object.entries(WORDS)
    .filter(([en]) => LABELS.has(en))
    .map(([en, zh]) => ({ en, zh }));
  for (let i=d.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
  return d;
}

/* ---------- 流程（FP 玩家輪替） ---------- */
function paintStart() {
  S.players = FP.get();
  S.rounds = Math.max(3, S.players.length);
  $('orderInfo').innerHTML =
    `順序：${S.players.map(p => `${p.emoji} ${p.name}`).join(' → ')}，共 ${S.rounds} 回合，每回合換人開頭。`;
}

function newGame() {
  S.players = FP.get();
  if (S.players.length < 2) {
    fail('這個遊戲要 2 人以上。回遊戲間按「改玩家」加人。');
    return;
  }
  S.rounds = Math.max(3, S.players.length);
  S.round = 0; S.wins = 0;
  S.deck = buildDeck();
  if (!S.deck.length) { fail('題庫跟裁判認得的類別對不起來。'); return; }
  newRound();
}

function newRound() {
  if (S.round >= S.rounds) return gameOver();
  const n = S.players.length;
  S.order = [S.players[S.round % n], S.players[(S.round+1) % n], S.players[(S.round+2) % n]];
  S.step = 0;
  S.word = S.deck.pop();
  if (!S.deck.length) S.deck = buildDeck();
  S.guessText = '';
  S.img1 = S.img2 = '';
  S.ai1 = S.ai2 = null;
  S.judged = {};
  relay(S.order[0], '🎨', '你的任務：按住偷看題目，把它畫出來。別唸出聲！');
}

function relay(player, em, job) {
  $('relayEm').textContent = em;
  $('relayRound').textContent = `第 ${S.round + 1} / ${S.rounds} 回合`;
  $('relayWho').textContent = `交給 ${player.emoji} ${player.name}`;
  $('relayJob').textContent = job;
  show('relay');
  SFX.go();
}

$('relayGo').onclick = () => {
  if (S.step === 0) beginDraw(S.order[0], true);
  else if (S.step === 1) beginGuess();
  else beginDraw(S.order[2], false);
};

let peekMode = true;
function beginDraw(player, isFirst) {
  peekMode = isFirst;
  show('draw');
  $('dWho').textContent = `${player.emoji} ${player.name}`;
  if (isFirst) {
    $('peek').style.display = '';
    $('brief').style.display = 'none';
    $('peek').classList.remove('open');
    $('peek').textContent = '👁 按住偷看題目';
  } else {
    $('peek').style.display = 'none';
    $('brief').style.display = '';
    $('brief').textContent = `畫「${S.guessText}」`;
  }
  clearPad();
}

const peek = $('peek');
peek.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!peekMode || !S.word) return;
  peek.classList.add('open');
  peek.textContent = S.word.zh;
});
['pointerup','pointerleave','pointercancel'].forEach(ev =>
  peek.addEventListener(ev, () => {
    peek.classList.remove('open');
    peek.textContent = '👁 按住偷看題目';
  }));

$('doneBtn').onclick = () => {
  if (!S.strokes.length) { beep([300], 0.1); return; }
  SFX.send();
  const shot = pad.toDataURL('image/png');
  const crop = cropSketch();
  if (S.step === 0) {
    S.img1 = shot; S.ai1 = crop;
    S.step = 1;
    relay(S.order[1], '👀', '你的任務：看這張圖，寫下你覺得它是什麼。不准問畫的人！');
  } else {
    S.img2 = shot; S.ai2 = crop;
    doReveal();
  }
};

function beginGuess() {
  show('guess');
  $('gWho').textContent = `${S.order[1].emoji} ${S.order[1].name}，你覺得這張圖是什麼？`;
  $('gImg').src = S.img1;
  $('gIn').value = '';
  setTimeout(() => $('gIn').focus(), 300);
}
$('gSend').onclick = () => {
  const t = $('gIn').value.trim();
  if (!t) { beep([300], 0.1); $('gIn').focus(); return; }
  S.guessText = t;
  SFX.send();
  S.step = 2;
  relay(S.order[2], '🎨', '你的任務：照著上一個人寫的字，把它畫出來。');
};

function doReveal() {
  show('reveal');
  const [A, B, C] = S.order;
  $('chain').innerHTML = `
    <div class="step"><div class="who">🎯 原本的題目</div><div class="word gold">${S.word.zh}</div></div>
    <div class="arrow">⬇️</div>
    <div class="step"><div class="who">${A.emoji} ${A.name} 畫的</div><img src="${S.img1}"></div>
    <div class="arrow">⬇️</div>
    <div class="step"><div class="who">${B.emoji} ${B.name} 猜的</div><div class="word">「${S.guessText}」</div></div>
    <div class="arrow">⬇️</div>
    <div class="step"><div class="who">${C.emoji} ${C.name} 再畫的</div><img src="${S.img2}"></div>`;
  $('verdict').className = 'verdict';
  $('verdict').innerHTML = '<div class="big">🤖 裁判看圖中…</div>';
  $('nextRound').style.display = 'none';

  S.judged = {};
  [['d1', S.ai1], ['d2', S.ai2]].forEach(([tag, img]) => {
    if (!img) { S.judged[tag] = []; return; }
    const copy = new Uint8ClampedArray(img.data);
    worker.postMessage({ type:'classify', data:copy, w:img.width, h:img.height, tag },
                       [copy.buffer]);
  });
  if (S.judged.d1 && S.judged.d2) paintVerdict();
}

const zhOf = (en) => WORDS[en] || en;
const topGuess = (out) => (out && out[0]) ? zhOf(String(out[0].label).toLowerCase().trim()) : '（看不懂）';

function paintVerdict() {
  const out2 = S.judged.d2 || [];
  const rank = out2.findIndex(r => String(r.label).toLowerCase().trim() === S.word.en);
  const ok = rank >= 0 && rank < CONFIG.JUDGE_TOPN;
  if (ok) { S.wins++; SFX.win(); } else SFX.lose();

  const v = $('verdict');
  v.className = 'verdict ' + (ok ? 'win' : 'lose');
  v.innerHTML = `
    <div class="big">${ok ? '🎉 傳話成功！' : '💥 傳歪了！'}</div>
    <div class="why">
      裁判看第一張圖覺得是「${topGuess(S.judged.d1)}」，<br>
      看最後一張圖覺得是「${topGuess(out2)}」${ok ? ' —— 傳回原題了！' : `，可是原題是「${S.word.zh}」…`}
    </div>`;
  $('nextRound').style.display = '';
  $('nextRound').textContent = (S.round + 1 >= S.rounds) ? '看總成績 →' : '下一回合 →';
}
$('nextRound').onclick = () => { S.round++; newRound(); };

function gameOver() {
  $('finScore').textContent = `${S.wins} / ${S.rounds}`;
  show('over');
}
$('again').onclick = () => { paintStart(); if (S.ready) newGame(); };

$('go').onclick = () => {
  beep([440], 0.06);
  if (S.ready) newGame();
  else { show('loading'); bootWorker(); }
};

paintStart();
blank();
</script>
</body>
</html>
