<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>家庭遊戲間</title>
<style>
:root{
  --ink:#0B1B2B; --ink-2:#132A42; --line:#24435E; --paper:#FDFCF7;
  --wire:#3EE6D0; --spark:#FFD23F; --dim:#7E9BB5; --hot:#FF5C6C; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;align-items:center;
  padding:32px 16px 48px;gap:16px;
  padding-top:calc(32px + env(safe-area-inset-top));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
.mark{font-size:36px;letter-spacing:.08em}
h1{font-size:25px;line-height:1.3}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:12px;font-weight:500;line-height:1.7;max-width:22em}

.block{width:100%;max-width:390px}
.who{background:var(--ink-2);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:10px}
.who .head{display:flex;align-items:center;gap:8px}
.who .head h3{font-size:15px;flex:1}
.who .head .n{font-size:12px;color:var(--dim);font-weight:500}
.who .strip{display:flex;gap:7px;flex-wrap:wrap}
.who .chip{background:#0A1826;border-radius:99px;padding:7px 12px;font-size:13px;display:flex;gap:6px;align-items:center}
.who .chip .lv{font-size:10px;color:var(--dim);font-weight:500}
.rowBtns{display:flex;gap:8px}
.rowBtns button{flex:1;background:#0A1826;border:2px solid var(--line);border-radius:12px;
                padding:11px 0;font-size:13px;color:var(--wire)}
.rowBtns button:active{transform:scale(.97)}

.shelf{display:flex;flex-direction:column;gap:11px;width:100%;max-width:390px}
.card{background:var(--ink-2);border:2px solid var(--line);border-radius:18px;overflow:hidden}
a.play{display:flex;gap:13px;align-items:center;text-decoration:none;color:inherit;padding:15px;transition:.15s}
a.play:active{transform:scale(.98)}
.icon{flex:none;font-size:28px;width:46px;height:46px;border-radius:13px;background:#0A1826;
      display:flex;align-items:center;justify-content:center}
.meat{flex:1;min-width:0}
.meat .no{font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.meat b{display:block;font-size:18px;line-height:1.25;margin-top:1px}
.meat span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px;line-height:1.5}
.foot{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding:8px 15px}
.stars{font-size:13px;color:var(--spark);letter-spacing:.05em}
.total{font-size:12px;color:var(--dim);font-weight:500}
.rateBtn{margin-left:auto;font-size:12px;color:var(--wire);border:1px solid var(--line);
         border-radius:99px;padding:5px 13px}
.soon{opacity:.42;border-style:dashed;padding:15px;display:flex;gap:13px;align-items:center}

.taste{background:var(--ink-2);border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:10px}
.taste h3{font-size:15px}
.taste .row{display:flex;align-items:center;gap:9px}
.taste .row .lab{font-size:12px;color:var(--dim);font-weight:500;width:86px;flex:none}
.taste .row .track{flex:1;height:9px;background:#0A1826;border-radius:99px;overflow:hidden}
.taste .row .fill{height:100%;background:var(--wire);border-radius:99px}
.taste .row .val{font-size:12px;color:var(--dim);font-weight:500;width:28px;text-align:right}
.taste .tags{display:flex;gap:6px;flex-wrap:wrap}
.taste .tags span{background:#0A1826;border-radius:99px;padding:5px 11px;font-size:12px;color:var(--spark)}
.taste .empty{font-size:12px;color:var(--dim);font-weight:500;line-height:1.75}

.data{display:flex;flex-direction:column;gap:9px}
#copyBtn{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 0;font-size:16px;width:100%}
#copyBtn.done{background:var(--hit)}
.backup{display:flex;gap:9px}
.backup button{flex:1;background:var(--ink-2);border:2px solid var(--line);border-radius:14px;
               padding:12px 0;font-size:13px;color:var(--dim)}
.note{font-size:11px;color:var(--dim);font-weight:500;text-align:center;line-height:1.8}
.note b{color:var(--paper)}
footer{color:var(--dim);font-size:11px;font-weight:500;text-align:center;line-height:1.9;max-width:24em}
footer b{color:var(--paper)}

.veil{position:fixed;inset:0;background:rgba(5,12,20,.85);display:none;z-index:10;
      align-items:flex-end;justify-content:center}
.veil.on{display:flex}
.panel{width:100%;max-width:440px;max-height:90vh;overflow-y:auto;
       background:var(--ink-2);border-radius:22px 22px 0 0;padding:20px 18px 30px;
       display:flex;flex-direction:column;gap:13px}
.panel h2{font-size:19px;text-align:center}

.pRow{display:flex;gap:7px;align-items:center;background:#0A1826;border-radius:14px;padding:8px 9px;flex-wrap:wrap}
.pRow .em{font-size:23px;width:38px;height:38px;border-radius:10px;background:#132A42;flex:none}
.pRow input{flex:1;min-width:70px;background:transparent;border:none;outline:none;
            font-size:15px;color:var(--paper);font-weight:700}
.pRow .cyc{background:#132A42;border-radius:99px;padding:6px 10px;font-size:11px;color:var(--dim);flex:none}
.pRow .cyc.easy{color:var(--hit)} .pRow .cyc.normal{color:var(--spark)} .pRow .cyc.hard{color:var(--hot)}
.pRow .cyc.boy{color:#6FB6FF} .pRow .cyc.girl{color:#FF9EC4}
.pRow .del{color:var(--dim);font-size:18px;padding:4px 5px;flex:none}
#addP{background:#0A1826;border:2px dashed var(--line);border-radius:14px;padding:12px 0;
      font-size:14px;color:var(--wire)}
.emPick{display:flex;gap:6px;flex-wrap:wrap;background:#0A1826;border-radius:14px;padding:10px}
.emPick button{font-size:25px;padding:3px 5px;border-radius:8px}
.emPick button.on{background:var(--wire)}

.dim{display:flex;align-items:center;gap:8px}
.dim .lab{font-size:14px;width:106px;flex:none}
.dim .sRow{display:flex;gap:3px;flex:1;justify-content:flex-end}
.dim .sRow button{font-size:25px;filter:grayscale(1);opacity:.32;transition:.1s;padding:2px}
.dim .sRow button.on{filter:none;opacity:1;transform:scale(1.08)}
.tagPick{display:flex;gap:7px;flex-wrap:wrap}
.tagPick button{background:#0A1826;border:2px solid var(--line);border-radius:99px;
                padding:8px 13px;font-size:13px;color:var(--dim)}
.tagPick button.on{border-color:var(--spark);color:var(--spark)}
#noteIn{width:100%;background:#0A1826;border:2px solid var(--line);border-radius:14px;
        padding:12px;font-size:14px;color:var(--paper);outline:none;font-weight:500}
.pBtns{display:flex;gap:9px}
.pBtns .ghost{flex:1;background:#0A1826;border:2px solid var(--line);border-radius:14px;
              padding:14px 0;font-size:15px;color:var(--dim)}
.pBtns .go{flex:2;background:var(--wire);color:var(--ink);border-radius:14px;padding:14px 0;font-size:16px}
#liveTotal{text-align:center;font-size:13px;color:var(--dim);font-weight:500}
#liveTotal b{color:var(--spark);font-size:17px}

#copyBox,#qrBox{position:fixed;inset:0;background:rgba(5,12,20,.92);display:none;z-index:11;
         align-items:center;justify-content:center;padding:20px}
#copyBox.on,#qrBox.on{display:flex}
.modal{width:100%;max-width:420px;background:var(--ink-2);border-radius:20px;padding:18px;
       display:flex;flex-direction:column;gap:12px;align-items:center}
.modal h3{font-size:16px;text-align:center}
#copyText{width:100%;height:220px;background:#0A1826;border:2px solid var(--line);border-radius:14px;
          padding:12px;font-size:12px;font-weight:500;color:var(--paper);
          font-family:ui-monospace,monospace;resize:none;outline:none}
.modal .go{background:var(--wire);color:var(--ink);border-radius:14px;padding:13px 0;font-size:15px;width:100%}
#qrHolder{background:#fff;border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:center}
#qrUrl{font-size:12px;color:var(--dim);font-weight:500;text-align:center;word-break:break-all}
</style>
</head>
<body>

<header>
  <div class="mark">🎮 🧒 🧑 🧔</div>
  <h1>家庭<em>遊戲間</em></h1>
  <p class="sub">全部住在平板裡，畫面和聲音都不會傳出去。</p>
</header>

<div class="block">
  <div class="who">
    <div class="head"><h3>👥 玩家</h3><div class="n" id="pCount">3 人</div></div>
    <div class="strip" id="pStrip"></div>
    <div class="rowBtns">
      <button id="editP">✏️ 改玩家</button>
      <button id="qrBtn">📱 給朋友掃</button>
    </div>
  </div>
</div>

<div class="shelf" id="shelf"></div>

<div class="block taste" id="taste"></div>

<div class="block data">
  <button id="copyBtn">📋 複製給 Claude</button>
  <div class="backup">
    <button id="exportBtn">💾 存成檔案</button>
    <button id="importBtn">📂 讀取檔案</button>
  </div>
  <input type="file" id="fileIn" accept=".json,application/json" style="display:none">
  <p class="note">評分與玩家設定存在<b>這台裝置</b>裡。<br>要給 Claude 看 → 按「複製給 Claude」，貼進對話框。</p>
</div>

<footer>
  第一次玩要等機器人下載大腦，<b>之後秒開</b>。<br>
  卡住的話，網址後面加 <b>?v=99</b> 逼它重抓。
</footer>

<!-- 玩家編輯 -->
<div class="veil" id="pVeil">
  <div class="panel">
    <h2>👥 玩家設定</h2>
    <p class="note">最多 6 人。點按鈕循環切換難度／性別。<br>五款遊戲全部套用這裡的設定。</p>
    <div id="pList"></div>
    <button id="addP">＋ 加一個人</button>
    <div class="emPick" id="emPick" style="display:none"></div>
    <div class="pBtns">
      <button class="ghost" id="pCancel">取消</button>
      <button class="go" id="pSave">儲存</button>
    </div>
  </div>
</div>

<!-- 評分 -->
<div class="veil" id="rVeil">
  <div class="panel">
    <h2 id="rTitle">評分</h2>
    <div id="dims"></div>
    <div id="liveTotal">總分 <b>0</b> / 30</div>
    <div>
      <div style="font-size:13px;color:var(--dim);font-weight:500;margin-bottom:8px">最愛哪一點？（可多選）</div>
      <div class="tagPick" id="tagPick"></div>
    </div>
    <input id="noteIn" type="text" placeholder="一句話感想（可不填）" autocomplete="off">
    <div class="pBtns">
      <button class="ghost" id="rCancel">取消</button>
      <button class="go" id="rSave">儲存評分</button>
    </div>
  </div>
</div>

<div id="copyBox"><div class="modal">
  <h3 id="copyHead">📋 已複製！直接貼給 Claude</h3>
  <textarea id="copyText" readonly></textarea>
  <button class="go" id="copyClose">好</button>
</div></div>

<div id="qrBox"><div class="modal">
  <h3>📱 朋友用相機掃這個</h3>
  <div id="qrHolder"></div>
  <div id="qrUrl"></div>
  <p class="note">掃了直接進遊戲間，不用安裝任何東西。<br>（評分和玩家設定不會跟過去，那是各自裝置的）</p>
  <button class="go" id="qrClose">好</button>
</div></div>

<script src="family-players.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const GAMES = [
  { id:'g01', file:'g01-doodle.html',    icon:'✏️', name:'全家 vs 機器人',
    desc:'一個人畫、其他人猜，機器人也在猜——看誰先。', tag:'1 台' },
  { id:'g02', file:'g02-hunt.html',      icon:'📸', name:'家裡尋寶',
    desc:'機器人喊一樣東西，跑去找出來、鏡頭對準它。', tag:'要相機' },
  { id:'g03', file:'g03-face.html',      icon:'😡', name:'表情大挑戰',
    desc:'用臉做出指定表情，機器人告訴你像幾 %。', tag:'要相機' },
  { id:'g04', file:'g04-speak.html',     icon:'🎤', name:'唸給機器人聽',
    desc:'看中文說英文，機器人聽你發音準不準。', tag:'要麥克風' },
  { id:'g05', file:'g05-telephone.html', icon:'📞', name:'傳話大亂畫',
    desc:'畫→猜→再畫，最後機器人判斷傳回原題了嗎。', tag:'1 台' },
];
const NEXT_NO = 'G06';

const DIMS = [
  ['fun','😆 好玩'], ['easy','🚀 好上手'], ['replay','🔁 耐玩・變化'],
  ['idea','💡 創意'], ['family','👨‍👦‍👦 全家互動'], ['polish','✨ 完成度'],
];
/* 標籤加倍：方向訊號更細 */
const TAGS = [
  '笑到肚子痛','緊張刺激','學到東西','全家一起玩','AI 好神','小孩自己會玩','想一直再來一局',
  '動來動去不無聊','有比賽感','機器人吐槽好笑','畫畫好玩','練英文讚','適合聚會客人','動腦解謎爽',
];

const RKEY = 'family-game-ratings-v1';
const $ = (id) => document.getElementById(id);
const loadR = () => { try { return JSON.parse(localStorage.getItem(RKEY)) || {}; } catch(_) { return {}; } };
const saveR = (d) => { try { localStorage.setItem(RKEY, JSON.stringify(d)); } catch(_) {} };
const totalOf = (r) => DIMS.reduce((s,[k]) => s + (r?.scores?.[k] || 0), 0);

function renderPlayers() {
  const ps = FP.get();
  $('pCount').textContent = ps.length + ' 人';
  $('pStrip').innerHTML = ps.map(p => {
    const g = FP.gd(p);
    return `<div class="chip">${p.emoji} ${p.name}
      <span class="lv">${FP.lv(p).label}${g.key !== 'none' ? '·' + g.label : ''}</span></div>`;
  }).join('');
}

function renderShelf() {
  const data = loadR();
  $('shelf').innerHTML = GAMES.map(g => {
    const r = data[g.id];
    const t = r ? totalOf(r) : 0;
    const n = Math.round(t / 6);
    const stars = r ? '★'.repeat(n) + '☆'.repeat(5 - n) : '☆☆☆☆☆';
    return `
    <div class="card">
      <a class="play" href="${g.file}">
        <div class="icon">${g.icon}</div>
        <div class="meat">
          <div class="no">${g.id.toUpperCase()} · ${g.tag}</div>
          <b>${g.name}</b><span>${g.desc}</span>
        </div>
      </a>
      <div class="foot">
        <div class="stars">${stars}</div>
        <div class="total">${r ? t + ' / 30' : '還沒評分'}</div>
        <button class="rateBtn" data-id="${g.id}">${r ? '改評分' : '⭐ 評分'}</button>
      </div>
    </div>`;
  }).join('') + `
    <div class="card soon">
      <div class="icon">➕</div>
      <div class="meat"><div class="no">${NEXT_NO}</div><b>還沒做</b><span>下一個遊戲的位置</span></div>
    </div>`;
  document.querySelectorAll('.rateBtn').forEach(b =>
    b.addEventListener('click', () => openRate(b.dataset.id)));
}

function renderTaste() {
  const data = loadR();
  const rated = GAMES.filter(g => data[g.id]);
  const box = $('taste');
  if (!rated.length) {
    box.innerHTML = `<h3>📈 你們家的口味</h3>
      <div class="empty">還沒有任何評分。玩完一款回來按「⭐ 評分」。</div>`;
    return;
  }
  const avg = DIMS.map(([k, lab]) => {
    const vals = rated.map(g => data[g.id].scores?.[k] || 0);
    return { lab, v: vals.reduce((a,b)=>a+b,0) / vals.length };
  }).sort((a,b) => b.v - a.v);
  const cnt = {};
  rated.forEach(g => (data[g.id].tags || []).forEach(t => cnt[t] = (cnt[t]||0)+1));
  const topTags = Object.entries(cnt).sort((a,b) => b[1]-a[1]).slice(0,5);

  box.innerHTML = `<h3>📈 你們家的口味（已評 ${rated.length} 款）</h3>` +
    avg.map(a => `
      <div class="row"><div class="lab">${a.lab}</div>
        <div class="track"><div class="fill" style="width:${a.v/5*100}%"></div></div>
        <div class="val">${a.v.toFixed(1)}</div></div>`).join('') +
    (topTags.length ? `<div class="tags">${topTags.map(([t,n]) => `<span>${t} ×${n}</span>`).join('')}</div>` : '');
}

/* ---------- 玩家編輯 ---------- */
let draft = [], emTarget = -1;
const LV_ORDER = ['easy','normal','hard'];
const GD_ORDER = ['none','boy','girl'];

function openPlayers() {
  draft = FP.get().map(p => ({ ...p }));
  $('emPick').style.display = 'none';
  emTarget = -1;
  paintDraft();
  $('pVeil').classList.add('on');
}

function paintDraft() {
  $('pList').innerHTML = draft.map((p, i) => {
    const lv = FP.lv(p), gd = FP.gd(p);
    return `
    <div class="pRow">
      <button class="em" data-em="${i}">${p.emoji}</button>
      <input type="text" maxlength="8" value="${p.name.replace(/"/g,'&quot;')}" data-nm="${i}" placeholder="名字">
      <button class="cyc ${lv.key}" data-lv="${i}">${lv.label}</button>
      <button class="cyc ${gd.key}" data-gd="${i}">${gd.label}</button>
      ${draft.length > 1 ? `<button class="del" data-del="${i}">✕</button>` : ''}
    </div>`;
  }).join('');
  $('addP').style.display = draft.length >= 6 ? 'none' : '';

  document.querySelectorAll('[data-nm]').forEach(el =>
    el.addEventListener('input', () => { draft[+el.dataset.nm].name = el.value; }));
  document.querySelectorAll('[data-lv]').forEach(el =>
    el.addEventListener('click', () => {
      const i = +el.dataset.lv;
      draft[i].level = LV_ORDER[(LV_ORDER.indexOf(draft[i].level) + 1) % 3];
      paintDraft();
    }));
  document.querySelectorAll('[data-gd]').forEach(el =>
    el.addEventListener('click', () => {
      const i = +el.dataset.gd;
      draft[i].gender = GD_ORDER[(GD_ORDER.indexOf(draft[i].gender) + 1) % 3];
      paintDraft();
    }));
  document.querySelectorAll('[data-del]').forEach(el =>
    el.addEventListener('click', () => {
      draft.splice(+el.dataset.del, 1);
      $('emPick').style.display = 'none';
      paintDraft();
    }));
  document.querySelectorAll('[data-em]').forEach(el =>
    el.addEventListener('click', () => {
      emTarget = +el.dataset.em;
      $('emPick').innerHTML = FP.EMOJIS.map(e =>
        `<button data-e="${e}" class="${draft[emTarget].emoji === e ? 'on' : ''}">${e}</button>`).join('');
      $('emPick').style.display = '';
      document.querySelectorAll('#emPick button').forEach(b =>
        b.addEventListener('click', () => {
          draft[emTarget].emoji = b.dataset.e;
          $('emPick').style.display = 'none';
          paintDraft();
        }));
    }));
}

$('addP').addEventListener('click', () => {
  if (draft.length >= 6) return;
  draft.push({ name:'玩家' + (draft.length + 1), emoji: FP.EMOJIS[draft.length % FP.EMOJIS.length],
               level:'normal', gender:'none' });
  paintDraft();
});
$('pCancel').addEventListener('click', () => $('pVeil').classList.remove('on'));
$('pSave').addEventListener('click', () => {
  FP.set(draft);
  $('pVeil').classList.remove('on');
  renderPlayers();
});
$('editP').addEventListener('click', openPlayers);

/* ---------- 📱 QR ---------- */
let qrMade = false;
$('qrBtn').addEventListener('click', () => {
  const url = location.origin + location.pathname;   // 去掉 ?v= 之類的
  $('qrUrl').textContent = url.replace(/^https?:\/\//, '');
  if (!qrMade) {
    if (typeof QRCode === 'undefined') {
      $('qrHolder').innerHTML = '<div style="color:#333;font-size:13px;padding:20px">QR 產生器載不進來（網路擋住了）。<br>直接把上面的網址傳給朋友也可以。</div>';
    } else {
      new QRCode($('qrHolder'), { text: url, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
      qrMade = true;
    }
  }
  $('qrBox').classList.add('on');
});
$('qrClose').addEventListener('click', () => $('qrBox').classList.remove('on'));

/* ---------- 評分 ---------- */
let cur = null, curScores = {}, curTags = new Set();

function openRate(id) {
  cur = GAMES.find(g => g.id === id);
  const old = loadR()[id];
  curScores = { ...(old?.scores || {}) };
  curTags = new Set(old?.tags || []);
  $('rTitle').textContent = `⭐ 評分：${cur.name}`;
  $('noteIn').value = old?.note || '';

  $('dims').innerHTML = DIMS.map(([k, lab]) => `
    <div class="dim"><div class="lab">${lab}</div>
      <div class="sRow" data-k="${k}">
        ${[1,2,3,4,5].map(n => `<button data-n="${n}">⭐</button>`).join('')}
      </div></div>`).join('');
  document.querySelectorAll('.sRow').forEach(row =>
    row.querySelectorAll('button').forEach(b =>
      b.addEventListener('click', () => { curScores[row.dataset.k] = +b.dataset.n; paintStars(); })));

  $('tagPick').innerHTML = TAGS.map(t =>
    `<button data-t="${t}" class="${curTags.has(t) ? 'on' : ''}">${t}</button>`).join('');
  document.querySelectorAll('#tagPick button').forEach(b =>
    b.addEventListener('click', () => {
      const t = b.dataset.t;
      curTags.has(t) ? curTags.delete(t) : curTags.add(t);
      b.classList.toggle('on');
    }));

  paintStars();
  $('rVeil').classList.add('on');
}

function paintStars() {
  document.querySelectorAll('.sRow').forEach(row => {
    const v = curScores[row.dataset.k] || 0;
    row.querySelectorAll('button').forEach(b => b.classList.toggle('on', +b.dataset.n <= v));
  });
  const t = DIMS.reduce((s,[k]) => s + (curScores[k] || 0), 0);
  $('liveTotal').innerHTML = `總分 <b>${t}</b> / 30`;
}

$('rCancel').addEventListener('click', () => $('rVeil').classList.remove('on'));
$('rSave').addEventListener('click', () => {
  const data = loadR();
  data[cur.id] = {
    scores: curScores, tags: [...curTags],
    note: $('noteIn').value.trim(),
    when: new Date().toISOString().slice(0,10),
  };
  saveR(data);
  $('rVeil').classList.remove('on');
  renderShelf(); renderTaste();
});

document.querySelectorAll('.veil').forEach(v =>
  v.addEventListener('click', (e) => { if (e.target === v) v.classList.remove('on'); }));

/* ---------- 📋 複製給 Claude ---------- */
function buildReport() {
  const data = loadR();
  const rated = GAMES.filter(g => data[g.id]);
  const ps = FP.get();
  const L = [];
  L.push('【家庭遊戲間 · 回報】');
  L.push(`日期：${new Date().toISOString().slice(0,10)}`);
  L.push('玩家：' + ps.map(p => {
    const g = FP.gd(p);
    return `${p.emoji}${p.name}(${FP.lv(p).label}${g.key !== 'none' ? '·' + g.label : ''})`;
  }).join('、'));
  L.push('');
  if (!rated.length) { L.push('（還沒有任何評分）'); return L.join('\n'); }

  rated.sort((a,b) => totalOf(data[b.id]) - totalOf(data[a.id])).forEach(g => {
    const r = data[g.id];
    L.push(`${g.id.toUpperCase()} ${g.name} — 總分 ${totalOf(r)}/30`);
    L.push('  ' + DIMS.map(([k, lab]) => `${lab.replace(/^\S+\s/, '')} ${r.scores?.[k] || 0}`).join(' / '));
    if (r.tags?.length) L.push('  最愛：' + r.tags.join('、'));
    if (r.note) L.push('  感想：' + r.note);
    L.push('');
  });

  const avg = DIMS.map(([k, lab]) => {
    const vals = rated.map(g => data[g.id].scores?.[k] || 0);
    return { lab: lab.replace(/^\S+\s/, ''), v: vals.reduce((a,b)=>a+b,0)/vals.length };
  }).sort((a,b) => b.v - a.v);
  const cnt = {};
  rated.forEach(g => (data[g.id].tags || []).forEach(t => cnt[t] = (cnt[t]||0)+1));
  const tags = Object.entries(cnt).sort((a,b) => b[1]-a[1]);

  L.push('【口味統整】');
  avg.forEach(a => L.push(`  ${a.lab}：${a.v.toFixed(1)} / 5`));
  if (tags.length) L.push('最常被選：' + tags.map(([t,n]) => `${t}×${n}`).join('、'));
  L.push('');
  L.push('請根據以上口味設計下一款遊戲。');
  return L.join('\n');
}

$('copyBtn').addEventListener('click', async () => {
  const text = buildReport();
  $('copyText').value = text;
  let ok = false;
  try { await navigator.clipboard.writeText(text); ok = true; }
  catch (_) { try { $('copyText').select(); ok = document.execCommand('copy'); } catch (_) {} }
  $('copyHead').textContent = ok ? '📋 已複製！直接貼給 Claude' : '📋 複製失敗 → 長按下面文字全選複製';
  $('copyBox').classList.add('on');
  if (ok) {
    $('copyBtn').classList.add('done');
    $('copyBtn').textContent = '✅ 已複製';
    setTimeout(() => { $('copyBtn').classList.remove('done'); $('copyBtn').textContent = '📋 複製給 Claude'; }, 2000);
  }
});
$('copyClose').addEventListener('click', () => $('copyBox').classList.remove('on'));

/* ---------- 存檔 / 讀檔 ---------- */
$('exportBtn').addEventListener('click', () => {
  const pack = { ratings: loadR(), players: FP.get() };
  const blob = new Blob([JSON.stringify(pack, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `家庭遊戲備份-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
});
$('importBtn').addEventListener('click', () => $('fileIn').click());
$('fileIn').addEventListener('change', async (e) => {
  const f = e.target.files?.[0];
  if (!f) return;
  try {
    const inc = JSON.parse(await f.text());
    if (inc.ratings) saveR({ ...loadR(), ...inc.ratings });
    else saveR({ ...loadR(), ...inc });
    if (inc.players) FP.set(inc.players);
    renderPlayers(); renderShelf(); renderTaste();
    $('copyHead').textContent = '✅ 讀取成功，已合併';
    $('copyText').value = '玩家與評分都讀回來了。';
    $('copyBox').classList.add('on');
  } catch (err) {
    $('copyHead').textContent = '✘ 讀不了這個檔案';
    $('copyText').value = String(err);
    $('copyBox').classList.add('on');
  }
  e.target.value = '';
});

renderPlayers();
renderShelf();
renderTaste();
</script>
</body>
</html>
