<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>家庭遊戲間</title>
<style>
:root{
  --ink:#0B1B2B; --ink-2:#132A42; --line:#24435E; --paper:#FDFCF7;
  --wire:#3EE6D0; --spark:#FFD23F; --dim:#7E9BB5; --hot:#FF5C6C; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;align-items:center;
  padding:34px 16px 48px;gap:18px;
  padding-top:calc(34px + env(safe-area-inset-top));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
header{text-align:center;display:flex;flex-direction:column;gap:7px;align-items:center}
.mark{font-size:38px;letter-spacing:.08em}
h1{font-size:26px;line-height:1.3}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:12px;font-weight:500;line-height:1.7;max-width:22em}

.shelf{display:flex;flex-direction:column;gap:11px;width:100%;max-width:390px}
.card{background:var(--ink-2);border:2px solid var(--line);border-radius:18px;overflow:hidden}
a.play{display:flex;gap:13px;align-items:center;text-decoration:none;color:inherit;padding:15px;transition:.15s}
a.play:active{transform:scale(.98)}
.icon{flex:none;font-size:29px;width:48px;height:48px;border-radius:13px;background:#0A1826;
      display:flex;align-items:center;justify-content:center}
.meat{flex:1;min-width:0}
.meat .no{font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.meat b{display:block;font-size:19px;line-height:1.25;margin-top:1px}
.meat span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px;line-height:1.5}
.foot{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding:8px 15px}
.stars{font-size:13px;color:var(--spark);letter-spacing:.05em}
.total{font-size:12px;color:var(--dim);font-weight:500}
.rateBtn{margin-left:auto;font-size:12px;color:var(--wire);border:1px solid var(--line);
         border-radius:99px;padding:5px 13px}
.rateBtn:active{transform:scale(.94)}
.soon{opacity:.42;border-style:dashed;padding:15px;display:flex;gap:13px;align-items:center}

/* 口味分析 */
.taste{width:100%;max-width:390px;background:var(--ink-2);border-radius:18px;padding:16px;
       display:flex;flex-direction:column;gap:10px}
.taste h3{font-size:15px}
.taste .row{display:flex;align-items:center;gap:9px}
.taste .row .lab{font-size:12px;color:var(--dim);font-weight:500;width:86px;flex:none}
.taste .row .track{flex:1;height:9px;background:#0A1826;border-radius:99px;overflow:hidden}
.taste .row .fill{height:100%;background:var(--wire);border-radius:99px}
.taste .row .val{font-size:12px;color:var(--dim);font-weight:500;width:28px;text-align:right}
.taste .tags{display:flex;gap:6px;flex-wrap:wrap}
.taste .tags span{background:#0A1826;border-radius:99px;padding:5px 11px;font-size:12px;color:var(--spark)}
.taste .empty{font-size:12px;color:var(--dim);font-weight:500;line-height:1.75}

/* 資料按鈕 */
.data{width:100%;max-width:390px;display:flex;flex-direction:column;gap:9px}
#copyBtn{background:var(--wire);color:var(--ink);border-radius:16px;padding:15px 0;font-size:16px;width:100%}
#copyBtn:active{transform:scale(.97)}
#copyBtn.done{background:var(--hit)}
.backup{display:flex;gap:9px}
.backup button{flex:1;background:var(--ink-2);border:2px solid var(--line);border-radius:14px;
               padding:12px 0;font-size:13px;color:var(--dim)}
.backup button:active{transform:scale(.96)}
.note{font-size:11px;color:var(--dim);font-weight:500;text-align:center;line-height:1.8}
.note b{color:var(--paper)}

footer{color:var(--dim);font-size:11px;font-weight:500;text-align:center;line-height:1.9;max-width:24em}
footer b{color:var(--paper)}

/* 評分面板 */
#veil{position:fixed;inset:0;background:rgba(5,12,20,.84);display:none;z-index:10;
      align-items:flex-end;justify-content:center}
#veil.on{display:flex}
#panel{width:100%;max-width:440px;max-height:88vh;overflow-y:auto;
       background:var(--ink-2);border-radius:22px 22px 0 0;padding:20px 18px 30px;
       display:flex;flex-direction:column;gap:13px}
#panel h2{font-size:19px;text-align:center}
.dim{display:flex;align-items:center;gap:8px}
.dim .lab{font-size:14px;width:106px;flex:none}
.dim .sRow{display:flex;gap:3px;flex:1;justify-content:flex-end}
.dim .sRow button{font-size:25px;filter:grayscale(1);opacity:.32;transition:.1s;padding:2px}
.dim .sRow button.on{filter:none;opacity:1;transform:scale(1.08)}
.tagPick{display:flex;gap:7px;flex-wrap:wrap}
.tagPick button{background:#0A1826;border:2px solid var(--line);border-radius:99px;
                padding:8px 13px;font-size:13px;color:var(--dim)}
.tagPick button.on{border-color:var(--spark);color:var(--spark)}
#noteIn{width:100%;background:#0A1826;border:2px solid var(--line);border-radius:14px;
        padding:12px;font:inherit;font-size:14px;color:var(--paper);outline:none;font-weight:500}
#noteIn:focus{border-color:var(--wire)}
.panelBtns{display:flex;gap:9px}
#cancelBtn{flex:1;background:#0A1826;border:2px solid var(--line);border-radius:14px;
           padding:14px 0;font-size:15px;color:var(--dim)}
#saveBtn{flex:2;background:var(--wire);color:var(--ink);border-radius:14px;padding:14px 0;font-size:16px}
#liveTotal{text-align:center;font-size:13px;color:var(--dim);font-weight:500}
#liveTotal b{color:var(--spark);font-size:17px}

/* 複製結果 */
#copyBox{position:fixed;inset:0;background:rgba(5,12,20,.9);display:none;z-index:11;
         align-items:center;justify-content:center;padding:20px}
#copyBox.on{display:flex}
#copyInner{width:100%;max-width:420px;background:var(--ink-2);border-radius:20px;padding:18px;
           display:flex;flex-direction:column;gap:12px}
#copyInner h3{font-size:16px;text-align:center}
#copyText{width:100%;height:220px;background:#0A1826;border:2px solid var(--line);border-radius:14px;
          padding:12px;font:inherit;font-size:12px;font-weight:500;color:var(--paper);
          font-family:ui-monospace,monospace;resize:none;outline:none}
#copyClose{background:var(--wire);color:var(--ink);border-radius:14px;padding:13px 0;font-size:15px}
</style>
</head>
<body>

<header>
  <div class="mark">🎮 🧒 🧑 🧔</div>
  <h1>家庭<em>遊戲間</em></h1>
  <p class="sub">全部住在平板裡，畫面和聲音都不會傳出去。<br>玩完記得評分——分數會教 Claude 下一個遊戲怎麼做。</p>
</header>

<div class="shelf" id="shelf"></div>

<div class="taste" id="taste"></div>

<div class="data">
  <button id="copyBtn">📋 複製給 Claude</button>
  <div class="backup">
    <button id="exportBtn">💾 存成檔案</button>
    <button id="importBtn">📂 讀取檔案</button>
  </div>
  <input type="file" id="fileIn" accept=".json,application/json" style="display:none">
  <p class="note">評分存在<b>這台裝置</b>裡。<br>要給 Claude 看 → 按「複製給 Claude」，貼進對話框。<br>要換裝置 → 先「存成檔案」，到新裝置「讀取檔案」。</p>
</div>

<footer>
  第一次玩要等機器人下載大腦，<b>之後秒開</b>。<br>
  卡住的話，網址後面加 <b>?v=9</b> 逼它重抓。
</footer>

<div id="veil">
  <div id="panel">
    <h2 id="pTitle">評分</h2>
    <div id="dims"></div>
    <div id="liveTotal">總分 <b>0</b> / 30</div>
    <div>
      <div style="font-size:13px;color:var(--dim);font-weight:500;margin-bottom:8px">最愛哪一點？（可多選）</div>
      <div class="tagPick" id="tagPick"></div>
    </div>
    <input id="noteIn" type="text" placeholder="一句話感想（可不填）" autocomplete="off">
    <div class="panelBtns">
      <button id="cancelBtn">取消</button>
      <button id="saveBtn">儲存評分</button>
    </div>
  </div>
</div>

<div id="copyBox">
  <div id="copyInner">
    <h3 id="copyHead">📋 已複製！直接貼給 Claude</h3>
    <textarea id="copyText" readonly></textarea>
    <button id="copyClose">好</button>
  </div>
</div>

<script>
/* ==============================================================
   遊戲清單 —— 新遊戲只要在這裡加一行
   ============================================================== */
const GAMES = [
  { id:'g01', file:'g01-doodle.html',    icon:'✏️', name:'全家 vs 機器人',
    desc:'一個人畫、其他人猜，機器人也在猜——看誰先。', tag:'1 台' },
  { id:'g02', file:'g02-hunt.html',      icon:'📸', name:'家裡尋寶',
    desc:'機器人喊一樣東西，跑去找出來、鏡頭對準它。', tag:'要相機' },
  { id:'g03', file:'g03-face.html',      icon:'😡', name:'表情大挑戰',
    desc:'用臉做出指定表情，機器人告訴你像幾 %。', tag:'要相機' },
  { id:'g04', file:'g04-speak.html',     icon:'🎤', name:'唸給機器人聽',
    desc:'看中文說英文，機器人聽你發音準不準。', tag:'要麥克風' },
  { id:'g05', file:'g05-telephone.html', icon:'📞', name:'傳話大亂畫',
    desc:'畫→猜→再畫，最後機器人判斷傳回原題了嗎。', tag:'1 台' },
];
const NEXT_NO = 'G06';

const DIMS = [
  ['fun',    '😆 好玩'],
  ['easy',   '🚀 好上手'],
  ['replay', '🔁 耐玩・變化'],
  ['idea',   '💡 創意'],
  ['family', '👨‍👦‍👦 全家互動'],
  ['polish', '✨ 完成度'],
];

const TAGS = ['笑到肚子痛','緊張刺激','學到東西','全家一起玩','AI 好神','小孩自己會玩','想一直再來一局'];

const KEY = 'family-game-ratings-v1';
const $ = (id) => document.getElementById(id);

const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(_) { return {}; } };
const save = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(_) {} };
const totalOf = (r) => DIMS.reduce((s,[k]) => s + (r?.scores?.[k] || 0), 0);

/* ---------- 遊戲架 ---------- */
function renderShelf() {
  const data = load();
  $('shelf').innerHTML = GAMES.map(g => {
    const r = data[g.id];
    const t = r ? totalOf(r) : 0;
    const n = Math.round(t / 6);
    const stars = r ? '★'.repeat(n) + '☆'.repeat(5 - n) : '☆☆☆☆☆';
    return `
    <div class="card">
      <a class="play" href="${g.file}">
        <div class="icon">${g.icon}</div>
        <div class="meat">
          <div class="no">${g.id.toUpperCase()} · ${g.tag}</div>
          <b>${g.name}</b>
          <span>${g.desc}</span>
        </div>
      </a>
      <div class="foot">
        <div class="stars">${stars}</div>
        <div class="total">${r ? t + ' / 30' : '還沒評分'}</div>
        <button class="rateBtn" data-id="${g.id}">${r ? '改評分' : '⭐ 評分'}</button>
      </div>
    </div>`;
  }).join('') + `
    <div class="card soon">
      <div class="icon">➕</div>
      <div class="meat"><div class="no">${NEXT_NO}</div><b>還沒做</b><span>下一個遊戲的位置</span></div>
    </div>`;

  document.querySelectorAll('.rateBtn').forEach(b =>
    b.addEventListener('click', () => openPanel(b.dataset.id)));
}

/* ---------- 口味分析 ---------- */
function renderTaste() {
  const data = load();
  const rated = GAMES.filter(g => data[g.id]);
  const box = $('taste');

  if (!rated.length) {
    box.innerHTML = `<h3>📈 你們家的口味</h3>
      <div class="empty">還沒有任何評分。<br>玩完一款回來按「⭐ 評分」，這裡就會慢慢看出你們家最愛什麼——之後的新遊戲會照這個做。</div>`;
    return;
  }

  const avg = DIMS.map(([k, lab]) => {
    const vals = rated.map(g => data[g.id].scores?.[k] || 0);
    return { lab, v: vals.reduce((a,b)=>a+b,0) / vals.length };
  }).sort((a,b) => b.v - a.v);

  const cnt = {};
  rated.forEach(g => (data[g.id].tags || []).forEach(t => cnt[t] = (cnt[t]||0)+1));
  const topTags = Object.entries(cnt).sort((a,b) => b[1]-a[1]).slice(0,4);

  box.innerHTML = `<h3>📈 你們家的口味（已評 ${rated.length} 款）</h3>` +
    avg.map(a => `
      <div class="row">
        <div class="lab">${a.lab}</div>
        <div class="track"><div class="fill" style="width:${a.v/5*100}%"></div></div>
        <div class="val">${a.v.toFixed(1)}</div>
      </div>`).join('') +
    (topTags.length ? `<div class="tags">${topTags.map(([t,n]) => `<span>${t} ×${n}</span>`).join('')}</div>` : '');
}

/* ---------- 評分面板 ---------- */
let cur = null, curScores = {}, curTags = new Set();

function openPanel(id) {
  cur = GAMES.find(g => g.id === id);
  const old = load()[id];
  curScores = { ...(old?.scores || {}) };
  curTags = new Set(old?.tags || []);

  $('pTitle').textContent = `⭐ 評分：${cur.name}`;
  $('noteIn').value = old?.note || '';

  $('dims').innerHTML = DIMS.map(([k, lab]) => `
    <div class="dim">
      <div class="lab">${lab}</div>
      <div class="sRow" data-k="${k}">
        ${[1,2,3,4,5].map(n => `<button data-n="${n}">⭐</button>`).join('')}
      </div>
    </div>`).join('');

  document.querySelectorAll('.sRow').forEach(row =>
    row.querySelectorAll('button').forEach(b =>
      b.addEventListener('click', () => { curScores[row.dataset.k] = +b.dataset.n; paintStars(); })));

  $('tagPick').innerHTML = TAGS.map(t =>
    `<button data-t="${t}" class="${curTags.has(t) ? 'on' : ''}">${t}</button>`).join('');
  document.querySelectorAll('#tagPick button').forEach(b =>
    b.addEventListener('click', () => {
      const t = b.dataset.t;
      curTags.has(t) ? curTags.delete(t) : curTags.add(t);
      b.classList.toggle('on');
    }));

  paintStars();
  $('veil').classList.add('on');
}

function paintStars() {
  document.querySelectorAll('.sRow').forEach(row => {
    const v = curScores[row.dataset.k] || 0;
    row.querySelectorAll('button').forEach(b => b.classList.toggle('on', +b.dataset.n <= v));
  });
  const t = DIMS.reduce((s,[k]) => s + (curScores[k] || 0), 0);
  $('liveTotal').innerHTML = `總分 <b>${t}</b> / 30`;
}

$('cancelBtn').addEventListener('click', () => $('veil').classList.remove('on'));
$('veil').addEventListener('click', (e) => { if (e.target === $('veil')) $('veil').classList.remove('on'); });

$('saveBtn').addEventListener('click', () => {
  const data = load();
  data[cur.id] = {
    scores: curScores,
    tags: [...curTags],
    note: $('noteIn').value.trim(),
    when: new Date().toISOString().slice(0,10),
  };
  save(data);
  $('veil').classList.remove('on');
  renderShelf();
  renderTaste();
});

/* ---------- 📋 複製給 Claude ---------- */
function buildReport() {
  const data = load();
  const rated = GAMES.filter(g => data[g.id]);
  if (!rated.length) return '（還沒有任何評分）';

  const L = [];
  L.push('【家庭遊戲間 · 評分回報】');
  L.push(`日期：${new Date().toISOString().slice(0,10)}`);
  L.push('');

  rated.sort((a,b) => totalOf(data[b.id]) - totalOf(data[a.id])).forEach(g => {
    const r = data[g.id];
    L.push(`${g.id.toUpperCase()} ${g.name} — 總分 ${totalOf(r)}/30`);
    L.push('  ' + DIMS.map(([k, lab]) => `${lab.replace(/^\S+\s/, '')} ${r.scores?.[k] || 0}`).join(' / '));
    if (r.tags?.length) L.push('  最愛：' + r.tags.join('、'));
    if (r.note) L.push('  感想：' + r.note);
    L.push('');
  });

  // 口味統整
  const avg = DIMS.map(([k, lab]) => {
    const vals = rated.map(g => data[g.id].scores?.[k] || 0);
    return { lab: lab.replace(/^\S+\s/, ''), v: vals.reduce((a,b)=>a+b,0)/vals.length };
  }).sort((a,b) => b.v - a.v);

  const cnt = {};
  rated.forEach(g => (data[g.id].tags || []).forEach(t => cnt[t] = (cnt[t]||0)+1));
  const tags = Object.entries(cnt).sort((a,b) => b[1]-a[1]);

  L.push('【口味統整】');
  L.push('各維度平均（高→低）：');
  avg.forEach(a => L.push(`  ${a.lab}：${a.v.toFixed(1)} / 5`));
  if (tags.length) L.push('最常被選的標籤：' + tags.map(([t,n]) => `${t}×${n}`).join('、'));
  L.push('');
  L.push('請根據以上口味設計下一款遊戲。');

  return L.join('\n');
}

$('copyBtn').addEventListener('click', async () => {
  const text = buildReport();
  $('copyText').value = text;

  let ok = false;
  try {
    await navigator.clipboard.writeText(text);
    ok = true;
  } catch (_) {
    // Safari 有時擋剪貼簿 → 退回「自己選取複製」
    try {
      $('copyText').select();
      ok = document.execCommand('copy');
    } catch (_) {}
  }

  $('copyHead').textContent = ok
    ? '📋 已複製！直接貼給 Claude'
    : '📋 複製失敗 → 請長按下面文字全選複製';
  $('copyBox').classList.add('on');

  if (ok) {
    $('copyBtn').classList.add('done');
    $('copyBtn').textContent = '✅ 已複製';
    setTimeout(() => {
      $('copyBtn').classList.remove('done');
      $('copyBtn').textContent = '📋 複製給 Claude';
    }, 2000);
  }
});

$('copyClose').addEventListener('click', () => $('copyBox').classList.remove('on'));

/* ---------- 💾 存檔 / 📂 讀檔 ---------- */
$('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(load(), null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `家庭遊戲評分-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
});

$('importBtn').addEventListener('click', () => $('fileIn').click());

$('fileIn').addEventListener('change', async (e) => {
  const f = e.target.files?.[0];
  if (!f) return;
  try {
    const incoming = JSON.parse(await f.text());
    const merged = { ...load(), ...incoming };   // 合併，不覆蓋整包
    save(merged);
    renderShelf();
    renderTaste();
    $('copyHead').textContent = '✅ 讀取成功，評分已合併';
    $('copyText').value = JSON.stringify(merged, null, 2);
    $('copyBox').classList.add('on');
  } catch (err) {
    $('copyHead').textContent = '✘ 讀不了這個檔案';
    $('copyText').value = String(err);
    $('copyBox').classList.add('on');
  }
  e.target.value = '';
});

renderShelf();
renderTaste();
</script>
</body>
</html>
