<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>家庭遊戲間</title>
<style>
:root{
  --ink:#0B1B2B; --ink-2:#132A42; --line:#24435E; --paper:#FDFCF7;
  --wire:#3EE6D0; --spark:#FFD23F; --dim:#7E9BB5; --hot:#FF5C6C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;align-items:center;
  padding:34px 16px 48px;gap:20px;
  padding-top:calc(34px + env(safe-area-inset-top));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
header{text-align:center;display:flex;flex-direction:column;gap:7px;align-items:center}
.mark{font-size:40px;letter-spacing:.08em}
h1{font-size:26px;line-height:1.3}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:12px;font-weight:500;line-height:1.7;max-width:22em}

.shelf{display:flex;flex-direction:column;gap:11px;width:100%;max-width:390px}

.card{background:var(--ink-2);border:2px solid var(--line);border-radius:18px;overflow:hidden}
a.play{display:flex;gap:13px;align-items:center;text-decoration:none;color:inherit;padding:15px;transition:.15s}
a.play:active{transform:scale(.98)}
.icon{flex:none;font-size:30px;width:48px;height:48px;border-radius:13px;background:#0A1826;
      display:flex;align-items:center;justify-content:center}
.meat{flex:1;min-width:0}
.meat .no{font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.meat b{display:block;font-size:19px;line-height:1.25;margin-top:1px}
.meat span{display:block;font-size:11px;color:var(--dim);font-weight:500;margin-top:3px;line-height:1.5}
.foot{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding:8px 15px}
.stars{font-size:13px;color:var(--spark);letter-spacing:.05em}
.total{font-size:12px;color:var(--dim);font-weight:500}
.rateBtn{margin-left:auto;font-size:12px;color:var(--wire);border:1px solid var(--line);
         border-radius:99px;padding:5px 13px}
.rateBtn:active{transform:scale(.94)}

.soon{opacity:.42;border-style:dashed;padding:15px;display:flex;gap:13px;align-items:center}

/* 口味分析 */
.taste{width:100%;max-width:390px;background:var(--ink-2);border-radius:18px;padding:16px;
       display:flex;flex-direction:column;gap:10px}
.taste h3{font-size:15px}
.taste .row{display:flex;align-items:center;gap:9px}
.taste .row .lab{font-size:12px;color:var(--dim);font-weight:500;width:82px;flex:none}
.taste .row .track{flex:1;height:9px;background:#0A1826;border-radius:99px;overflow:hidden}
.taste .row .fill{height:100%;background:var(--wire);border-radius:99px}
.taste .row .val{font-size:12px;color:var(--dim);font-weight:500;width:28px;text-align:right}
.taste .tags{display:flex;gap:6px;flex-wrap:wrap}
.taste .tags span{background:#0A1826;border-radius:99px;padding:5px 11px;font-size:12px;color:var(--spark)}
.taste .empty{font-size:12px;color:var(--dim);font-weight:500;line-height:1.7}

footer{color:var(--dim);font-size:11px;font-weight:500;text-align:center;line-height:1.9;max-width:24em}
footer b{color:var(--paper)}

/* 評分面板 */
#veil{position:fixed;inset:0;background:rgba(5,12,20,.82);display:none;z-index:10;
      align-items:flex-end;justify-content:center}
#veil.on{display:flex}
#panel{
  width:100%;max-width:440px;max-height:88vh;overflow-y:auto;
  background:var(--ink-2);border-radius:22px 22px 0 0;padding:20px 18px 30px;
  display:flex;flex-direction:column;gap:14px;
}
#panel h2{font-size:19px;text-align:center}
.dim{display:flex;align-items:center;gap:8px}
.dim .lab{font-size:14px;width:104px;flex:none}
.dim .sRow{display:flex;gap:4px;flex:1;justify-content:flex-end}
.dim .sRow button{font-size:26px;filter:grayscale(1);opacity:.35;transition:.1s;padding:2px}
.dim .sRow button.on{filter:none;opacity:1;transform:scale(1.08)}
.tagPick{display:flex;gap:7px;flex-wrap:wrap}
.tagPick button{background:#0A1826;border:2px solid var(--line);border-radius:99px;
                padding:8px 13px;font-size:13px;color:var(--dim)}
.tagPick button.on{border-color:var(--spark);color:var(--spark)}
#noteIn{width:100%;background:#0A1826;border:2px solid var(--line);border-radius:14px;
        padding:12px;font:inherit;font-size:14px;color:var(--paper);outline:none;font-weight:500}
#noteIn:focus{border-color:var(--wire)}
.panelBtns{display:flex;gap:9px}
#cancelBtn{flex:1;background:#0A1826;border:2px solid var(--line);border-radius:14px;
           padding:14px 0;font-size:15px;color:var(--dim)}
#saveBtn{flex:2;background:var(--wire);color:var(--ink);border-radius:14px;padding:14px 0;font-size:16px}
#liveTotal{text-align:center;font-size:13px;color:var(--dim);font-weight:500}
#liveTotal b{color:var(--spark);font-size:17px}
</style>
</head>
<body>

<header>
  <div class="mark">🎮 🧒 🧑 🧔</div>
  <h1>家庭<em>遊戲間</em></h1>
  <p class="sub">全部住在平板裡，畫面和聲音都不會傳出去。<br>玩完記得評分——分數會教 Claude 下一個遊戲怎麼做。</p>
</header>

<div class="shelf" id="shelf"></div>

<div class="taste" id="taste"></div>

<footer>
  第一次玩要等機器人下載大腦，<b>之後秒開</b>。<br>
  評分存在這台裝置裡。卡住的話，網址後面加 <b>?v=9</b> 逼它重抓。
</footer>

<!-- 評分面板 -->
<div id="veil">
  <div id="panel">
    <h2 id="pTitle">評分</h2>
    <div id="dims"></div>
    <div id="liveTotal">總分 <b>0</b> / 30</div>
    <div>
      <div style="font-size:13px;color:var(--dim);font-weight:500;margin-bottom:8px">最愛哪一點？（可多選）</div>
      <div class="tagPick" id="tagPick"></div>
    </div>
    <input id="noteIn" type="text" placeholder="一句話感想（可不填）" autocomplete="off">
    <div class="panelBtns">
      <button id="cancelBtn">取消</button>
      <button id="saveBtn">儲存評分</button>
    </div>
  </div>
</div>

<script>
/* ==============================================================
   遊戲清單 —— 新遊戲只要在這裡加一行
   ============================================================== */
const GAMES = [
  { id:'g01', file:'g01-doodle.html',    icon:'✏️', name:'全家 vs 機器人',
    desc:'一個人畫、其他人猜，機器人也在猜——看誰先。', tag:'1 台' },
  { id:'g02', file:'g02-hunt.html',      icon:'📸', name:'家裡尋寶',
    desc:'機器人喊一樣東西，跑去找出來、鏡頭對準它。', tag:'要相機' },
  { id:'g03', file:'g03-face.html',      icon:'😡', name:'表情大挑戰',
    desc:'用臉做出指定表情，機器人告訴你像幾 %。', tag:'要相機' },
  { id:'g04', file:'g04-speak.html',     icon:'🎤', name:'唸給機器人聽',
    desc:'看中文說英文，機器人聽你發音準不準。', tag:'要麥克風' },
  { id:'g05', file:'g05-telephone.html', icon:'📞', name:'傳話大亂畫',
    desc:'畫→猜→再畫，最後機器人判斷傳回原題了嗎。', tag:'1 台' },
];
const NEXT_NO = 'G06';

/* 六個評分維度 */
const DIMS = [
  ['fun',    '😆 好玩'],
  ['easy',   '🚀 好上手'],
  ['replay', '🔁 耐玩・變化'],
  ['idea',   '💡 創意'],
  ['family', '👨‍👦‍👦 全家互動'],
  ['polish', '✨ 完成度'],
];

/* 「最愛哪一點」標籤 —— 累積起來 = 你們家的口味 */
const TAGS = ['笑到肚子痛','緊張刺激','學到東西','全家一起玩','AI 好神','小孩自己會玩','想一直再來一局'];

const KEY = 'family-game-ratings-v1';
const $ = (id) => document.getElementById(id);

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(_) { return {}; }
}
function save(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(_) {}
}

const totalOf = (r) => DIMS.reduce((s,[k]) => s + (r?.scores?.[k] || 0), 0);

/* ---------- 畫遊戲架 ---------- */
function renderShelf() {
  const data = load();
  $('shelf').innerHTML = GAMES.map(g => {
    const r = data[g.id];
    const t = r ? totalOf(r) : 0;
    const stars = r ? '★'.repeat(Math.round(t/6)) + '☆'.repeat(5 - Math.round(t/6)) : '☆☆☆☆☆';
    return `
    <div class="card">
      <a class="play" href="${g.file}">
        <div class="icon">${g.icon}</div>
        <div class="meat">
          <div class="no">${g.id.toUpperCase()} · ${g.tag}</div>
          <b>${g.name}</b>
          <span>${g.desc}</span>
        </div>
      </a>
      <div class="foot">
        <div class="stars">${stars}</div>
        <div class="total">${r ? t + ' / 30' : '還沒評分'}</div>
        <button class="rateBtn" data-id="${g.id}">${r ? '改評分' : '⭐ 評分'}</button>
      </div>
    </div>`;
  }).join('') + `
    <div class="card soon">
      <div class="icon">➕</div>
      <div class="meat"><div class="no">${NEXT_NO}</div><b>還沒做</b><span>下一個遊戲的位置</span></div>
    </div>`;

  document.querySelectorAll('.rateBtn').forEach(b =>
    b.addEventListener('click', () => openPanel(b.dataset.id)));
}

/* ---------- 口味分析 ---------- */
function renderTaste() {
  const data = load();
  const rated = GAMES.filter(g => data[g.id]);
  const box = $('taste');

  if (!rated.length) {
    box.innerHTML = `<h3>📈 你們家的口味</h3>
      <div class="empty">還沒有任何評分。玩完一個遊戲回來按「⭐ 評分」，這裡就會慢慢看出你們家最愛什麼——之後的新遊戲會照這個做。</div>`;
    return;
  }

  // 各維度平均
  const avg = DIMS.map(([k, lab]) => {
    const vals = rated.map(g => data[g.id].scores?.[k] || 0);
    return { lab, v: vals.reduce((a,b)=>a+b,0) / vals.length };
  }).sort((a,b) => b.v - a.v);

  // 標籤統計
  const cnt = {};
  rated.forEach(g => (data[g.id].tags || []).forEach(t => cnt[t] = (cnt[t]||0)+1));
  const topTags = Object.entries(cnt).sort((a,b) => b[1]-a[1]).slice(0,4);

  box.innerHTML = `<h3>📈 你們家的口味（已評 ${rated.length} 款）</h3>` +
    avg.map(a => `
      <div class="row">
        <div class="lab">${a.lab}</div>
        <div class="track"><div class="fill" style="width:${a.v/5*100}%"></div></div>
        <div class="val">${a.v.toFixed(1)}</div>
      </div>`).join('') +
    (topTags.length ? `<div class="tags">${topTags.map(([t,n]) => `<span>${t} ×${n}</span>`).join('')}</div>` : '');
}

/* ---------- 評分面板 ---------- */
let cur = null, curScores = {}, curTags = new Set();

function openPanel(id) {
  cur = GAMES.find(g => g.id === id);
  const old = load()[id];
  curScores = { ...(old?.scores || {}) };
  curTags = new Set(old?.tags || []);

  $('pTitle').textContent = `⭐ 評分：${cur.name}`;
  $('noteIn').value = old?.note || '';

  $('dims').innerHTML = DIMS.map(([k, lab]) => `
    <div class="dim">
      <div class="lab">${lab}</div>
      <div class="sRow" data-k="${k}">
        ${[1,2,3,4,5].map(n => `<button data-n="${n}">⭐</button>`).join('')}
      </div>
    </div>`).join('');

  document.querySelectorAll('.sRow').forEach(row => {
    row.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        curScores[row.dataset.k] = +b.dataset.n;
        paintStars();
      });
    });
  });

  $('tagPick').innerHTML = TAGS.map(t =>
    `<button data-t="${t}" class="${curTags.has(t) ? 'on' : ''}">${t}</button>`).join('');
  document.querySelectorAll('#tagPick button').forEach(b => {
    b.addEventListener('click', () => {
      const t = b.dataset.t;
      curTags.has(t) ? curTags.delete(t) : curTags.add(t);
      b.classList.toggle('on');
    });
  });

  paintStars();
  $('veil').classList.add('on');
}

function paintStars() {
  document.querySelectorAll('.sRow').forEach(row => {
    const v = curScores[row.dataset.k] || 0;
    row.querySelectorAll('button').forEach(b =>
      b.classList.toggle('on', +b.dataset.n <= v));
  });
  const t = DIMS.reduce((s,[k]) => s + (curScores[k] || 0), 0);
  $('liveTotal').innerHTML = `總分 <b>${t}</b> / 30`;
}

$('cancelBtn').addEventListener('click', () => $('veil').classList.remove('on'));
$('veil').addEventListener('click', (e) => { if (e.target === $('veil')) $('veil').classList.remove('on'); });

$('saveBtn').addEventListener('click', () => {
  const data = load();
  data[cur.id] = {
    scores: curScores,
    tags: [...curTags],
    note: $('noteIn').value.trim(),
    when: new Date().toISOString().slice(0,10),
  };
  save(data);
  $('veil').classList.remove('on');
  renderShelf();
  renderTaste();
});

renderShelf();
renderTaste();
</script>
</body>
</html>
