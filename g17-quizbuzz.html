<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#241C0A">
<title>G17 搶答大作戰</title>
<style>
:root{
  --ink:#241C0A; --ink-2:#3C2F14; --line:#5E4B24; --paper:#FDFCF7;
  --wire:#FFD23F; --spark:#FFD23F; --hot:#FF5C6C; --dim:#BCA878; --hit:#4ADE80;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--paper);
  font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;font-weight:700;
  display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}
.center{justify-content:center;align-items:center;text-align:center;gap:14px;padding:24px}

.hero{font-size:44px}
h1{font-size:24px;line-height:1.35}
h1 em{font-style:normal;color:var(--wire)}
.sub{color:var(--dim);font-size:12px;font-weight:500;line-height:1.85;max-width:22em}
.sub b{color:var(--paper)}
.big{background:var(--wire);color:var(--ink);border-radius:18px;padding:16px 42px;font-size:19px}
.big:active{transform:scale(.97)}
.back{color:var(--dim);font-size:12px;text-decoration:underline}
.box{width:min(320px,90vw);background:var(--ink-2);border-radius:16px;padding:13px;
     display:flex;flex-direction:column;gap:9px}
.box h3{font-size:13px;color:var(--dim);font-weight:500;letter-spacing:.08em;text-align:left}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chips button{background:#171106;border:2px solid var(--line);border-radius:99px;
              padding:8px 13px;font-size:13px;color:var(--dim);transition:.1s}
.chips button.on{border-color:var(--wire);color:var(--wire);background:#4A3A16}

#play{padding:8px 10px 10px;gap:8px}
.hud{display:flex;align-items:center;gap:8px}
.pill{background:var(--ink-2);border-radius:99px;padding:6px 12px;font-size:13px;white-space:nowrap}
#timer{margin-left:auto;font-variant-numeric:tabular-nums;font-size:18px;min-width:50px;text-align:center;
       background:var(--ink-2);border-radius:99px;padding:6px 10px}
#timer.hot{color:var(--hot);animation:pulse .5s infinite}
@keyframes pulse{50%{transform:scale(1.14)}}

.qBox{background:var(--ink-2);border-radius:18px;padding:15px;text-align:center}
.qBox .cat{font-size:11px;color:var(--dim);font-weight:500;letter-spacing:.14em}
.qBox .q{font-size:22px;line-height:1.45;margin-top:4px}

.opts{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opts button{background:var(--ink-2);border:2px solid var(--line);border-radius:16px;
             font-size:19px;padding:8px;transition:.12s;line-height:1.3}
.opts button:active{transform:scale(.95)}
.opts button.right{background:#1E4230;border-color:var(--hit);color:var(--hit)}
.opts button.wrong{background:#4A1720;border-color:var(--hot);color:var(--hot)}
.opts button[disabled]{opacity:.5}
.opts.locked button{pointer-events:none}

.status{text-align:center;font-size:14px;background:var(--ink-2);border-radius:99px;padding:8px;min-height:37px}
.status b{color:var(--spark)}

.buzzers{display:flex;gap:8px}
.buzzers button{flex:1;border-radius:16px;padding:16px 0;font-size:15px;color:#fff;transition:.1s;
                border:3px solid transparent}
.buzzers button:active{transform:scale(.94)}
.buzzers button.me{border-color:#fff;animation:glow .5s infinite alternate}
.buzzers button.out{opacity:.3;pointer-events:none}
@keyframes glow{to{filter:brightness(1.3)}}
.scoresLine{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.scoresLine span{background:var(--ink-2);border-radius:99px;padding:4px 10px;font-size:12px}

#over{overflow-y:auto}
.board{display:flex;flex-direction:column;gap:8px;width:min(320px,86vw)}
.row{display:flex;align-items:center;gap:12px;background:var(--ink-2);border-radius:14px;padding:12px 16px}
.row.top{background:var(--spark);color:var(--ink)}
.row .rk{font-size:19px;width:28px}
.row .nm{flex:1;text-align:left;font-size:16px}
.row .sc{font-size:17px}
</style>
</head>
<body>
<a href="index.html#lobby" id="exitGame" aria-label="離開回遊戲間"
   style="position:fixed;top:calc(8px + env(safe-area-inset-top));left:calc(8px + env(safe-area-inset-left));
   z-index:60;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.45);
   backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
   display:flex;align-items:center;justify-content:center;font-size:20px;
   text-decoration:none;color:#fff;border:1.5px solid rgba(255,255,255,.25)">✕</a>


<section id="start" class="screen on center">
  <div class="hero">🔔 ❓ ⚡</div>
  <h1>G17 <em>搶答大作戰</em></h1>
  <p class="sub">機器人出題，<b>先按自己按鈴的人才能作答</b>！<br>
  答對 +1，答錯這題不能再搶（別人還有機會）。<br>共 10 題，看誰是搶答王。</p>
  <div class="box">
    <h3>👥 誰要比？（2～4 人）</h3>
    <div class="chips" id="who"></div>
  </div>
  <button class="big" id="go">開始搶答</button>
  <a class="back" href="index.html">← 回遊戲間（改玩家設定）</a>
</section>

<section id="play" class="screen">
  <div class="hud">
    <div class="pill">第 <span id="qNum">1</span> / 10 題</div>
    <div id="timer">15</div>
  </div>
  <div class="qBox">
    <div class="cat" id="qCat">動 物</div>
    <div class="q" id="qTxt">哪一種動物脖子最長？</div>
  </div>
  <div class="opts locked" id="opts"></div>
  <div class="status" id="status">🔔 先按下面自己的按鈴才能作答！</div>
  <div class="buzzers" id="buzzers"></div>
  <div class="scoresLine" id="scoresLine"></div>
</section>

<section id="over" class="screen center">
  <div class="hero">🏆</div>
  <h2 style="font-size:24px">搶答王排行</h2>
  <div class="board" id="board"></div>
  <button class="big" id="again">再比一場</button>
  <a class="back" href="index.html#lobby" id="gohome" style="display:inline-block;margin-top:10px">🏠 回遊戲間（換一款玩）</a>
</section>

    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    f.forEach((hz,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type; o.frequency.value = hz;
      const t = ac.currentTime + i*dur*0.8;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t+dur+0.02);
    });
  } catch(_) {}
}
const SFX = {
  buzz:  () => beep([990,1320], 0.08, 'square', 0.13),
  right: () => beep([659,880,1175], 0.1, 'triangle', 0.17),
  wrong: () => beep([300,220], 0.14, 'sawtooth', 0.12),
  go:    () => beep([392,523], 0.1, 'triangle', 0.12),
  tick:  () => beep([880], 0.05, 'square', 0.05),
  done:  () => beep([523,659,784,1047,1319], 0.13, 'triangle', 0.18),
};

const S = {
  picks: new Set(), fighters: [],
  deck: [], round: 0, q: null,
  buzzed: -1, outs: new Set(),
  left: 0, timerId: null, phase: 'idle',
};

const $ = (id) => document.getElementById(id);
const show = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
};
const shuffle = (a) => { for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };

function paintStart() {
  const ps = FP.get();
  ps.forEach((_, i) => { if (i < 4) S.picks.add(i); });
  renderWho();
}
function renderWho() {
  const ps = FP.get();
  $('who').innerHTML = ps.map((p, i) =>
    `<button data-i="${i}" class="${S.picks.has(i) ? 'on' : ''}">${p.emoji} ${p.name}</button>`).join('');
  document.querySelectorAll('#who button').forEach(b =>
    b.addEventListener('click', () => {
      const i = +b.dataset.i;
      if (S.picks.has(i)) S.picks.delete(i);
      else if (S.picks.size < 4) S.picks.add(i);
      renderWho();
      beep([700], 0.04, 'sine', 0.05);
    }));
}

function startGame() {
  const ps = FP.get();
  S.fighters = [...S.picks].sort((a,b)=>a-b).map((i, k) => ({ p: ps[i], score: 0, k }));
  S.deck = shuffle([...QUIZ]);
  S.round = 0;
  $('buzzers').innerHTML = S.fighters.map((f, k) => `
    <button data-k="${k}" style="background:${CONFIG.ZONE_COLORS[k]}">
      🔔 ${f.p.emoji} ${f.p.name}</button>`).join('');
  document.querySelectorAll('#buzzers button').forEach(b =>
    b.addEventListener('pointerdown', (e) => { e.preventDefault(); buzz(+b.dataset.k); }));
  show('play');
  nextQ();
}

function nextQ() {
  S.round++;
  if (S.round > CONFIG.ROUNDS || !S.deck.length) return finish();
  const [cat, q, ok, ...bad] = S.deck.pop();
  S.q = { cat, q, ok };
  S.buzzed = -1;
  S.outs = new Set();
  $('qNum').textContent = S.round;
  $('qCat').textContent = cat;
  $('qTxt').textContent = q;

  const opts = shuffle([ok, ...bad]);
  $('opts').innerHTML = opts.map(o => `<button data-o="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('');
  $('opts').classList.add('locked');
  document.querySelectorAll('#opts button').forEach(b =>
    b.addEventListener('click', () => answer(b)));

  document.querySelectorAll('#buzzers button').forEach(b => b.classList.remove('me','out'));
  $('status').innerHTML = '🔔 先按下面自己的按鈴才能作答！';
  paintScores();

  S.phase = 'buzz';
  S.left = CONFIG.Q_SECONDS;
  paintTimer();
  clearInterval(S.timerId);
  S.timerId = setInterval(() => {
    S.left--;
    paintTimer();
    if (S.left <= 3 && S.left > 0) SFX.tick();
    if (S.left <= 0) timeUp();
  }, 1000);
  SFX.go();
}

function paintTimer() {
  $('timer').textContent = S.left;
  $('timer').classList.toggle('hot', S.left <= 4);
}
function paintScores() {
  $('scoresLine').innerHTML = S.fighters.map(f =>
    `<span>${f.p.emoji} ${f.p.name}：${f.score}</span>`).join('');
}

function buzz(k) {
  if (S.phase !== 'buzz' || S.outs.has(k)) return;
  S.phase = 'answer';
  S.buzzed = k;
  SFX.buzz();
  const f = S.fighters[k];
  document.querySelectorAll('#buzzers button').forEach((b, i) =>
    b.classList.toggle('me', i === k));
  $('status').innerHTML = `⚡ <b>${f.p.emoji} ${f.p.name}</b> 搶到了！選答案——`;
  $('opts').classList.remove('locked');
}

function answer(btn) {
  if (S.phase !== 'answer') return;
  const f = S.fighters[S.buzzed];
  const right = btn.dataset.o === S.q.ok;

  if (right) {
    S.phase = 'idle';
    clearInterval(S.timerId);
    btn.classList.add('right');
    f.score++;
    paintScores();
    SFX.right();
    $('status').innerHTML = `🎉 <b>${f.p.name}</b> 答對了 +1！`;
    $('opts').classList.add('locked');
    setTimeout(nextQ, 1400);
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    SFX.wrong();
    S.outs.add(S.buzzed);
    document.querySelectorAll('#buzzers button')[S.buzzed].classList.add('out');
    document.querySelectorAll('#buzzers button')[S.buzzed].classList.remove('me');
    if (S.outs.size >= S.fighters.length) {
      S.phase = 'idle';
      clearInterval(S.timerId);
      revealAnswer('大家都答錯了');
    } else {
      S.phase = 'buzz';
      $('opts').classList.add('locked');
      $('status').innerHTML = `❌ ${f.p.name} 答錯，其他人快搶！`;
    }
  }
}

function timeUp() {
  S.phase = 'idle';
  clearInterval(S.timerId);
  revealAnswer('時間到');
}
function revealAnswer(why) {
  document.querySelectorAll('#opts button').forEach(b => {
    if (b.dataset.o === S.q.ok) b.classList.add('right');
  });
  $('opts').classList.add('locked');
  $('status').innerHTML = `⏰ ${why}！答案是「<b>${S.q.ok}</b>」`;
  SFX.wrong();
  setTimeout(nextQ, 1800);
}

function finish() {
  clearInterval(S.timerId);
  SFX.done();
  const sorted = [...S.fighters].sort((a,b) => b.score - a.score);
  $('board').innerHTML = sorted.map((f,k) => `
    <div class="row ${k===0 ? 'top' : ''}">
      <div class="rk">${['🥇','🥈','🥉'][k] || (k+1)}</div>
      <div class="nm">${f.p.emoji} ${f.p.name}</div>
      <div class="sc">${f.score} 題</div>
    </div>`).join('');
  show('over');
}

$('go').onclick = () => {
  if (S.picks.size < 2) { beep([300], 0.12); return; }
  beep([440], 0.06);
  startGame();
};
$('again').onclick = () => { renderWho(); show('start'); };

paintStart();
</script>
